        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex justify-between items-center border-b border-gray-200 pb-4 mb-6">
                                            <h2 className="text-2xl font-black text-slate-800 uppercase"><i className="fa-solid fa-laptop-code mr-2 text-blue-600"></i> Control Room</h2>
                                            <button onClick={fetchPendingList} className="bg-white text-blue-600 px-4 py-2 rounded-lg border border-blue-200 shadow-sm hover:bg-blue-50 font-bold"><i className="fa-solid fa-rotate mr-1"></i> Refresh</button>
                                        </div>

                                        {!editingRow ? (
                                            <div className="space-y-4">
                                                {pendingList.map((item, idx) => (
                                                    <div key={idx} onClick={()=>openStaffEdit(item)} className="click-red bg-white p-5 rounded-2xl border border-gray-200 border-l-[6px] shadow-sm hover:shadow-md cursor-pointer flex justify-between items-center transition" style={{borderLeftColor: item.data[2]==='Send Back'?'#ef4444':'#f59e0b'}}>
                                                        <div>
                                                            <p className="font-black text-slate-800 text-lg">{item.data[4]} <span className="text-xs font-bold bg-gray-100 text-gray-600 px-2 py-1 rounded ml-2 border border-gray-200">{item.data[1]}</span></p>
                                                            <p className="text-sm font-bold text-gray-500 mt-1">{item.data[8]}</p>
                                                        </div>
                                                        <span className={`text-xs font-black uppercase px-3 py-1 rounded-full border ${item.data[2]==='Send Back' ? 'bg-red-50 text-red-600 border-red-200' : 'bg-yellow-50 text-yellow-600 border-yellow-200'}`}>{item.data[2]}</span>
                                                    </div>
                                                ))}
                                                {pendingList.length === 0 && <div className="text-center py-16"><i className="fa-solid fa-mug-hot text-6xl text-gray-300 mb-4 block"></i><p className="text-gray-500 text-xl font-black uppercase">कोई काम पेंडिंग नहीं है!</p></div>}
                                            </div>
                                        ) : (
                                            <div className="fade-in">
                                                <button onClick={()=>setEditingRow(null)} className="text-blue-600 font-black mb-6 hover:underline"><i className="fa-solid fa-arrow-left mr-2"></i> वापस लिस्ट पर</button>
                                                
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                                    {/* 📝 BIO DATA & EDIT PANEL */}
                                                    <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm">
                                                        <div className="flex justify-between items-center mb-6">
                                                            <h3 className="text-slate-800 font-black text-lg uppercase"><i className="fa-solid fa-address-card mr-2 text-blue-600"></i> Bio-Data</h3>
                                                            <button onClick={()=>setIsEditingBio(!isEditingBio)} className="text-xs bg-blue-50 text-blue-600 border border-blue-200 px-3 py-1 rounded-full font-bold hover:bg-blue-100"><i className="fa-solid fa-pen mr-1"></i> {isEditingBio ? "Cancel Edit" : "Edit Bio"}</button>
                                                        </div>
                                                        
                                                        {!isEditingBio ? (
                                                            <div className="text-sm space-y-4 mb-6 bg-gray-50 p-4 rounded-xl border border-gray-100">
                                                                <p className="flex flex-col"><span className="text-gray-500 font-bold uppercase text-[10px] tracking-wider mb-1">Customer Name & Mobile:</span> <span className="text-slate-800 font-black text-base">{bioEditData.name} <span className="text-gray-400 font-normal mx-2">|</span> <a href={`tel:${bioEditData.mobile}`} className="text-blue-600 hover:underline">{bioEditData.mobile}</a></span></p>
                                                                <p className="flex flex-col"><span className="text-gray-500 font-bold uppercase text-[10px] tracking-wider mb-1">Aadhaar / PPO / Specific:</span> <span className="text-slate-800 font-bold bg-white px-3 py-2 border border-gray-200 rounded-lg inline-block">{editingRow.data[9] || '-'} / {editingRow.data[11] || '-'} / {editingRow.data[12] || '-'}</span></p>
                                                                <p className="flex flex-col"><span className="text-gray-500 font-bold uppercase text-[10px] tracking-wider mb-1">Problem / Request:</span> <span className="text-slate-700 italic border-l-4 border-blue-400 pl-3 py-1 bg-white">{bioEditData.problem}</span></p>
                                                                <p className="flex flex-col"><span className="text-gray-500 font-bold uppercase text-[10px] tracking-wider mb-1">VC Request Status:</span> <span className="text-red-600 font-bold bg-red-50 px-3 py-1 rounded inline-block w-max border border-red-200">{editingRow.data[22]} ({editingRow.data[23]})</span></p>
                                                            </div>
                                                        ) : (
                                                            <div className="space-y-3 mb-6 bg-blue-50 p-4 rounded-xl border border-blue-200">
                                                                <p className="text-xs text-blue-800 font-bold mb-2">नीचे दी गई जानकारी को एडिट करें (यह अगले सबमिट पर सेव होगी):</p>
                                                                <input type="text" value={bioEditData.name} onChange={e=>setBioEditData({...bioEditData, name: e.target.value})} className="w-full bg-white p-3 rounded-lg border border-blue-300 font-bold text-sm outline-none" placeholder="Name" />
                                                                <input type="text" value={bioEditData.mobile} onChange={e=>setBioEditData({...bioEditData, mobile: e.target.value})} className="w-full bg-white p-3 rounded-lg border border-blue-300 font-bold text-sm outline-none" placeholder="Mobile" />
                                                                <textarea value={bioEditData.problem} onChange={e=>setBioEditData({...bioEditData, problem: e.target.value})} className="w-full bg-white p-3 rounded-lg border border-blue-300 font-bold text-sm outline-none" placeholder="Problem Detail"></textarea>
                                                            </div>
                                                        )}
                                                        
                                                        {/* CLICKABLE FILE LINKS */}
                                                        <p className="text-xs text-gray-500 font-bold uppercase mb-2">दस्तावेज़ (Documents):</p>
                                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3">
                                                            {[15,16,17,18,19].map(col => {
                                                                const link = getLink(editingRow.data[col]);
                                                                if(link) return <a key={col} href={link} target="_blank" className="bg-gray-50 border border-gray-200 p-3 rounded-xl text-center text-slate-700 text-xs font-bold hover:bg-blue-50 hover:text-blue-600 hover:border-blue-300 transition shadow-sm"><i className="fa-solid fa-file-pdf block text-2xl mb-1 text-red-500"></i> View Doc</a>
                                                                return null;
                                                            })}
                                                        </div>
                                                    </div>

                                                    {/* 🚨 COMMUNICATION PANEL */}
                                                    <div className="bg-white p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center">
                                                        <h3 className="text-slate-800 font-black text-lg uppercase mb-6 text-center border-b border-gray-100 pb-4"><i className="fa-solid fa-bolt text-red-500 mr-2"></i> Quick Actions</h3>
                                                        <div className="space-y-4">
                                                            <a href={GOOGLE_MEET_WEB_LINK} target="_blank" className="click-red flex justify-center items-center w-full bg-red-500 text-white py-4 rounded-xl font-black text-lg shadow-md hover:bg-red-600 transition">
                                                                <i className="fa-solid fa-video mr-3 animate-pulse"></i> JOIN VIDEO CALL NOW
                                                            </a>
                                                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-200 text-center">
                                                                <p className="text-xs text-gray-500 font-bold mb-2">मीट लिंक शेयर करने के लिए डायरेक्ट कॉपी करें:</p>
                                                                <code className="bg-white px-3 py-2 rounded border border-gray-300 text-blue-600 font-bold block select-all">{GOOGLE_MEET_TEXT_LINK}</code>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 🔄 UPDATE SECTION */}
                                                <div className="bg-slate-50 p-6 md:p-8 rounded-2xl border border-slate-200 shadow-sm">
                                                    <h3 className="text-slate-800 font-black text-xl uppercase mb-6"><i className="fa-solid fa-pen-to-square mr-2 text-indigo-500"></i> Update Status & Info</h3>
                                                    
                                                    <div className="mb-6 bg-white p-5 rounded-xl border border-gray-200 shadow-sm">
                                                        <label className="text-gray-600 font-bold text-xs uppercase block mb-2">नई सत्यापन/रिन्यूअल तिथि डालें (यदि लागू हो):</label>
                                                        <input type="date" value={staffUpdateData.newVerifyDate} onChange={e=>setStaffUpdateData({...staffUpdateData, newVerifyDate:e.target.value})} className="w-full bg-gray-50 p-4 rounded-lg text-slate-800 border border-gray-300 outline-none focus:border-indigo-500 font-bold" />
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-[10px] uppercase ml-1">Work Status</label>
                                                            <select value={staffUpdateData.status} onChange={e=>setStaffUpdateData({...staffUpdateData, status:e.target.value})} className="w-full bg-white p-4 rounded-lg text-slate-800 border border-gray-300 font-black shadow-sm outline-none focus:border-indigo-500">
                                                                <option>Pending</option><option>In Process</option><option>Send Back</option><option className="text-green-600">Done</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-[10px] uppercase ml-1">Staff Note (For Customer)</label>
                                                            <input type="text" value={staffUpdateData.note} onChange={e=>setStaffUpdateData({...staffUpdateData, note:e.target.value})} placeholder="e.g. Please wait, processing..." className="w-full bg-white p-4 rounded-lg text-slate-800 border border-gray-300 shadow-sm outline-none focus:border-indigo-500" />
                                                        </div>
                                                    </div>
                                                    
                                                    {staffUpdateData.status === "Send Back" && (
                                                        <div className="mb-5 animate-pulse">
                                                            <label className="text-red-500 font-bold text-[10px] uppercase ml-1">Reason for Rejection</label>
                                                            <input type="text" value={staffUpdateData.sendBackReason} onChange={e=>setStaffUpdateData({...staffUpdateData, sendBackReason:e.target.value})} placeholder="Send Back Reason (e.g. Upload clear Aadhaar)..." className="w-full bg-red-50 p-4 rounded-lg text-red-800 border-2 border-red-300 outline-none focus:border-red-500 font-bold placeholder-red-300" />
                                                        </div>
                                                    )}

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-8">
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-[10px] uppercase ml-1">Video Call Time (If Req)</label>
                                                            <input type="text" value={staffUpdateData.vcTime} onChange={e=>setStaffUpdateData({...staffUpdateData, vcTime:e.target.value})} placeholder="e.g. 04:30 PM" className="w-full bg-white p-4 rounded-lg text-slate-800 border border-gray-300 shadow-sm outline-none focus:border-indigo-500" />
                                                        </div>
                                                        <div className="relative pt-4">
                                                            <input type="file" ref={staffCertRef} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer mt-4" accept="image/*,application/pdf" />
                                                            <div className="bg-white p-4 rounded-lg border-2 border-dashed border-indigo-300 text-center text-indigo-600 font-bold shadow-sm hover:bg-indigo-50 transition"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Upload Certificate</div>
                                                        </div>
                                                    </div>

                                                    {/* ⏳ PLEASE WAIT LOADER ON UPDATE */}
                                                    <button onClick={submitStaffUpdate} disabled={isUpdating} className={`w-full font-black py-5 rounded-xl text-xl uppercase tracking-widest shadow-lg transition-all ${isUpdating ? 'bg-gray-400 text-gray-700 cursor-not-allowed' : 'click-red bg-slate-800 text-white hover:bg-slate-900'}`}>
                                                        {isUpdating ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i> Updating Data...</> : <><i className="fa-solid fa-check-double mr-2"></i> Update Data & Generate Message</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 BOTTOM NAV - White Theme */}
                    <div className="fixed bottom-0 w-full bg-white border-t border-gray-200 p-3 flex justify-around items-center z-50 shadow-[0_-5px_20px_rgba(0,0,0,0.05)]">
                        <div onClick={() => setView('HOME')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='HOME'||view==='DEPT'||view==='FORM'||view==='SUCCESS'?'bg-blue-50 text-blue-600':'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-house text-xl mb-1"></i><span className="text-[10px] font-bold">Home</span></div>
                        <div onClick={() => setView('TRACK')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='TRACK'?'bg-indigo-50 text-indigo-600':'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-satellite-dish text-xl mb-1"></i><span className="text-[10px] font-bold">Track</span></div>
                        <div onClick={() => setView('STAFF')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='STAFF'?'bg-slate-100 text-slate-800':'text-gray-400 hover:text-gray-600'}`}><i className="fa-solid fa-user-shield text-xl mb-1"></i><span className="text-[10px] font-bold">Staff</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
