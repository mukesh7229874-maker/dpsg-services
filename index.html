        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap');
        
        /* 🌟 White Professional Theme (E-Mitra Style) */
        body { font-family: 'Poppins', sans-serif; background: #f0f4f8; color: #333333; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .glass-panel { background: #ffffff; border-radius: 1rem; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 5px solid #0A3D91; }
        
        .click-anim { transition: all 0.15s ease-in-out; cursor: pointer; }
        .click-anim:active { transform: scale(0.96); }
        
        .marquee-alert { background: #0A3D91; color: #fff; font-weight: 700; padding: 10px 0; border-bottom: 3px solid #FFD700; font-size: 15px; z-index: 100000;}
        
        /* 📞 FLOATING BUTTONS */
        .floating-bar { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 9999; }
        .float-btn { width: 60px; height: 60px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; color: white; box-shadow: 0 4px 15px rgba(0,0,0,0.2); cursor: pointer; transition: 0.2s; border: 2px solid #fff; }
        .float-btn:hover { transform: scale(1.1); }
        .float-vc { background: #dc2626; animation: pulseRed 2s infinite; }
        .float-wa { background: #25D366; }
        .float-call { background: #2563eb; }
        .float-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.6); } 70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Inputs */
        .custom-input { width: 100%; background: #f8fafc; padding: 16px; border-radius: 12px; border: 1px solid #cbd5e1; font-weight: 600; color: #1e293b; outline: none; transition: 0.3s; font-size: 16px;}
        .custom-input:focus { border-color: #0A3D91; box-shadow: 0 0 0 3px rgba(10, 61, 145, 0.1); background: #ffffff;}
    </style>
</head>

            'पेंशन का वार्षिक भौतिक सत्यापन ⏰': { texts: ['PPO नंबर', 'जन-आधार नंबर', 'आधार नंबर'], docs: ['पीपीओ डायरी की फोटो'], askDate: true },
            'Airtel Payments Bank (खाता)': { texts: ['आधार नंबर', 'नॉमिनी का नाम'], docs: ['आधार दोनों तरफ', 'लाइव फोटो'], askDate: false },
            'गाड़ी/बाइक का इंश्योरेंस ⏰': { texts: ['गाड़ी नंबर', 'आधार नंबर'], docs: ['पुरानी पॉलिसी की फोटो', 'RC बुक'], askDate: true },
            'स्वास्थ्य बीमा (Health Insurance) ⏰': { texts: ['पॉलिसी नंबर', 'आधार नंबर'], docs: ['पुरानी पॉलिसी की फोटो'], askDate: true },
            'जाति प्रमाण पत्र (OBC/SC/ST)': { texts: ['जन-आधार नंबर', 'राशन कार्ड नंबर'], docs: ['राशन कार्ड', 'पुराना रिकॉर्ड'], askDate: false },

            'आयुष्मान कार्ड (Ayushman Bharat)': { texts: ['जन-आधार नंबर', 'आधार नंबर'], docs: ['आधार कार्ड की फोटो'], askDate: false }
        };

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', problemDesc: '', lastDate: '', vipId: '' });
            const [dynamicTextData, setDynamicTextData] = useState({});
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const [successToken, setSuccessToken] = useState(''); 
            const fileInputRef = useRef(null);

            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const extraDocRef = useRef(null);

            const [showVCModal, setShowVCModal] = useState(false);
            const [vcData, setVcData] = useState({name:'', mobile:'', aadhaar:'', problem:'', medium:'Google Meet'});

            // 🔐 STAFF LOGIN & OTP STATES
            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [showOtpInput, setShowOtpInput] = useState(false);
            const [staffOtp, setStaffOtp] = useState('');
            const [generatedOtp, setGeneratedOtp] = useState('');
            
            const [pendingList, setPendingList] = useState([]);
            
            // 🛑 STAFF UPDATE & PAYMENT STATES
            const [editingRow, setEditingRow] = useState(null);
            const [staffUpdateData, setStaffUpdateData] = useState({status: '', vcTime: '', note: '', sendBackReason: '', newVerifyDate: '', emitraToken: ''});
            const [payMode, setPayMode] = useState('Cash');
            const [payAmt, setPayAmt] = useState('');
            const [payVerified, setPayVerified] = useState(false);
            const [isUpdating, setIsUpdating] = useState(false);
            const staffCertRef = useRef(null);

            const [showMandatoryPopup, setShowMandatoryPopup] = useState(false);
            const [popupClicks, setPopupClicks] = useState({ customer: false, owner: false, group: false });
            const [finalMsgData, setFinalMsgData] = useState({});

            const callAPI = async (payload) => {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await response.json();
            };

            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 15 * 1024 * 1024) { alert("फाइल 15MB से छोटी होनी चाहिए!"); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { name: file.name, base64: ev.target.result, mimeType: file.type }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const submitForm = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Student' ? 'Student_Services' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService, vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc, lastDate: formData.lastDate,
                    dynamicFields: dynamicTextData, files: uploadedFiles
                };
                const res = await callAPI(payload);
                setIsUploading(false);
                if(res.status === "SUCCESS") {
                    setSuccessToken(res.token); 
                    setView('SUCCESS'); 
                } else alert("❌ Error: " + res.message);
            };

            const resetAndGoHome = () => {
                setView('HOME'); setSuccessToken(''); setFormData({name:'', mobile:'', address:'', problemDesc:'', lastDate:'', vipId:''}); setDynamicTextData({}); setUploadedFiles([]);
            };

            // 🔍 TRACKING FIX (Trim & UpperCase)
            const trackStatus = async () => {
                if(!trackToken) { alert("टोकन नंबर डालें!"); return; }
                setIsTracking(true);
                const cleanToken = trackToken.trim().toUpperCase();
                const res = await callAPI({action: "TRACK_STATUS", token: cleanToken});
                setIsTracking(false);
                if(res.status === "SUCCESS") setTrackResult(res.fullData);
                else alert("❌ कोई कार्ड नहीं मिला। कृपया सही टोकन दर्ज करें।");
            };

            const handleExtraUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                alert("⏳ अतिरिक्त दस्तावेज़ अपलोड हो रहा है...");
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const res = await callAPI({action: "CUSTOMER_EXTRA_UPLOAD", token: trackToken.trim().toUpperCase(), file: {name: file.name, base64: ev.target.result, mimeType: file.type}});
                    if(res.status === "SUCCESS") { alert("✅ दस्तावेज़ सफलतापूर्वक जुड़ गया!"); trackStatus(); }
                };
                reader.readAsDataURL(file);
            };

            const submitDirectVC = async (e) => {
                e.preventDefault();
                alert("🔴 स्टाफ को रिक्वेस्ट भेजी जा रही है...");
                const res = await callAPI({action: "DIRECT_VC_REQ", ...vcData});
                if(res.status === "SUCCESS") { alert("✅ रिक्वेस्ट भेज दी गई है!"); setShowVCModal(false); }
            };

            // 🔐 100% SECURE OTP LOGIN LOGIC
            const requestStaffOTP = async () => {
                if(!staffId || !staffPass) return alert("ID और Password डालें!");
                const res = await callAPI({action: "STAFF_LOGIN", userId: staffId, password: staffPass});
                if(res.status === "SUCCESS") {
                    setGeneratedOtp(res.otp);
                    setShowOtpInput(true);
                    alert("📲 OTP आपके एडमिन टेलीग्राम पर भेज दिया गया है!");
                } else { alert("❌ ID या पासवर्ड गलत है!"); }
            };

            const verifyStaffOTP = () => {
                if(staffOtp === generatedOtp) {
                    setIsStaffLoggedIn(true);
                    fetchPendingList();
                } else { alert("❌ गलत OTP!"); }
            };

            // 📊 DAILY REPORT LOGIC
            const triggerDailyReport = async () => {
                if(confirm("क्या आप आज की गल्ला व कार्य रिपोर्ट टेलीग्राम पर भेजना चाहते हैं?")) {
                    const res = await callAPI({action: "DAILY_REPORT"});
                    if(res.status === "SUCCESS") alert("✅ रिपोर्ट सफलतापूर्वक टेलीग्राम पर भेज दी गई है!");
                }
            };

            const fetchPendingList = async () => {
                const res = await callAPI({action: "GET_ALL_PENDING"});
                if(res.status === "SUCCESS") {
                    const filteredList = res.list.filter(item => item.data[2] !== 'Done');
                    setPendingList(filteredList);
                }
            };

            const openStaffEdit = (item) => {
                setEditingRow(item);
                setStaffUpdateData({status: item.data[2], vcTime: item.data[24] === "N/A" ? "" : item.data[24], note: item.data[28], sendBackReason: item.data[19], newVerifyDate: item.data[26] === "लागू नहीं" ? "" : item.data[26], emitraToken: item.data[20]});
                setPayMode('Cash'); setPayAmt(''); setPayVerified(false);
            };

            // 💸 PAYMENT LOCK LOGIC
            const isUpdateDisabled = () => {
                if(isUpdating) return true;
                if(payMode !== 'Free' && !payVerified) return true;
                return false;
            };

            const submitStaffUpdate = async () => {
                setIsUpdating(true);
                let payload = { 
                    action: "STAFF_UPDATE_FORM", staffId: staffId, sheetName: editingRow.sheetName, rowIdx: editingRow.rowIdx, token: editingRow.data[1], 
                    newStatus: staffUpdateData.status, vcTime: staffUpdateData.vcTime, staffNote: staffUpdateData.note, 
                    sendBackReason: staffUpdateData.sendBackReason, emitraToken: staffUpdateData.emitraToken, lastDate: staffUpdateData.newVerifyDate, 
                    vcStatus: staffUpdateData.vcTime ? "Approved" : editingRow.data[22],
                    paymentMode: payMode, paymentAmount: payMode === 'Free' ? 'FREE' : payAmt
                };
                
                if(staffCertRef.current && staffCertRef.current.files[0]) {
                    const file = staffCertRef.current.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        payload.staffFileBase64 = ev.target.result; payload.staffFileMime = file.type;
                        await processStaffUpdateResult(payload);
                    };
                    reader.readAsDataURL(file);
                } else { await processStaffUpdateResult(payload); }
            };

            const processStaffUpdateResult = async (payload) => {
                const res = await callAPI(payload);
                setIsUpdating(false);
                if(res.status === "SUCCESS") { 
                    setFinalMsgData({

                    alert("❌ अपडेट में समस्या आई!");

                setShowMandatoryPopup(false);

                return match ? match[1] : null;
            };

            const getFullDetailMessage = (target) => {
                let d = finalMsgData;
                let header = `🏢 *DIGITAL PROBLEM SOLUTION GROUP (DPSG)* 🏢\n🌟 _"आपकी समस्या, समाधान हमारा" | "उचित मूल्य, बेहतरीन सेवा"_ 🌟\n━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━`;
                let title = d.status === "Send Back" ? `⚠️ *[ ACTION REQUIRED: फॉर्म में कमी पाई गई है ]*` : 
                            d.status === "Done" ? `✅ *[ WORK SUCCESSFULLY COMPLETED ]*` : 
                            d.vcTime ? `📹 *[ VIDEO CALL SCHEDULED - समय तय किया गया ]*` : `🔄 *[ WORK STATUS UPDATED ]*`;
                
                let bio = `\n👤 *:: ग्राहक का विवरण ::*\n🔹 *टोकन नंबर:* ${d.token}\n🔹 *नाम:* ${d.name}\n🔹 *मोबाइल:* ${d.mobile}\n🔹 *सेवा:* ${d.service}\n🔹 *Membership ID:* ${d.vip || 'सामान्य ग्राहक'}\n🔹 *अन्य जानकारी:* ${d.extra || 'N/A'}`;

                                                            <i className="fa-brands fa-whatsapp mr-3 text-2xl"></i> 1. ग्राहक को सूचित करें {popupClicks.customer && "✅"}
                                                        </a>
                                                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${getFullDetailMessage('owner')}`} target="_blank" onClick={()=>setPopupClicks({...popupClicks, owner:true})} className={`flex justify-center items-center w-full py-4 rounded-xl font-black text-lg transition ${popupClicks.owner ? 'bg-blue-100 border border-blue-300 text-blue-700' : 'bg-blue-600 text-white shadow-md'}`}>
                                                            <i className="fa-brands fa-whatsapp mr-3 text-2xl"></i> 2. Owner को सूचित करें {popupClicks.owner && "✅"}
                                                        </a>
                                                        <a href={GROUP_WHATSAPP_LINK} target="_blank" onClick={()=>setPopupClicks({...popupClicks, group:true})} className={`flex justify-center items-center w-full py-4 rounded-xl font-black text-lg transition ${popupClicks.group ? 'bg-indigo-100 border border-indigo-300 text-indigo-700' : 'bg-indigo-600 text-white shadow-md'}`}>
                                                            <i className="fa-brands fa-whatsapp mr-3 text-2xl"></i> 3. ग्रुप में सूचित करें {popupClicks.group && "✅"}
                                                        </a>
                                                    </div>
                                                    
                                                    <button onClick={closeMandatoryPopup} disabled={!(popupClicks.customer && popupClicks.owner && popupClicks.group)} className={`w-full py-4 rounded-xl font-black uppercase text-xl transition ${popupClicks.customer && popupClicks.owner && popupClicks.group ? 'bg-[#0A3D91] text-white shadow-md click-anim' : 'bg-gray-200 text-gray-400 cursor-not-allowed'}`}>
                                                        {popupClicks.customer && popupClicks.owner && popupClicks.group ? "ओके, डन करें" : "तीनों बटन दबाएं..."}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex flex-col md:flex-row justify-between items-center border-b-2 border-gray-100 pb-6 mb-8 gap-4">
                                            <h2 className="text-2xl font-black text-gray-800 uppercase"><i className="fa-solid fa-laptop-code mr-3 text-[#0A3D91]"></i> Control Room</h2>
                                            <div className="flex gap-3">
                                                {/* 📊 DAILY REPORT BUTTON */}
                                                <button onClick={triggerDailyReport} className="bg-[#17a2b8] text-white px-5 py-2.5 rounded-xl font-bold text-sm hover:bg-[#138496] shadow-sm"><i className="fa-solid fa-chart-pie mr-2"></i> Daily Report</button>
                                                <button onClick={fetchPendingList} className="bg-white text-gray-700 px-5 py-2.5 rounded-xl border border-gray-300 font-bold text-sm hover:bg-gray-50 shadow-sm"><i className="fa-solid fa-rotate mr-2"></i> Refresh</button>
                                            </div>
                                        </div>

                                        {!editingRow ? (
                                            <div className="space-y-4">
                                                {pendingList.map((item, idx) => (
                                                    <div key={idx} onClick={()=>openStaffEdit(item)} className="click-anim bg-white p-5 rounded-xl border border-gray-200 border-l-[6px] shadow-sm hover:shadow-md cursor-pointer flex flex-col md:flex-row justify-between items-start md:items-center transition" style={{borderLeftColor: item.data[2]==='Send Back'?'#ef4444':'#f59e0b'}}>
                                                        <div className="mb-3 md:mb-0">
                                                            <p className="font-black text-gray-800 text-xl">{item.data[4]} <span className="text-xs font-bold bg-gray-100 text-gray-500 px-2 py-1 rounded border border-gray-200 ml-2">{item.data[1]}</span></p>
                                                            <p className="text-sm font-bold text-[#0A3D91] mt-1">{item.data[8]}</p>
                                                        </div>
                                                        <span className={`text-xs font-black uppercase px-3 py-1 rounded-full ${item.data[2]==='Send Back' ? 'bg-red-100 text-red-700' : 'bg-yellow-100 text-yellow-700'}`}>{item.data[2]}</span>
                                                    </div>
                                                ))}
                                                {pendingList.length === 0 && <div className="text-center py-16"><i className="fa-solid fa-mug-hot text-6xl text-gray-300 mb-4 block"></i><p className="text-gray-400 text-xl font-black uppercase">कोई काम पेंडिंग नहीं है!</p></div>}
                                            </div>
                                        ) : (
                                            <div className="fade-in">
                                                <button onClick={()=>setEditingRow(null)} className="text-[#0A3D91] font-bold mb-6 hover:underline text-sm"><i className="fa-solid fa-arrow-left mr-1"></i> वापस लिस्ट पर</button>
                                                
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
                                                    {/* 📝 CLEAR BIO DATA */}
                                                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm">
                                                        <h3 className="text-[#0A3D91] font-black text-lg uppercase mb-5 border-b border-gray-200 pb-3"><i className="fa-solid fa-address-card mr-2 text-gray-500"></i> ग्राहक की पूरी डिटेल</h3>
                                                        
                                                        <div className="space-y-3 mb-6">
                                                            <div className="bg-white p-3 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm">
                                                                <span className="text-gray-500 font-bold uppercase text-[10px]">नाम व मोबाइल:</span>
                                                                <span className="text-gray-800 font-black text-sm">{editingRow.data[4]} | {editingRow.data[5]}</span>
                                                            </div>
                                                            <div className="bg-white p-3 rounded-lg border border-gray-200 flex justify-between items-center shadow-sm">
                                                                <span className="text-gray-500 font-bold uppercase text-[10px]">सर्विस का नाम:</span>
                                                                <span className="text-[#0A3D91] font-black text-sm">{editingRow.data[8]}</span>
                                                            </div>
                                                            
                                                            {editingRow.data[9] && (
                                                                <div className="bg-blue-50 p-3 rounded-lg border border-blue-200 flex justify-between items-center">
                                                                    <span className="text-blue-600 font-bold uppercase text-[10px]">डिटेल 1:</span><span className="text-blue-900 font-black text-sm">{editingRow.data[9]}</span>
                                                                </div>
                                                            )}
                                                            {editingRow.data[10] && (
                                                                <div className="bg-green-50 p-3 rounded-lg border border-green-200 flex justify-between items-center">
                                                                    <span className="text-green-600 font-bold uppercase text-[10px]">डिटेल 2:</span><span className="text-green-900 font-black text-sm">{editingRow.data[10]}</span>
                                                                </div>
                                                            )}
                                                            
                                                            {/* 🔥 PROBLEM COLUMN SHOWN CLEARLY */}
                                                            <div className="bg-red-50 p-4 rounded-lg border border-red-200 mt-3">
                                                                <span className="text-red-500 font-bold uppercase text-[10px] block mb-1">समस्या / कार्य विवरण:</span>
                                                                <span className="text-red-900 font-bold text-sm italic block">{editingRow.data[14]}</span>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* 🔗 CLEAN CLICKABLE LINKS */}
                                                        <p className="text-xs text-gray-500 font-black uppercase mb-2">अपलोड किये गए दस्तावेज़:</p>
                                                        <div className="grid grid-cols-2 gap-3">
                                                            {[15,16,17,18].map(col => {
                                                                const link = getLink(editingRow.data[col]);
                                                                if(link) return <a key={col} href={link} target="_blank" className="bg-white border border-gray-300 p-3 rounded-lg text-center text-gray-700 text-xs font-bold hover:bg-gray-50 hover:border-[#0A3D91] transition shadow-sm"><i className="fa-solid fa-file-pdf block text-xl mb-1 text-red-500"></i> View File</a>
                                                                return null;
                                                            })}
                                                        </div>
                                                    </div>

                                                    {/* 🚨 QUICK ACTIONS */}
                                                    <div className="bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-start">
                                                        <h3 className="text-gray-800 font-black text-lg uppercase mb-5 border-b border-gray-200 pb-3"><i className="fa-solid fa-bolt text-[#FFD700] mr-2"></i> Quick Actions</h3>
                                                        <div className="space-y-4">
                                                            <a href={GOOGLE_MEET_WEB_LINK} target="_blank" className="click-anim flex justify-center items-center w-full bg-red-600 text-white py-3 rounded-xl font-bold text-sm shadow-sm hover:bg-red-700">
                                                                <i className="fa-solid fa-video mr-2"></i> खुद वीडियो कॉल से जुड़ें
                                                            </a>
                                                            <a href={`https://wa.me/91${editingRow.data[5]}?text=${getVCLinkMessage()}`} target="_blank" className="click-anim flex justify-center items-center w-full bg-[#25D366] text-white py-3 rounded-xl font-bold text-sm shadow-sm hover:bg-green-600">
                                                                <i className="fa-brands fa-whatsapp text-lg mr-2"></i> 📹 ग्राहक को लिंक भेजें
                                                            </a>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 🔄 UPDATE SECTION & GALLA */}
                                                <div className="bg-white p-6 md:p-8 rounded-2xl border border-gray-200 shadow-lg">
                                                    <h3 className="text-[#0A3D91] font-black text-xl uppercase mb-6"><i className="fa-solid fa-pen-to-square mr-2"></i> Update Status & Payment</h3>
                                                    
                                                    {/* 💸 GALLA PAYMENT BOX */}
                                                    <div className="bg-amber-50 p-5 rounded-xl border border-amber-200 mb-6 shadow-sm">
                                                        <h4 className="text-amber-800 font-black uppercase text-sm mb-3"><i className="fa-solid fa-indian-rupee-sign mr-2"></i> गल्ले का हिसाब (Payment)</h4>
                                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-3">
                                                            <div>
                                                                <label className="text-amber-700 font-bold text-xs uppercase mb-1 block">पेमेंट का तरीका:</label>
                                                                <select value={payMode} onChange={e=>setPayMode(e.target.value)} className="custom-input py-3">
                                                                    <option value="Cash">💵 नकद (Cash)</option>
                                                                    <option value="UPI">📱 ऑनलाइन (UPI / QR)</option>
                                                                    <option value="Free">🎁 मुफ्त (Free / No Charge)</option>
                                                                    <option value="Discount">🏷️ डिस्काउंट (Discounted)</option>
                                                                </select>
                                                            </div>
                                                            {payMode !== 'Free' && (
                                                                <div>
                                                                    <label className="text-amber-700 font-bold text-xs uppercase mb-1 block">अमाउंट (₹):</label>
                                                                    <input type="number" value={payAmt} onChange={e=>setPayAmt(e.target.value)} placeholder="उदा: 500" className="custom-input py-3" />
                                                                </div>
                                                            )}
                                                        </div>
                                                        {payMode !== 'Free' && (
                                                            <div className="flex items-center gap-3 bg-green-50 p-3 rounded-lg border border-green-200 mt-2">
                                                                <input type="checkbox" id="payLock" checked={payVerified} onChange={(e)=>setPayVerified(e.target.checked)} className="w-5 h-5 cursor-pointer accent-green-600" />
                                                                <label htmlFor="payLock" className="text-green-800 font-bold text-sm cursor-pointer">✅ मैंने पेमेंट / कैश चेक कर लिया है (Verified)</label>
                                                            </div>
                                                        )}
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-5">
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-xs uppercase ml-1 mb-1 block">Work Status</label>
                                                            <select value={staffUpdateData.status} onChange={e=>setStaffUpdateData({...staffUpdateData, status:e.target.value})} className="custom-input py-3">
                                                                <option>Pending</option><option>In Process</option><option className="text-red-600">Send Back</option><option className="text-green-600">Done</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-xs uppercase ml-1 mb-1 block">Staff Note</label>
                                                            <input type="text" value={staffUpdateData.note} onChange={e=>setStaffUpdateData({...staffUpdateData, note:e.target.value})} placeholder="e.g. Please wait..." className="custom-input py-3" />
                                                        </div>
                                                    </div>
                                                    
                                                    {staffUpdateData.status === "Send Back" && (
                                                        <div className="mb-5">
                                                            <label className="text-red-500 font-bold text-xs uppercase ml-1 mb-1 block">Reason for Rejection</label>
                                                            <input type="text" value={staffUpdateData.sendBackReason} onChange={e=>setStaffUpdateData({...staffUpdateData, sendBackReason:e.target.value})} placeholder="Send Back Reason..." className="custom-input py-3 border-red-300 bg-red-50 text-red-800" />
                                                        </div>
                                                    )}

                                                    {/* 🔒 VERIFICATION LOCK ON BUTTON */}
                                                    <button onClick={submitStaffUpdate} disabled={isUpdateDisabled()} className={`w-full font-black py-4 rounded-xl text-lg uppercase tracking-wider shadow-md transition-all ${isUpdateDisabled() ? 'bg-gray-300 text-gray-500 cursor-not-allowed' : 'click-anim bg-[#0A3D91] text-white hover:bg-[#082d6b]'}`}>
                                                        {isUpdating ? <><i className="fa-solid fa-spinner fa-spin mr-2"></i> Updating Data...</> : <><i className="fa-solid fa-check-double mr-2"></i> Update Data & Message</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 BOTTOM NAV */}
                    <div className="fixed bottom-0 w-full bg-white border-t border-gray-200 p-2 flex justify-around items-center z-50 shadow-[0_-5px_15px_rgba(0,0,0,0.05)]">
                        <div onClick={() => setView('HOME')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='HOME'||view==='DEPT'||view==='FORM'||view==='SUCCESS'?'bg-blue-50 text-[#0A3D91]':'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-house text-xl mb-1"></i><span className="text-[10px] font-black uppercase">Home</span></div>
                        <div onClick={() => setView('TRACK')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='TRACK'?'bg-blue-50 text-[#0A3D91]':'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-satellite-dish text-xl mb-1"></i><span className="text-[10px] font-black uppercase">Track</span></div>
                        <div onClick={() => setView('STAFF')} className={`cursor-pointer py-2 px-6 rounded-xl flex flex-col items-center transition ${view==='STAFF'?'bg-red-50 text-red-600':'text-gray-500 hover:bg-gray-50'}`}><i className="fa-solid fa-user-shield text-xl mb-1"></i><span className="text-[10px] font-black uppercase">Staff</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
