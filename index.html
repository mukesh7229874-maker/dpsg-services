<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* VIP UI */
        .glass-panel { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .glass-gold { background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 100%); border: 1px solid #ffd700; }
        
        /* 🔴 असली 'टच और रेड' इफ़ेक्ट (हुकुम का आदेश) 🔴 */
        .click-red { transition: all 0.1s ease-in-out; }
        .click-red:active { 
            background-color: #991b1b !important; /* गहरा लाल रंग */
            border-color: #ef4444 !important; 
            transform: scale(0.95); 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
        }

        /* Submit Button */
        .btn-gold { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: 900; transition: all 0.1s ease; text-transform: uppercase; }
        .btn-gold:active { transform: scale(0.95); box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); }
        
        /* File Upload */
        .file-box { border: 2px dashed #ff9900; background: rgba(255, 153, 0, 0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; height: 110px; transition: all 0.2s; }
        .file-box:active { background: rgba(255, 153, 0, 0.3); transform: scale(0.92); border-color: #fff; }
        
        /* Marquee */
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; letter-spacing: 1px; text-shadow: 1px 1px 2px #000; font-size: 14px; }
        
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>

        const DEPARTMENTS = [
            { id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark-flag', color: '#ff9933',

            { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', 
              services: ['उत्तर मैट्रिक छात्रवृत्ति (समाज कल्याण)', 'CM उच्च शिक्षा छात्रवृत्ति', 'देवनारायण / स्कूटी योजना', 'RPSC / RSMSSB भर्ती फॉर्म', 'SSC / UPSC / Army / Police फॉर्म', 'कॉलेज एडमिशन (BA/BSc/BCom)', 'यूनिवर्सिटी मुख्य परीक्षा फॉर्म', 'रिवेल्यूएशन / सप्लीमेंट्री फॉर्म', 'RTE (फ्री स्कूल एडमिशन) फॉर्म', 'नवोदय / सैनिक स्कूल प्रवेश फॉर्म', 'एडमिट कार्ड प्रिंट', 'रिजल्ट प्रिंट'] },
            { id: 'Bank', name: 'महा-बैंकिंग व फाइनेंस', icon: 'fa-building-columns', color: '#00ccff', 
              services: ['Airtel Payments Bank (जीरो बैलेंस खाता)', 'Kotak Mahindra 811 खाता', 'Fino Payments Bank खाता', 'SBI / BoB / PNB बैंक खाता खोलना', 'HDFC / ICICI / Axis बैंक खाता', 'India Post Payments Bank', 'खाते में मोबाइल नंबर/आधार जोड़ना', 'पुराने फँसे हुए खाते/पैसे की समस्या', 'नए ATM (Debit Card) के लिए अप्लाई', 'AEPS (आधार से पैसे निकालना/जमा करना)', 'DMT (मनी ट्रांसफर)', 'नया क्रेडिट कार्ड अप्लाई करना', 'सिबिल स्कोर (CIBIL) चेक करना', 'मुद्रा / पर्सनल / होम लोन फाइल', 'वाहन बीमा (Bike/Car/Tractor)', 'स्वास्थ्य बीमा (Health) / LIC जीवन बीमा'] },
            { id: 'Tech', name: 'टेक, एडिशनल व मोबाइल', icon: 'fa-mobile-screen-button', color: '#ff3366',

            { id: 'Other', name: 'अन्य महत्वपूर्ण सेवाएं', icon: 'fa-briefcase', color: '#ffd700',

        ];

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', vipId: '', problemDesc: '' });
            const [uploadedFiles, setUploadedFiles] = useState([]); 
            const fileInputRef = useRef(null);
            const [isUploading, setIsUploading] = useState(false);

            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);

            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [dashboardData, setDashboardData] = useState({ pending: '...', doneToday: '...' });
            const [whatsappMsg, setWhatsappMsg] = useState('');

            // 📂 फाइल सेलेक्ट
            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 25 * 1024 * 1024) { alert(`फाइल ${file.name} बहुत बड़ी है।`); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { id: Date.now() + Math.random(), name: file.name, base64: ev.target.result, type: file.type }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeFile = (idToRemove) => { setUploadedFiles(prev => prev.filter(f => f.id !== idToRemove)); };

            // 🚀 100% असली फॉर्म जमा (बिना फोटो के भी चलेगा)
            const submitForm = (e) => {
                e.preventDefault();
                if(!formData.name || !formData.mobile || !formData.problemDesc) { alert("कृपया नाम, मोबाइल और समस्या विवरण अनिवार्य रूप से भरें!"); return; }
                
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", 
                    sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : selectedDept.id === 'Student' ? 'Student_Services' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService,
                    vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc,
                    files: uploadedFiles.map(f => ({ name: f.name, base64: f.base64, mimeType: f.type })) // Empty array is completely fine!
                };

                google.script.run.withSuccessHandler((res) => {
                    setIsUploading(false);
                    if(res.status === "SUCCESS") {
                        alert("✅ शानदार! आपका काम सुरक्षित रूप से बुक हो गया है।\nआपका टोकन नंबर: " + res.token);
                        setView('HOME'); setFormData({name:'', mobile:'', address:'', vipId:'', problemDesc:''}); setUploadedFiles([]);
                    } else alert("Error: " + res.message);
                }).withFailureHandler((err) => {
                    setIsUploading(false); alert("सर्वर से संपर्क टूट गया। कृपया फिर कोशिश करें।");
                }).processRequest(payload);
            };

            // ❌ कैंसिल बटन फंक्शन
            const handleCancel = () => {
                if(window.confirm("क्या आप सच में इस फॉर्म को रद्द करना चाहते हैं?")) {
                    setFormData({name:'', mobile:'', address:'', vipId:'', problemDesc:''});
                    setUploadedFiles([]);
                    setView('DEPT');
                }
            };

            // 🔍 फ्री ट्रैकिंग 
            const verifyAndTrack = () => {
                if(!trackMobile || !trackToken) { alert("कृपया मोबाइल नंबर और टोकन नंबर दोनों डालें!"); return; }
                setIsTracking(true);
                google.script.run.withSuccessHandler((res) => {
                    setIsTracking(false);
                    if(res.status === "SUCCESS") setTrackResult(res);
                    else alert("❌ " + res.message);
                }).withFailureHandler(() => { setIsTracking(false); alert("सर्वर एरर!"); }).processRequest({action: "TRACK_STATUS", mobile: trackMobile, token: trackToken});
            };

            // 🔴 वीडियो कॉल सायरन
            const requestVideoCall = () => {
                google.script.run.processRequest({action: "VIDEO_CALL_REQ", mobile: trackMobile || "ग्राहक", token: trackToken || "Unknown"});
                alert("🔴 लाइव वीडियो कॉल का सायरन DPSG स्टाफ को भेज दिया गया है! कृपया इंतज़ार करें।");
            };

            // 👨‍💻 स्टाफ लॉगिन
            const handleLogin = () => {
                if(STAFF_CREDS[staffId] && STAFF_CREDS[staffId] === staffPass) {
                     setIsStaffLoggedIn(true);
                     google.script.run.processRequest({ action: "STAFF_LOGIN", userId: staffId });
                     fetchLiveDashboard();
                } else alert("❌ ID या पासवर्ड गलत है!");
            };

            const fetchLiveDashboard = () => {
                setDashboardData({ pending: '...', doneToday: '...' });
                google.script.run.withSuccessHandler((res) => {
                    if(res.status === "SUCCESS") setDashboardData({ pending: res.pending, doneToday: res.doneToday });
                }).processRequest({ action: "GET_LIVE_DASHBOARD" });
            };

            const sendWhatsapp = () => {
                if(!whatsappMsg) { alert("पहले मैसेज लिखें!"); return; }

                window.open(`https://wa.me/?text=${finalMsg}`, '_blank');
            };

            // 🎯 डायनामिक वार्निंग
            const renderDynamicWarning = () => {
                if (selectedService.includes('सुधार') || selectedService.includes('Correction') || selectedService.includes('वापस मंगाना') || selectedService.includes('रिन्यूअल')) {

                            <p className="text-xs text-red-200 mt-1 font-bold">चूँकि आप सुधार/रिप्रिंट/रिन्यूअल करवा रहे हैं, इसलिए <b>अपना पुराना दस्तावेज़/प्रमाण पत्र</b> नीचे (+) बटन दबाकर अनिवार्य रूप से अपलोड करें!</p>
                        </div>
                    );
                }
                if (selectedService.includes('लिंक') || selectedService.includes('AEPS') || selectedService.includes('चेक करना')) {
                    return (
                        <div className="bg-green-900/30 border-l-4 border-green-500 p-4 rounded-r-lg mb-6">

                        </div>
                    );
                }
                return null;
            };

                    </div>

                    <div className="pt-20">
                        
                        {/* 🏠 1. HOME VIEW */}

                                    <h1 className="text-7xl md:text-9xl font-black italic text-[#ffd700] drop-shadow-[0_0_30px_rgba(255,215,0,0.6)] mt-2">DPSG</h1>
                                    <div className="mt-6">
                                        <p className="text-[#ff9900] font-black tracking-widest text-sm md:text-2xl bg-[#0a0a0a] inline-block px-10 py-4 rounded-full border border-[#ff9900]/50 shadow-[0_0_20px_rgba(255,153,0,0.4)] uppercase">
                                            "आपकी समस्या, समाधान हमारा"
                                        </p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="click-red glass-panel p-6 flex flex-col items-center text-center cursor-pointer shadow-xl group">
                                            <div className="text-5xl w-24 h-24 flex items-center justify-center rounded-3xl bg-black border-2 shadow-2xl mb-4 group-hover:scale-110 transition-transform" style={{borderColor: dept.color, color: dept.color}}>
                                                <i className={`fa-solid ${dept.icon}`}></i>
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-black text-white tracking-wide uppercase">{dept.name}</h3>
                                                <p className="text-xs text-gray-400 font-bold mt-2 bg-[#111] py-1 px-3 rounded-full border border-[#333] inline-block">{dept.services.length} Premium Services</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📋 2. SERVICE LIST VIEW */}
                        {view === 'DEPT' && selectedDept && (
                            <div className="p-4 max-w-5xl mx-auto mt-2 fade-in">
                                <button onClick={() => setView('HOME')} className="click-red text-[#ffd700] font-black mb-6 bg-[#111] px-6 py-3 rounded-xl border border-[#333] shadow-lg"><i className="fa-solid fa-arrow-left mr-2"></i> वापस होम पर जाएं</button>
                                
                                <div className="glass-gold p-10 mb-8 text-center rounded-3xl shadow-2xl">
                                    <i className={`fa-solid ${selectedDept.icon} text-6xl mb-4`} style={{color: selectedDept.color}}></i>
                                    <h2 className="text-3xl md:text-4xl font-black uppercase tracking-widest text-white">{selectedDept.name}</h2>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                    {selectedDept.services.map((srv, idx) => (
                                        <div key={idx} onClick={() => { setSelectedService(srv); setView('FORM'); }} className="click-red bg-[#0a0a0a] border border-[#222] p-6 rounded-2xl flex justify-between items-center cursor-pointer shadow-lg">
                                            <span className="font-bold text-gray-200 text-sm">{srv}</span>
                                            <i className="fa-solid fa-chevron-right text-[#ffd700]"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📝 3. BOOKING FORM (NO PHOTO FORCED + CANCEL BUTTON) */}
                        {view === 'FORM' && (
                            <div className="p-4 max-w-4xl mx-auto mt-2 fade-in">
                                <button onClick={() => setView('DEPT')} className="click-red text-[#ffd700] font-black mb-4"><i className="fa-solid fa-arrow-left mr-2"></i> वापस सेवाएं देखें</button>
                                
                                <div className="glass-panel p-6 md:p-10 border-t-4 border-[#ffd700] shadow-2xl">
                                    <h2 className="text-2xl md:text-4xl font-black text-[#ffd700] mb-2">{selectedService}</h2>
                                    <p className="text-xs text-gray-400 font-bold uppercase tracking-widest border-b border-[#333] pb-4 mb-6"><i className={`fa-solid ${selectedDept.icon} mr-2`}></i> {selectedDept.name}</p>

                                    {/* 🎯 डायनामिक अलर्ट */}
                                    {renderDynamicWarning()}

                                    <form onSubmit={submitForm} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                            <div>
                                                <label className="text-xs font-bold text-[#ffd700] uppercase tracking-wider">पूरा नाम *</label>
                                                <input required type="text" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="w-full bg-[#0a0a0a] p-4 rounded-xl border border-[#333] text-white outline-none focus:border-[#ffd700] shadow-inner mt-1" placeholder="ग्राहक का पूरा नाम" />
                                            </div>
                                            <div>
                                                <label className="text-xs font-bold text-[#ffd700] uppercase tracking-wider">मोबाइल / व्हाट्सएप *</label>
                                                <input required type="tel" value={formData.mobile} onChange={e=>setFormData({...formData, mobile:e.target.value})} className="w-full bg-[#0a0a0a] p-4 rounded-xl border border-[#333] text-white outline-none focus:border-[#ffd700] shadow-inner mt-1" placeholder="10 अंकों का सक्रिय नंबर" />
                                            </div>
                                        </div>
                                        
                                        <div>
                                            <label className="text-xs font-bold text-[#ffd700] uppercase tracking-wider">गाँव / पूरा पता *</label>
                                            <input required type="text" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-[#0a0a0a] p-4 rounded-xl border border-[#333] text-white outline-none focus:border-[#ffd700] shadow-inner mt-1" placeholder="मकान नं, गाँव/शहर, तहसील, जिला" />
                                        </div>

                                        <div className="bg-[#1a0f00] p-4 rounded-2xl border border-[#ff9900] shadow-inner">
                                            <label className="text-sm font-black text-[#ff9900] uppercase tracking-wide">✍️ समस्या या कार्य का पूरा विवरण * (अनिवार्य)</label>
                                            <p className="text-[10px] text-gray-400 mb-3">यहाँ अपनी पूरी बात विस्तार से लिखें। अगर कोई कागज़ कम है, तो यहाँ बता दें।</p>
                                            <textarea required rows="4" value={formData.problemDesc} onChange={e=>setFormData({...formData, problemDesc:e.target.value})} className="w-full bg-black/50 p-4 rounded-xl text-white outline-none text-sm placeholder-gray-600 border border-[#ff9900]/30 focus:border-[#ff9900]" placeholder="अपनी पूरी समस्या या काम का विवरण यहाँ टाइप करें..."></textarea>
                                        </div>

                                        <div>
                                            <label className="text-xs font-bold text-gray-500 uppercase tracking-wider">VIP Membership ID (Optional)</label>
                                            <input type="text" value={formData.vipId} onChange={e=>setFormData({...formData, vipId:e.target.value})} className="w-full bg-[#0a0a0a] p-4 rounded-xl border border-[#333] text-white outline-none text-sm mt-1" placeholder="DPSG कार्ड ID" />
                                        </div>

                                        {/* 🛑 दस्तावेज़ अपलोड (100% ऐच्छिक) 🛑 */}
                                        <div className="mt-8 pt-6 border-t border-[#333]">
                                            <div className="flex justify-between items-center mb-2">
                                                <h3 className="font-black text-lg text-white uppercase"><i className="fa-solid fa-folder-open text-[#ffd700] mr-2"></i> दस्तावेज़ / वीडियो अपलोड <span className="text-gray-500 text-xs ml-2">(ऐच्छिक)</span></h3>
                                                <span className="bg-[#111] px-4 py-1 rounded-full text-xs font-black text-[#ffd700] border border-[#ffd700]/30">Selected: {uploadedFiles.length}</span>
                                            </div>
                                            <p className="text-[10px] md:text-xs text-green-400 mb-5">अगर आपके पास फोटो/कागज़ नहीं हैं, तो आप इसे <b>खाली छोड़कर</b> सीधा नीचे जाकर 'सबमिट' बटन दबा सकते हैं। फॉर्म जमा हो जाएगा!</p>
                                            
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {uploadedFiles.map((file) => (
                                                    <div key={file.id} className="file-box group shadow-lg">
                                                        {file.type.includes('image') ? (
                                                            <img src={file.base64} className="w-full h-full object-cover opacity-90" />
                                                        ) : file.type.includes('video') ? (
                                                            <div className="text-center"><i className="fa-solid fa-file-video text-5xl text-blue-500 mb-2"></i></div>
                                                        ) : (
                                                            <div className="text-center"><i className="fa-solid fa-file-pdf text-5xl text-red-500 mb-2"></i></div>
                                                        )}
                                                        <button type="button" onClick={()=>removeFile(file.id)} className="click-red absolute top-2 right-2 bg-red-600 rounded-full w-7 h-7 flex items-center justify-center text-white shadow-xl"><i className="fa-solid fa-times"></i></button>
                                                        <span className="absolute bottom-0 w-full bg-black/80 text-[10px] text-center truncate px-2 py-1 text-gray-200 font-bold">{file.name}</span>
                                                    </div>
                                                ))}
                                                
                                                {/* ➕ महा-प्लस बटन */}
                                                <div className="click-red file-box cursor-pointer border-dashed border-2 shadow-inner group" onClick={()=>fileInputRef.current.click()}>
                                                    <div className="text-center">
                                                        <i className="fa-solid fa-plus text-5xl text-[#ff9900] group-hover:scale-110 transition-transform"></i>
                                                        <p className="text-[11px] font-black uppercase text-[#ff9900] mt-2 tracking-widest bg-black/50 px-2 rounded-full">Add Files</p>
                                                    </div>
                                                </div>
                                            </div>
                                            <input type="file" multiple accept="image/*,video/*,application/pdf" ref={fileInputRef} onChange={handleFileSelect} className="hidden" />
                                        </div>

                                        {/* 🛑 सबमिट और कैंसिल बटन 🛑 */}
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mt-8">
                                            <button type="button" onClick={handleCancel} disabled={isUploading} className="click-red w-full bg-red-900 hover:bg-red-800 border-2 border-red-600 text-white font-black py-5 rounded-xl text-xl uppercase tracking-wider shadow-lg">
                                                <i className="fa-solid fa-ban mr-2"></i> रद्द करें (Cancel)
                                            </button>
                                            <button type="submit" disabled={isUploading} className="click-red w-full btn-gold py-5 rounded-xl text-xl shadow-[0_0_25px_rgba(255,215,0,0.4)] tracking-wider">
                                                {isUploading ? <><i className="fa-solid fa-spinner fa-spin mr-3"></i> अपलोडिंग...</> : <><i className="fa-solid fa-rocket mr-3"></i> सुरक्षित काम बुक करें</>}
                                            </button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 🔍 4. SECURE TRACKING & VIDEO CALL */}
                        {view === 'TRACK' && (
                            <div className="p-4 max-w-lg mx-auto mt-8 fade-in">
                                <div className="glass-panel p-8 text-center border-t-4 border-blue-500 shadow-[0_10px_40px_rgba(37,99,235,0.2)]">
                                    <h2 className="text-2xl font-black mb-2 uppercase tracking-widest text-white">Live Tracking</h2>
                                    <p className="text-xs text-gray-400 mb-8 font-bold">बिना OTP के अपना स्टेटस 1 सेकंड में देखें!</p>
                                    
                                    <div className="space-y-4">
                                        <input type="tel" placeholder="रजिस्टर्ड मोबाइल नंबर" onChange={e=>setTrackMobile(e.target.value)} className="w-full bg-[#0a0a0a] p-5 rounded-xl border border-[#333] text-center font-black text-white outline-none focus:border-blue-500 shadow-inner tracking-widest" />
                                        <input type="text" placeholder="टोकन नंबर (DPSG-...)" onChange={e=>setTrackToken(e.target.value)} className="w-full bg-[#0a0a0a] p-5 rounded-xl border border-[#333] text-center font-black text-white outline-none focus:border-blue-500 shadow-inner uppercase tracking-widest" />
                                        
                                        <button onClick={verifyAndTrack} disabled={isTracking} className="click-red w-full bg-blue-600 text-white font-black py-5 rounded-xl shadow-[0_0_20px_rgba(37,99,235,0.5)] text-lg uppercase mt-2">
                                            {isTracking ? <><i className="fa-solid fa-circle-notch fa-spin mr-2"></i> खोजा जा रहा है...</> : <><i className="fa-solid fa-magnifying-glass mr-2"></i> स्टेटस चेक करें</>}
                                        </button>
                                    </div>

                                    {/* 🔴 वीडियो कॉल का बड़ा बटन (सर्च करने से पहले भी दिखेगा) */}
                                    <div className="mt-6 border-t border-[#333] pt-6">
                                        <p className="text-[10px] text-gray-400 mb-2 font-bold uppercase">Emergency Support</p>
                                        <button onClick={requestVideoCall} className="click-red w-full bg-red-600 text-white font-black py-5 rounded-xl flex items-center justify-center shadow-[0_0_25px_rgba(220,38,38,0.7)] border-2 border-red-400">
                                            <i className="fa-solid fa-video text-2xl mr-3 animate-pulse"></i> DPSG स्टाफ को लाइव वीडियो कॉल करें
                                        </button>
                                    </div>

                                    {/* 🔴 ट्रैकिंग रिज़ल्ट */}
                                    {trackResult && (
                                        <div className="mt-8 bg-[#050505] p-6 rounded-2xl border border-[#222] text-left shadow-2xl relative overflow-hidden fade-in">
                                            <p className="text-xs font-black text-blue-400 uppercase tracking-widest mb-1 border-b border-[#222] pb-2">Ticket Status</p>
                                            
                                            <div className="mt-4 space-y-2">
                                                <p className="text-sm font-bold text-gray-400">सर्विस: <span className="text-white ml-2">{trackResult.service}</span></p>
                                                <p className="text-sm font-bold text-gray-400">तारीख: <span className="text-white ml-2">{trackResult.appliedOn}</span></p>
                                                <div className="flex items-center mt-2">
                                                    <p className="text-sm font-bold text-gray-400 mr-2">वर्तमान स्थिति:</p> 
                                                    <span className={`px-4 py-1 rounded-full text-xs font-black uppercase tracking-wider border ${trackResult.status==='Done'?'bg-green-900/40 text-green-400 border-green-500':'bg-yellow-900/40 text-yellow-400 border-yellow-500'}`}>{trackResult.status}</span>
                                                </div>
                                            </div>
                                            
                                            <div className="p-4 bg-[#111] rounded-xl text-sm font-bold text-gray-300 border border-[#333] mt-5 shadow-inner">
                                                <span className="text-[#ffd700] block mb-1 uppercase text-xs tracking-widest"><i className="fa-solid fa-comment-dots mr-1"></i> स्टाफ का नोट:</span> 
                                                <span className="text-white font-normal">{trackResult.note}</span>
                                            </div>

                                            {/* ⏰ पेंशन की असली तारीखें */}
                                            {trackResult.lastPension && trackResult.lastPension !== 'लागू नहीं' && (
                                                <div className="p-4 bg-red-900/20 rounded-xl border border-red-500/50 mt-4 shadow-inner">
                                                    <p className="text-xs font-black text-red-400 uppercase tracking-widest mb-2"><i className="fa-solid fa-clock-rotate-left mr-1"></i> पेंशन सत्यापन विवरण</p>
                                                    <p className="text-xs text-gray-300 font-bold mb-1">पिछला सत्यापन: <span className="text-white ml-1">{trackResult.lastPension}</span></p>
                                                    <p className="text-xs text-gray-300 font-bold">अगला सत्यापन दिनाँक: <span className="text-[#ffd700] ml-1">{trackResult.nextPension}</span></p>
                                                </div>
                                            )}
                                            
                                            {trackResult.status==='Done' && (
                                                <button className="click-red w-full bg-green-500 text-black font-black py-4 rounded-xl mt-5 flex items-center justify-center shadow-[0_0_15px_rgba(34,197,94,0.4)]">
                                                    <i className="fa-solid fa-cloud-arrow-down text-xl mr-2"></i> सर्टिफिकेट डाउनलोड करें
                                                </button>
                                            )}
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 👨‍💻 5. STAFF CONTROL ROOM (LIVE DASHBOARD) */}
                        {view === 'STAFF' && (
                            <div className="p-4 max-w-4xl mx-auto mt-8 fade-in">
                                {!isStaffLoggedIn ? (
                                    <div className="glass-panel p-8 max-w-md mx-auto text-center border-t-4 border-red-600 shadow-[0_10px_40px_rgba(220,38,38,0.2)]">
                                        <div className="w-24 h-24 bg-red-600/20 rounded-full flex items-center justify-center mx-auto mb-6 border-2 border-red-500 shadow-[0_0_20px_rgba(220,38,38,0.5)]">
                                            <i className="fa-solid fa-shield-halved text-5xl text-red-500"></i>
                                        </div>
                                        <h2 className="text-2xl font-black mb-8 uppercase tracking-widest text-white">Secure Staff Login</h2>
                                        
                                        <div className="space-y-4">
                                            <input type="text" placeholder="Staff ID" onChange={e=>setStaffId(e.target.value)} className="w-full bg-[#0a0a0a] p-5 rounded-xl border border-[#333] font-bold text-white outline-none text-center focus:border-red-500 shadow-inner tracking-widest" />
                                            <input type="password" placeholder="Password" onChange={e=>setStaffPass(e.target.value)} className="w-full bg-[#0a0a0a] p-5 rounded-xl border border-[#333] font-bold text-white outline-none text-center focus:border-red-500 shadow-inner tracking-widest" />
                                            <button onClick={handleLogin} className="click-red w-full bg-red-600 text-white font-black py-5 rounded-xl text-lg shadow-[0_0_20px_rgba(220,38,38,0.6)] uppercase">Login to Server</button>
                                        </div>
                                    </div>
                                ) : (
                                    <div className="glass-panel p-8 border-t-4 border-red-600 shadow-2xl">
                                        <div className="flex justify-between items-center border-b border-[#333] pb-6 mb-8">
                                            <div>
                                                <h2 className="text-3xl md:text-4xl font-black text-white uppercase tracking-wider">Control <span className="text-red-500">Room</span></h2>
                                                <p className="text-xs font-bold text-gray-400 mt-1 uppercase tracking-widest">Welcome, {staffId}</p>
                                            </div>
                                            <button onClick={()=>setIsStaffLoggedIn(false)} className="click-red bg-[#111] border border-[#333] px-4 py-2 rounded-lg text-gray-400 font-bold shadow-lg"><i className="fa-solid fa-power-off mr-2"></i>Logout</button>
                                        </div>
                                        
                                        {/* 📊 असली लाइव डैशबोर्ड */}
                                        <div className="flex justify-between items-center mb-4">
                                            <h3 className="text-lg font-black text-white uppercase tracking-widest"><i className="fa-solid fa-chart-line text-red-500 mr-2"></i> Live Status</h3>
                                            <button onClick={fetchLiveDashboard} className="click-red text-xs bg-[#111] border border-[#333] px-3 py-1 rounded text-gray-400"><i className="fa-solid fa-rotate mr-1"></i> Refresh</button>
                                        </div>
                                        
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                                            <div className="bg-[#050505] p-8 rounded-2xl text-center border-l-4 border-[#ffd700] shadow-xl">
                                                <p className="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Total Pending Tasks</p>
                                                <p className="text-7xl font-black text-[#ffd700] drop-shadow-[0_0_15px_rgba(255,215,0,0.4)]">{dashboardData.pending}</p>
                                            </div>
                                            <div className="bg-[#050505] p-8 rounded-2xl text-center border-l-4 border-green-500 shadow-xl">
                                                <p className="text-gray-400 text-xs font-black uppercase tracking-widest mb-2">Completed Today</p>
                                                <p className="text-7xl font-black text-green-500 drop-shadow-[0_0_15px_rgba(34,197,94,0.4)]">{dashboardData.doneToday}</p>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 VIP BOTTOM NAVIGATION */}
                    <div className="fixed bottom-0 w-full bg-[#000000]/90 backdrop-blur-2xl border-t border-[#222] p-3 flex justify-around items-center z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.9)]">
                        <div onClick={() => setView('HOME')} className={`click-red text-center cursor-pointer py-2 px-6 rounded-2xl ${view==='HOME'||view==='DEPT'||view==='FORM'?'text-[#000] bg-gradient-to-r from-[#ffd700] to-[#ff8c00] shadow-[0_0_20px_rgba(255,215,0,0.5)] transform scale-105':'text-gray-500'}`}>
                            <i className="fa-solid fa-house text-xl md:text-2xl mb-1 block"></i><span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Home</span>
                        </div>
                        <div onClick={() => setView('TRACK')} className={`click-red text-center cursor-pointer py-2 px-6 rounded-2xl ${view==='TRACK'?'text-[#fff] bg-gradient-to-r from-blue-500 to-blue-700 shadow-[0_0_20px_rgba(37,99,235,0.5)] transform scale-105':'text-gray-500'}`}>
                            <i className="fa-solid fa-satellite-dish text-xl md:text-2xl mb-1 block"></i><span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Track</span>
                        </div>
                        <div onClick={() => setView('STAFF')} className={`click-red text-center cursor-pointer py-2 px-6 rounded-2xl ${view==='STAFF'?'text-[#fff] bg-gradient-to-r from-red-600 to-red-800 shadow-[0_0_20px_rgba(220,38,38,0.5)] transform scale-105':'text-gray-500'}`}>
                            <i className="fa-solid fa-user-shield text-xl md:text-2xl mb-1 block"></i><span className="text-[10px] md:text-xs font-black uppercase tracking-widest">Staff</span>
                        </div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
