<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPSG - Digital Problem Solution Group</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700;900&family=Rajdhani:wght@700&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #000; color: #fff; overflow-x: hidden; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .vip-card { border-radius: 20px; padding: 20px; margin: 10px; background: linear-gradient(135deg, #1a1a1a 0%, #000 100%); border: 1px solid #ffd700; }
        .btn-gold { background: linear-gradient(90deg, #ffd700, #ff8c00); color: black; font-weight: 900; }
        .camera-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; display: flex; flex-direction: column; }
        video { width: 100%; height: 80%; object-fit: cover; }
        .marquee { background: #ffd700; color: black; font-weight: bold; padding: 5px 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [view, setView] = useState('HOME'); // HOME, SERVICE_LIST, BOOKING, TRACKING, STAFF
            const [selectedCategory, setSelectedCategory] = useState(null);
            const [bookingData, setBookingData] = useState({ name: '', mobile: '', address: '', files: [] });
            const [isCamOpen, setIsCamOpen] = useState(false);
            const [camType, setCamType] = useState(''); // Selfie, AadhaarF, AadhaarB, PAN
            const videoRef = useRef(null);

            // 🔱 कैटेगरी लिस्ट (नए सिस्टम के हिसाब से)
            const categories = [
                { id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark', color: '#ff9933' },
                { id: 'State', name: 'राज्य सरकार सेवाएं', icon: 'fa-map-location-dot', color: '#ffffff' },
                { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808' },
                { id: 'Bank', name: 'बैंकिंग सेवाएं', icon: 'fa-building-columns', color: '#000080' },
                { id: 'Other', name: 'अन्य महत्वपूर्ण सेवाएं', icon: 'fa-gears', color: '#ffcc00' }
            ];

            // 📸 कैमरा कंट्रोल (पुरानी मशीन जैसा)
            const openCamera = (type) => {
                setCamType(type);
                setIsCamOpen(true);
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } })
                    .then(stream => { videoRef.current.srcObject = stream; })
                    .catch(err => alert("Camera error: " + err));
            };

            const capture = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg');
                
                setBookingData(prev => ({
                    ...prev,
                    files: [...prev.files, { name: camType, base64: base64, mimeType: 'image/jpeg' }]
                }));
                closeCamera();
            };

            const closeCamera = () => {
                const stream = videoRef.current.srcObject;
                stream.getTracks().forEach(track => track.stop());
                setIsCamOpen(false);
            };

            // 📤 बुकिंग सबमिट करें (टेलीग्राम और ड्राइव में जाएगी)
            const submitBooking = () => {
                if(!bookingData.name || !bookingData.mobile) return alert("कृपया नाम और मोबाइल भरें!");
                
                // यहाँ 'google.script.run' का इस्तेमाल होगा जो Code.gs से जुड़ा है
                google.script.run.withSuccessHandler((res) => {
                    alert("🔱 बुकिंग सफल! आपका टोकन: " + res.token);
                    setView('HOME');
                }).handleBooking({
                    action: "BOOK_SERVICE",
                    ...bookingData,
                    categoryName: selectedCategory.name,
                    folderKey: selectedCategory.id,
                    sheetName: selectedCategory.id === "Central" ? "Central_Govt" : 
                              selectedCategory.id === "State" ? "State_Govt" : "Other_Services"
                });
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* 📢 नोटिफिकेशन पट्टी */}
                    <div className="marquee">
                        <marquee>🔱 DPSG 2026: आपकी समस्या, समाधान हमारा | 24/7 लाइव सपोर्ट उपलब्ध 🚩</marquee>
                    </div>

                    {/* 🏠 होम स्क्रीन */}
                    {view === 'HOME' && (
                        <div className="p-4">
                            <div className="text-center my-8">
                                <h1 className="text-4xl font-black text-yellow-500">DPSG 2026</h1>
                                <p className="text-gray-400">Digital Problem Solution Group</p>
                            </div>

                            <div className="grid grid-cols-1 gap-4">
                                {categories.map(cat => (
                                    <div key={cat.id} onClick={() => { setSelectedCategory(cat); setView('SERVICE_LIST'); }}
                                         className="glass p-6 rounded-3xl flex items-center gap-4 active:scale-95 transition border-l-4"
                                         style={{borderColor: cat.color}}>
                                        <div className="text-3xl" style={{color: cat.color}}><i className={`fa-solid ${cat.icon}`}></i></div>
                                        <div>
                                            <h3 className="text-xl font-bold">{cat.name}</h3>
                                            <p className="text-xs text-gray-500">सभी सरकारी काम यहाँ करवाएं</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* 📂 सर्विस लिस्ट */}
                    {view === 'SERVICE_LIST' && (
                        <div className="p-4">
                            <button onClick={() => setView('HOME')} className="mb-4 text-yellow-500 font-bold"><i className="fa-solid fa-arrow-left"></i> वापस जाएं</button>
                            <h2 className="text-2xl font-bold mb-6">{selectedCategory.name}</h2>
                            {/* यहाँ आप सेवाओं की लिस्ट डाल सकते हैं */}
                            <div className="glass p-5 rounded-2xl mb-4 flex justify-between items-center" onClick={() => setView('BOOKING')}>
                                <span>नया रजिस्ट्रेशन / आवेदन</span>
                                <i className="fa-solid fa-chevron-right"></i>
                            </div>
                        </div>
                    )}

                    {/* 📝 बुकिंग फॉर्म (पुराने फोटो सिस्टम के साथ) */}
                    {view === 'BOOKING' && (
                        <div className="p-4">
                            <h2 className="text-2xl font-bold mb-4">आवेदन फॉर्म</h2>
                            <input type="text" placeholder="पूरा नाम" className="w-full glass p-4 rounded-xl mb-4 outline-none" 
                                   onChange={(e) => setBookingData({...bookingData, name: e.target.value})} />
                            <input type="number" placeholder="मोबाइल नंबर" className="w-full glass p-4 rounded-xl mb-4 outline-none" 
                                   onChange={(e) => setBookingData({...bookingData, mobile: e.target.value})} />
                            
                            <h3 className="font-bold mb-2">📸 आवश्यक दस्तावेज (लाइव फोटो)</h3>
                            <div className="grid grid-cols-2 gap-2 mb-6">
                                <button onClick={() => openCamera('Selfie')} className="glass p-4 rounded-xl text-xs"><i className="fa-solid fa-camera mb-2 block"></i> सेल्फी</button>
                                <button onClick={() => openCamera('AadhaarF')} className="glass p-4 rounded-xl text-xs"><i className="fa-solid fa-id-card mb-2 block"></i> आधार (Front)</button>
                                <button onClick={() => openCamera('AadhaarB')} className="glass p-4 rounded-xl text-xs"><i className="fa-solid fa-id-card-clip mb-2 block"></i> आधार (Back)</button>
                                <button onClick={() => openCamera('PAN')} className="glass p-4 rounded-xl text-xs"><i className="fa-solid fa-address-card mb-2 block"></i> पैन कार्ड</button>
                            </div>

                            <button onClick={submitBooking} className="w-full btn-gold p-4 rounded-2xl">आवेदन जमा करें</button>
                        </div>
                    )}

                    {/* 📹 कैमरा इंटरफेस */}
                    {isCamOpen && (
                        <div className="camera-overlay">
                            <video ref={videoRef} autoPlay playsInline></video>
                            <div className="p-8 flex justify-around bg-black">
                                <button onClick={closeCamera} className="bg-red-600 p-4 rounded-full w-20 h-20">❌</button>
                                <button onClick={capture} className="bg-white p-4 rounded-full w-24 h-24 border-8 border-gray-400"></button>
                                <button className="bg-blue-600 p-4 rounded-full w-20 h-20">🔄</button>
                            </div>
                        </div>
                    )}

                    {/* 📱 नेविगेशन बार */}
                    <div className="fixed bottom-0 w-full glass p-4 flex justify-around items-center border-t border-white/10">
                        <div onClick={() => setView('HOME')} className={`text-center ${view==='HOME'?'text-yellow-500':'text-gray-500'}`}>
                            <i className="fa-solid fa-house text-xl"></i>
                            <span className="block text-[10px]">होम</span>
                        </div>
                        <div onClick={() => setView('TRACKING')} className="text-center text-gray-500">
                            <i className="fa-solid fa-magnifying-glass text-xl"></i>
                            <span className="block text-[10px]">ट्रैक</span>
                        </div>
                        <div onClick={() => setView('STAFF')} className="text-center text-gray-500">
                            <i className="fa-solid fa-user-tie text-xl"></i>
                            <span className="block text-[10px]">स्टाफ</span>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
