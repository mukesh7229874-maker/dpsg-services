<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPSG E-Mitra Portal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* VIP UI */
        .glass-panel { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .glass-gold { background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 100%); border: 1px solid #ffd700; }
        
        .click-red { transition: all 0.1s ease-in-out; cursor: pointer; }
        .click-red:active { transform: scale(0.95); }

        .btn-gold { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: 900; transition: all 0.1s ease; text-transform: uppercase; }
        .btn-gold:active { transform: scale(0.95); box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); }
        
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; text-shadow: 1px 1px 2px #000; font-size: 14px; letter-spacing: 1px; }
        
        /* 📞 Floating Buttons (बाहर दिखने वाले बटन) */
        .floating-bar { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 15px; z-index: 9999; }
        .float-btn { width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; color: white; box-shadow: 0 0 20px rgba(0,0,0,0.8); cursor: pointer; transition: 0.2s; border: 2px solid rgba(255,255,255,0.2); }
        .float-btn:hover { transform: scale(1.1); }
        .float-vc { background: #dc2626; animation: pulseRed 2s infinite; }
        .float-wa { background: #25D366; }
        .float-call { background: #2563eb; }
        .float-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 🛑 हुकुम का नया 100% पक्का API लिंक
        const API_URL = "https://script.google.com/macros/s/AKfycbzXkKyBI6Dr7v9o_w9k7TRiKsO9wsUHiSasETE3i4EOO9GxprHOGaY3VCqSnTQA0sP97A/exec";
        
        const WHATSAPP_NUMBER = "918788418737"; // हुकुम का ऑफिशियल नंबर
        const WHATSAPP_MSG = encodeURIComponent("जय महादेव! 🚩 DPSG ई-मित्र, मुझे एक सरकारी सर्विस/फॉर्म के बारे में जानकारी चाहिए। मेरा नाम ______ है।");

        const STAFF_CREDS = {
            "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020",
            "Rajkumar@DPS": "Rajkumar@6020", "Chanchal@DPS": "Chanchal@6020"
        };

        const SERVICE_REQUIREMENTS = {
            'नया पैन कार्ड': { texts: ['पिता का नाम', 'आधार नंबर'], docs: ['पासपोर्ट फोटो', 'हस्ताक्षर (Sign)', 'आधार फोटो'] },
            'पैन कार्ड में सुधार': { texts: ['पुराना पैन नंबर', 'पिता का नाम', 'आधार नंबर'], docs: ['पासपोर्ट फोटो', 'हस्ताक्षर', 'पुराना पैन कार्ड'] },
            'पेंशन का वार्षिक भौतिक सत्यापन ⏰': { texts: ['PPO नंबर', 'जन-आधार नंबर', 'आधार नंबर'], docs: ['पीपीओ (PPO) डायरी की फोटो'] },
            'Airtel Payments Bank (खाता)': { texts: ['आधार नंबर', 'नॉमिनी का नाम'], docs: ['आधार दोनों तरफ से', 'लाइव फोटो'] },
            'जाति प्रमाण पत्र (OBC/SC/ST)': { texts: ['जन-आधार नंबर', 'पिता का नाम', 'राशन कार्ड नंबर'], docs: ['राशन कार्ड', 'पुराना रिकॉर्ड'] },
            'जन्म / मृत्यु प्रमाण पत्र': { texts: ['जन-आधार नंबर', 'पिता/पति का नाम', 'दिनांक'], docs: ['अस्पताल की रसीद'] },
            'उत्तर मैट्रिक छात्रवृत्ति': { texts: ['जन-आधार नंबर', 'मार्कशीट रोल नंबर', 'बैंक खाता नंबर'], docs: ['आय प्रमाण पत्र', 'मार्कशीट', 'फीस रसीद'] },
            'iPhone (एप्पल) अनलॉक करना': { texts: ['फोन का मॉडल', 'Apple ID (अगर याद हो)'], docs: ['बिल या डब्बा (Optional)'] }
        };

        const DEPARTMENTS = [
            { id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark-flag', color: '#ff9933', services: ['नया पैन कार्ड', 'पैन कार्ड में सुधार', 'पैन-आधार लिंक', 'PM किसान सम्मान निधि', 'पासपोर्ट आवेदन'] },
            { id: 'State', name: 'राज्य सरकार / ई-मित्र', icon: 'fa-map-location-dot', color: '#ffffff', services: ['पेंशन का वार्षिक भौतिक सत्यापन ⏰', 'जाति प्रमाण पत्र (OBC/SC/ST)', 'मूल निवास प्रमाण पत्र', 'जन्म / मृत्यु प्रमाण पत्र', 'नया जन-आधार कार्ड'] },
            { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', services: ['उत्तर मैट्रिक छात्रवृत्ति', 'CM उच्च शिक्षा छात्रवृत्ति', 'SSC / UPSC फॉर्म', 'एडमिट कार्ड / रिजल्ट'] },
            { id: 'Bank', name: 'महा-बैंकिंग व फाइनेंस', icon: 'fa-building-columns', color: '#00ccff', services: ['Airtel Payments Bank (खाता)', 'Kotak Mahindra 811', 'नया ATM कार्ड अप्लाई', 'DMT (मनी ट्रांसफर)', 'इंश्योरेंस (वाहन/स्वास्थ्य) ⏰', 'पुराने फँसे हुए पैसे की समस्या'] },
            { id: 'Tech', name: 'टेक व अनलॉकिंग', icon: 'fa-mobile-screen-button', color: '#ff3366', services: ['iPhone (एप्पल) अनलॉक करना', 'Android (Pattern/Pin) अनलॉक करना', 'डेटा रिकवरी (फोटो वापस)'] },
            { id: 'Other', name: 'अन्य सेवाएं', icon: 'fa-briefcase', color: '#ffd700', services: ['किरायानामा (Rent Agreement)', 'टाइपिंग वर्क (हिंदी/English)', 'रेज़्यूमे (Biodata)', 'ट्रेन टिकट बुकिंग'] }
        ];

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            // Booking State
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', vipId: '', problemDesc: '' });
            const [dynamicTextData, setDynamicTextData] = useState({});
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            // Tracking & Extra Upload State
            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const extraDocRef = useRef(null);

            // Direct VC Modal State
            const [showVCModal, setShowVCModal] = useState(false);
            const [vcData, setVcData] = useState({name:'', mobile:'', aadhaar:'', problem:'', medium:'Google Meet'});

            // Staff State
            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [pendingList, setPendingList] = useState([]);
            const [editingRow, setEditingRow] = useState(null);
            const [staffUpdateData, setStaffUpdateData] = useState({status: '', vcTime: '', note: '', sendBackReason: '', emitraToken: ''});
            const staffCertRef = useRef(null);

            // --- API ENGINE ---
            const callAPI = async (payload) => {
                try {
                    const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    return await response.json();
                } catch (error) {
                    return { status: "ERROR", message: "सर्वर से संपर्क टूट गया है। इंटरनेट चेक करें!" };
                }
            };

            // --- FILES UPLOAD ---
            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 15 * 1024 * 1024) { alert("फाइल बहुत बड़ी है!"); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { name: file.name, base64: ev.target.result, mimeType: file.type }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            // --- SUBMIT BOOKING ---
            const submitForm = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", 
                    sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Student' ? 'Student_Services' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService,
                    vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc,
                    dynamicFields: dynamicTextData, files: uploadedFiles
                };
                const res = await callAPI(payload);
                setIsUploading(false);
                if(res.status === "SUCCESS") {
                    alert("✅ शानदार! काम बुक हो गया। आपका टोकन नंबर है: " + res.token + "\nकृपया इसे ट्रैकिंग के लिए सेव कर लें।");
                    setView('HOME'); setFormData({name:'', mobile:'', address:'', vipId:'', problemDesc:''}); setDynamicTextData({}); setUploadedFiles([]);
                } else alert("❌ Error: " + res.message);
            };

            // --- DIRECT VC SUBMIT (बिना टोकन) ---
            const submitDirectVC = async (e) => {
                e.preventDefault();
                alert("🔴 स्टाफ को इमरजेंसी सायरन भेजा जा रहा है...");
                const res = await callAPI({action: "DIRECT_VC_REQ", ...vcData});
                if(res.status === "SUCCESS") { 
                    alert("✅ आपकी वीडियो कॉल रिक्वेस्ट स्टाफ को मिल गई है! स्टाफ जल्द ही आपको संपर्क करेगा।"); 
                    setShowVCModal(false); 
                } else alert("❌ Error: " + res.message);
            };

            // --- TRACKING ---
            const verifyAndTrack = async () => {
                if(!trackToken) { alert("टोकन नंबर डालें!"); return; }
                setIsTracking(true);
                const res = await callAPI({action: "TRACK_STATUS", token: trackToken, mobile: trackMobile});
                setIsTracking(false);
                if(res.status === "SUCCESS") setTrackResult(res.fullData);
                else alert("❌ " + res.message);
            };

            // --- CUSTOMER EXTRA UPLOAD (+) ---
            const handleExtraUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                alert("⏳ अतिरिक्त दस्तावेज़ अपलोड हो रहा है...");
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const res = await callAPI({action: "CUSTOMER_EXTRA_UPLOAD", token: trackToken, file: {name: file.name, base64: ev.target.result, mimeType: file.type}});
                    if(res.status === "SUCCESS") { alert("✅ दस्तावेज़ सफलतापूर्वक जुड़ गया! स्टाफ को अलर्ट भेज दिया गया है।"); verifyAndTrack(); }
                    else alert("❌ Error: " + res.message);
                };
                reader.readAsDataURL(file);
            };

            // --- STAFF FUNCTIONS ---
            const handleStaffLogin = async () => {
                if(STAFF_CREDS[staffId] === staffPass) {
                    setIsStaffLoggedIn(true);
                    fetchPendingList();
                    callAPI({action: "STAFF_LOGIN", userId: staffId, password: staffPass});
                } else alert("❌ ID या पासवर्ड गलत है!");
            };

            const fetchPendingList = async () => {
                const res = await callAPI({action: "GET_ALL_PENDING"});
                if(res.status === "SUCCESS") setPendingList(res.list);
            };

            const openStaffEdit = (item) => {
                setEditingRow(item);
                setStaffUpdateData({status: item.data[2], vcTime: item.data[24] === "N/A" ? "" : item.data[24], note: item.data[28], sendBackReason: item.data[19], emitraToken: item.data[20]});
            };

            const submitStaffUpdate = async () => {
                alert("⏳ डेटा अपडेट हो रहा है...");
                let payload = { action: "STAFF_UPDATE_FORM", sheetName: editingRow.sheetName, rowIdx: editingRow.rowIdx, token: editingRow.data[1], newStatus: staffUpdateData.status, vcTime: staffUpdateData.vcTime, staffNote: staffUpdateData.note, sendBackReason: staffUpdateData.sendBackReason, emitraToken: staffUpdateData.emitraToken, vcStatus: staffUpdateData.vcTime ? "Approved" : editingRow.data[22] };
                
                if(staffCertRef.current && staffCertRef.current.files[0]) {
                    const file = staffCertRef.current.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        payload.staffFileBase64 = ev.target.result;
                        payload.staffFileMime = file.type;
                        await completeStaffUpdate(payload);
                    };
                    reader.readAsDataURL(file);
                } else { await completeStaffUpdate(payload); }
            };

            const completeStaffUpdate = async (payload) => {
                const res = await callAPI(payload);
                if(res.status === "SUCCESS") { alert("✅ स्टेटस अपडेट हो गया और मैसेज भेज दिया गया!"); setEditingRow(null); fetchPendingList(); }
            };

            const notifyOwner = async () => {
                let msg = prompt("हुकुम (मालिक) को क्या इमरजेंसी सन्देश भेजना है?");
                if(msg) { await callAPI({action: "NOTIFY_OWNER", staffId: staffId, message: msg}); alert("✅ मालिक को अलर्ट भेज दिया गया है!"); }
            };

            const reqs = SERVICE_REQUIREMENTS[selectedService] || { texts: [], docs: ['अतिरिक्त दस्तावेज़'] };

            return (
                <div className="min-h-screen pb-32">
                    {/* 📢 Marquee Alert */}
                    <div className="marquee-alert fixed top-0 w-full z-50 shadow-lg text-center uppercase">
                        <marquee>🏛️ DIGITAL PROBLEM SOLUTION GROUP : "आपकी समस्या, समाधान हमारा" | ⏰ महा-अलर्ट: पेंशन भौतिक सत्यापन शुरू हो गया है, तुरंत करवाएं! 🚩</marquee>
                    </div>

                    {/* 📞 FLOATING BUTTONS (बाहर दिखने वाले महा-बटन) */}
                    <div className="floating-bar fade-in">
                        <div onClick={()=>setShowVCModal(true)} className="float-btn float-vc" title="Live Video Call (No Token)"><i className="fa-solid fa-video"></i></div>
                        <a href={`tel:+${WHATSAPP_NUMBER}`} className="float-btn float-call" title="Direct Phone Call"><i className="fa-solid fa-phone-volume"></i></a>
                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${WHATSAPP_MSG}`} target="_blank" className="float-btn float-wa" title="WhatsApp Message"><i className="fa-brands fa-whatsapp"></i></a>
                        <a href="https://www.instagram.com/mahadev_ji_ka_daas?igsh=ZXJlOHh5ZDllZTBs" target="_blank" className="float-btn float-insta" title="Instagram Support"><i className="fa-brands fa-instagram"></i></a>
                    </div>

                    {/* 📹 DIRECT VC MODAL */}
                    {showVCModal && (
                        <div className="fixed inset-0 bg-black/95 z-[99999] flex justify-center items-center p-4">
                            <div className="glass-panel p-6 w-full max-w-md border-t-4 border-red-600 shadow-[0_0_40px_rgba(220,38,38,0.5)] fade-in">
                                <div className="flex justify-between items-center mb-6 border-b border-[#333] pb-4">
                                    <h3 className="text-xl font-black text-red-500 uppercase tracking-widest"><i className="fa-solid fa-video mr-2"></i> Live Video Call</h3>
                                    <i onClick={()=>setShowVCModal(false)} className="fa-solid fa-times text-2xl text-gray-400 cursor-pointer click-red"></i>
                                </div>
                                <form onSubmit={submitDirectVC} className="space-y-4">
                                    <input required type="text" placeholder="आपका पूरा नाम *" onChange={e=>setVcData({...vcData, name:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-red-500" />
                                    <input required type="tel" placeholder="मोबाइल नंबर *" onChange={e=>setVcData({...vcData, mobile:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-red-500" />
                                    <input required type="text" placeholder="आधार कार्ड नंबर *" onChange={e=>setVcData({...vcData, aadhaar:e.target.value})} className="w-full bg-red-900/20 p-4 rounded-xl text-white outline-none border border-red-500/50 focus:border-red-500 font-bold tracking-widest placeholder-red-300" />
                                    <textarea required placeholder="क्या जानकारी चाहिए? (समस्या लिखें) *" onChange={e=>setVcData({...vcData, problem:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-red-500"></textarea>
                                    <div>
                                        <label className="text-xs text-gray-400 mb-1 block uppercase font-bold">कॉल का माध्यम चुनें:</label>
                                        <select onChange={e=>setVcData({...vcData, medium:e.target.value})} className="w-full bg-[#000] p-4 rounded-xl text-white border border-[#333] font-bold">
                                            <option>Google Meet (Recommended & Secure)</option><option>WhatsApp</option><option>Instagram</option>
                                        </select>
                                    </div>
                                    <button type="submit" className="click-red w-full bg-red-600 text-white font-black py-4 rounded-xl text-lg uppercase tracking-widest shadow-[0_0_20px_rgba(220,38,38,0.5)] mt-4"><i className="fa-solid fa-phone-volume mr-2 animate-pulse"></i> रिक्वेस्ट भेजें</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-6xl mx-auto mt-16 fade-in">
                        {/* 🏠 HOME VIEW */}
                        {view === 'HOME' && (
                            <div>
                                <div className="text-center mb-12 border-b border-[#333] pb-10">
                                    <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">Digital Problem Solution Group</h2>
                                    <h1 className="text-7xl md:text-9xl font-black italic text-[#ffd700] drop-shadow-[0_0_30px_rgba(255,215,0,0.6)] mt-2">DPSG</h1>
                                    <p className="text-[#ff9900] font-black tracking-widest mt-6 bg-[#111] inline-block px-8 py-3 rounded-full border border-[#ff9900]/50 shadow-[0_0_20px_rgba(255,153,0,0.4)] uppercase">"आपकी समस्या, समाधान हमारा"</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="click-red glass-panel p-8 text-center shadow-xl border-t-4" style={{borderTopColor: dept.color}}>
                                            <i className={`fa-solid ${dept.icon} text-6xl mb-6 block`} style={{color: dept.color}}></i>
                                            <h3 className="text-xl font-black text-white uppercase tracking-wider">{dept.name}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5 mb-6 border-t border-[#333] pt-6">
                                                        <div>
                                                            <label className="text-xs text-gray-500 font-bold uppercase block mb-1">ई-मित्र टोकन / रसीद नंबर</label>
                                                            <input type="text" value={staffUpdateData.emitraToken} onChange={e=>setStaffUpdateData({...staffUpdateData, emitraToken:e.target.value})} placeholder="Emitra Token Number" className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#333] outline-none" />
                                                        </div>
                                                        <div>
                                                            <label className="text-xs text-gray-500 font-bold uppercase block mb-1">सर्टिफिकेट अपलोड (+) (Optional)</label>
                                                            <div className="relative">
                                                                <input type="file" ref={staffCertRef} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                                                                <div className="bg-[#111] p-4 rounded-xl border border-dashed border-[#ff9900] text-center text-[#ff9900] font-bold"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Choose File</div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    <button onClick={submitStaffUpdate} className="click-red w-full bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black font-black py-5 rounded-xl text-xl tracking-widest uppercase shadow-[0_0_20px_rgba(255,215,0,0.4)]"><i className="fa-solid fa-check-double mr-2"></i> Update & Notify Customer</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 VIP BOTTOM NAV */}
                    <div className="fixed bottom-0 w-full bg-[#000]/95 backdrop-blur-2xl border-t border-[#222] p-3 flex justify-around items-center z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.9)]">
                        <div onClick={() => setView('HOME')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='HOME'||view==='DEPT'||view==='FORM'?'bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black shadow-[0_0_15px_rgba(255,215,0,0.5)] transform scale-105':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-house text-xl mb-1"></i><span className="text-[10px] font-black uppercase tracking-widest">Home</span></div>
                        <div onClick={() => setView('TRACK')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='TRACK'?'bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.5)] transform scale-105':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-satellite-dish text-xl mb-1"></i><span className="text-[10px] font-black uppercase tracking-widest">Track</span></div>
                        <div onClick={() => setView('STAFF')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='STAFF'?'bg-red-600 text-white shadow-[0_0_15px_rgba(220,38,38,0.5)] transform scale-105':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-user-shield text-xl mb-1"></i><span className="text-[10px] font-black uppercase tracking-widest">Staff</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
