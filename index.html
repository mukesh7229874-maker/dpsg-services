<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPSG E-Mitra Portal | VIP Services</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .glass-panel { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        
        .click-red { transition: all 0.1s ease-in-out; cursor: pointer; }
        .click-red:active { transform: scale(0.95); }
        
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; font-size: 14px; letter-spacing: 1px; z-index: 100000;}
        
        /* 📞 HUGE FLOATING BUTTONS (विशाल बटन) */
        .floating-bar { position: fixed; right: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 9999; }
        .float-btn { width: 70px; height: 70px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 32px; color: white; box-shadow: 0 0 25px rgba(0,0,0,0.9); cursor: pointer; transition: 0.2s; border: 3px solid rgba(255,255,255,0.3); }
        .float-btn:hover { transform: scale(1.1); }
        .float-vc { background: #dc2626; animation: pulseRed 2s infinite; }
        .float-wa { background: #25D366; }
        .float-call { background: #2563eb; }
        
        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); } 70% { box-shadow: 0 0 0 25px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // 🛑 हुकुम का पक्का API लिंक
        const API_URL = "https://script.google.com/macros/s/AKfycbzXkKyBI6Dr7v9o_w9k7TRiKsO9wsUHiSasETE3i4EOO9GxprHOGaY3VCqSnTQA0sP97A/exec";
        
        const WHATSAPP_NUMBER = "918788418737"; 
        
        // 🛑 हुकुम के आदेशानुसार: वेब लिंक (स्टाफ के लिए) और टेक्स्ट लिंक (ग्राहक के व्हाट्सएप मैसेज के लिए)
        const GOOGLE_MEET_WEB_LINK = "https://meet.google.com/fdd-nbiw-ejb"; 
        const GOOGLE_MEET_TEXT_LINK = "Meet.google.com/fdd-nbiw-ejb"; // इसमें https:// नहीं है
        
        const WHATSAPP_MSG = encodeURIComponent("जय महादेव! 🚩 DPSG ई-मित्र, मुझे सरकारी सर्विस के बारे में जानकारी चाहिए। मेरा नाम ______ है।");

        const STAFF_CREDS = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020", "Chanchal@DPS": "Chanchal@6020" };

        // 🛑 ई-मित्र की 100% पूरी सेवाएं
        const DEPARTMENTS = [
            { 
                id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark-flag', color: '#ff9933', 
                services: ['आयुष्मान कार्ड (Ayushman Bharat)', 'नया पैन कार्ड', 'पैन कार्ड में सुधार', 'पैन-आधार लिंक', 'PM किसान सम्मान निधि', 'ई-श्रम कार्ड (E-Shram)', 'वोटर ID कार्ड (नया/सुधार)', 'पासपोर्ट आवेदन', 'PF (UAN) निकालना/केवाईसी'] 
            },
            { 
                id: 'State', name: 'राज्य सरकार / ई-मित्र', icon: 'fa-map-location-dot', color: '#ffffff', 
                services: ['पेंशन का वार्षिक भौतिक सत्यापन ⏰', 'नया जन-आधार कार्ड', 'जन-आधार में सुधार/सदस्य जोड़ना', 'जाति प्रमाण पत्र (OBC/SC/ST)', 'मूल निवास प्रमाण पत्र', 'EWS प्रमाण पत्र', 'जन्म प्रमाण पत्र', 'मृत्यु प्रमाण पत्र', 'पुलिस वेरिफिकेशन', 'राशन कार्ड (नया/सुधार)', 'मजदूर डायरी (श्रमिक कार्ड)', 'विवाह प्रमाण पत्र'] 
            },
            { 
                id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', 
                services: ['उत्तर मैट्रिक छात्रवृत्ति', 'CM उच्च शिक्षा छात्रवृत्ति', 'गार्गी पुरस्कार फॉर्म', 'स्कूटी योजना फॉर्म', 'RPSC / RSSB सरकारी फॉर्म', 'SSC / UPSC / Army फॉर्म', 'एडमिट कार्ड / रिजल्ट निकालना', 'कॉलेज/यूनिवर्सिटी एडमिशन फॉर्म'] 
            },
            { 
                id: 'Bank', name: 'महा-बैंकिंग व बीमा', icon: 'fa-building-columns', color: '#00ccff', 
                services: ['Airtel Payments Bank (खाता)', 'Kotak Mahindra 811', 'AEPS (आधार से पैसे निकालना)', 'DMT (मनी ट्रांसफर)', 'गाड़ी/बाइक का इंश्योरेंस ⏰', 'स्वास्थ्य बीमा (Health Insurance) ⏰', 'LIC प्रीमियम जमा', 'पुराने फँसे हुए पैसे की समस्या'] 
            },
            { 
                id: 'Tech', name: 'टेक व अनलॉकिंग', icon: 'fa-mobile-screen-button', color: '#ff3366', 
                services: ['iPhone (एप्पल) अनलॉक करना', 'Android (Pattern/Pin) अनलॉक', 'डेटा रिकवरी (फोटो/वीडियो वापस)', 'FRP बायपास', 'सॉफ्टवेयर इंस्टालेशन'] 
            },
            { 
                id: 'Other', name: 'अन्य महत्वपूर्ण सेवाएं', icon: 'fa-briefcase', color: '#ffd700', 
                services: ['किरायानामा (Rent Agreement)', 'शपथ पत्र (Affidavit)', 'टाइपिंग वर्क (हिंदी/English)', 'प्रोफेशनल रेज़्यूमे (Biodata)', 'ट्रेन टिकट (IRCTC)', 'फ्लाइट टिकट बुकिंग', 'वाहन RC/DL प्रिंट'] 
            }
        ];

        const SERVICE_REQUIREMENTS = {
            'नया पैन कार्ड': { texts: ['पिता का नाम', 'आधार नंबर'], docs: ['पासपोर्ट फोटो', 'हस्ताक्षर (Sign)', 'आधार फोटो'], askDate: false },
            'पेंशन का वार्षिक भौतिक सत्यापन ⏰': { texts: ['PPO नंबर', 'जन-आधार नंबर', 'आधार नंबर'], docs: ['पीपीओ डायरी की फोटो'], askDate: true },
            'Airtel Payments Bank (खाता)': { texts: ['आधार नंबर', 'नॉमिनी का नाम'], docs: ['आधार दोनों तरफ', 'लाइव फोटो'], askDate: false },
            'गाड़ी/बाइक का इंश्योरेंस ⏰': { texts: ['गाड़ी नंबर', 'आधार नंबर'], docs: ['पुरानी पॉलिसी की फोटो', 'RC बुक'], askDate: true },
            'स्वास्थ्य बीमा (Health Insurance) ⏰': { texts: ['पॉलिसी नंबर', 'आधार नंबर'], docs: ['पुरानी पॉलिसी की फोटो'], askDate: true },
            'जाति प्रमाण पत्र (OBC/SC/ST)': { texts: ['जन-आधार नंबर', 'राशन कार्ड नंबर'], docs: ['राशन कार्ड'], askDate: false },
            'उत्तर मैट्रिक छात्रवृत्ति': { texts: ['जन-आधार नंबर', 'मार्कशीट रोल नंबर'], docs: ['आय प्रमाण पत्र', 'मार्कशीट'], askDate: false }
        };

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', problemDesc: '', lastDate: '', vipId: '' });
            const [dynamicTextData, setDynamicTextData] = useState({});
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const extraDocRef = useRef(null);

            const [showVCModal, setShowVCModal] = useState(false);
            const [vcData, setVcData] = useState({name:'', mobile:'', aadhaar:'', problem:'', medium:'Google Meet'});

            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [pendingList, setPendingList] = useState([]);
            const [editingRow, setEditingRow] = useState(null);
            const [staffUpdateData, setStaffUpdateData] = useState({status: '', vcTime: '', note: '', sendBackReason: '', newVerifyDate: '', emitraToken: ''});
            const staffCertRef = useRef(null);

            const callAPI = async (payload) => {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await response.json();
            };

            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 15 * 1024 * 1024) { alert("फाइल 15MB से छोटी होनी चाहिए!"); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { name: file.name, base64: ev.target.result, mimeType: file.type }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const submitForm = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Student' ? 'Student_Services' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService, vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc, lastDate: formData.lastDate,
                    dynamicFields: dynamicTextData, files: uploadedFiles
                };
                const res = await callAPI(payload);
                setIsUploading(false);
                if(res.status === "SUCCESS") {
                    alert("✅ शानदार! काम बुक हो गया। आपका टोकन: " + res.token);
                    setView('HOME'); setFormData({name:'', mobile:'', address:'', problemDesc:'', lastDate:'', vipId:''}); setDynamicTextData({}); setUploadedFiles([]);
                } else alert("❌ Error: " + res.message);
            };

            const trackStatus = async () => {
                if(!trackToken) { alert("टोकन नंबर डालें!"); return; }
                setIsTracking(true);
                const res = await callAPI({action: "TRACK_STATUS", token: trackToken, mobile: trackMobile});
                setIsTracking(false);
                if(res.status === "SUCCESS") setTrackResult(res.fullData);
                else alert("❌ " + res.message);
            };

            const handleExtraUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                alert("⏳ अतिरिक्त दस्तावेज़ अपलोड हो रहा है...");
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const res = await callAPI({action: "CUSTOMER_EXTRA_UPLOAD", token: trackToken, file: {name: file.name, base64: ev.target.result, mimeType: file.type}});
                    if(res.status === "SUCCESS") { alert("✅ दस्तावेज़ सफलतापूर्वक जुड़ गया!"); trackStatus(); }
                };
                reader.readAsDataURL(file);
            };

            const submitDirectVC = async (e) => {
                e.preventDefault();
                alert("🔴 स्टाफ को सायरन भेजा जा रहा है...");
                const res = await callAPI({action: "DIRECT_VC_REQ", ...vcData});
                if(res.status === "SUCCESS") { alert("✅ रिक्वेस्ट भेज दी गई है!"); setShowVCModal(false); }
            };

            const handleStaffLogin = async () => {
                if(STAFF_CREDS[staffId] === staffPass) { setIsStaffLoggedIn(true); fetchPendingList(); callAPI({action: "STAFF_LOGIN", userId: staffId, password: staffPass}); }
                else alert("❌ ID या पासवर्ड गलत है!");
            };

            const fetchPendingList = async () => {
                const res = await callAPI({action: "GET_ALL_PENDING"});
                if(res.status === "SUCCESS") setPendingList(res.list);
            };

            const openStaffEdit = (item) => {
                setEditingRow(item);
                setStaffUpdateData({status: item.data[2], vcTime: item.data[24] === "N/A" ? "" : item.data[24], note: item.data[28], sendBackReason: item.data[19], newVerifyDate: item.data[26] === "लागू नहीं" ? "" : item.data[26], emitraToken: item.data[20]});
            };

            const submitStaffUpdate = async () => {
                alert("⏳ डेटा अपडेट हो रहा है...");
                let payload = { action: "STAFF_UPDATE_FORM", sheetName: editingRow.sheetName, rowIdx: editingRow.rowIdx, token: editingRow.data[1], newStatus: staffUpdateData.status, vcTime: staffUpdateData.vcTime, staffNote: staffUpdateData.note, sendBackReason: staffUpdateData.sendBackReason, emitraToken: staffUpdateData.emitraToken, lastDate: staffUpdateData.newVerifyDate, vcStatus: staffUpdateData.vcTime ? "Approved" : editingRow.data[22] };
                
                if(staffCertRef.current && staffCertRef.current.files[0]) {
                    const file = staffCertRef.current.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        payload.staffFileBase64 = ev.target.result; payload.staffFileMime = file.type;
                        await processStaffUpdateResult(payload);
                    };
                    reader.readAsDataURL(file);
                } else { await processStaffUpdateResult(payload); }
            };

            const processStaffUpdateResult = async (payload) => {
                const res = await callAPI(payload);
                if(res.status === "SUCCESS") { 
                    alert("✅ स्टेटस अपडेट हो गया! अब ग्राहक को व्हाट्सएप मैसेज भेजें।"); 
                    setEditingRow(null); fetchPendingList(); 
                }
            };

            const getLink = (markdown) => {
                const match = markdown ? markdown.match(/\((.*?)\)/) : null;
                return match ? match[1] : null;
            };

            const reqs = SERVICE_REQUIREMENTS[selectedService] || { texts: [], docs: ['अतिरिक्त दस्तावेज़'], askDate: false };

            return (
                <div className="min-h-screen pb-32">
                    <div className="marquee-alert fixed top-0 w-full">
                        <marquee>🏛️ DIGITAL PROBLEM SOLUTION GROUP : "आपकी समस्या, समाधान हमारा" | ⏰ महा-अलर्ट: पेंशन भौतिक सत्यापन शुरू हो गया है! 🚩</marquee>
                    </div>

                    {/* 📞 HUGE FLOATING BUTTONS */}
                    <div className="floating-bar fade-in">
                        <div onClick={()=>setShowVCModal(true)} className="float-btn float-vc" title="Live Video Call"><i className="fa-solid fa-video"></i></div>
                        <a href={`tel:+${WHATSAPP_NUMBER}`} className="float-btn float-call" title="Call Us"><i className="fa-solid fa-phone-volume"></i></a>
                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${WHATSAPP_MSG}`} target="_blank" className="float-btn float-wa" title="WhatsApp Message"><i className="fa-brands fa-whatsapp"></i></a>
                    </div>

                    {/* 📹 DIRECT VC MODAL */}
                    {showVCModal && (
                        <div className="fixed inset-0 bg-black/95 z-[99999] flex justify-center items-center p-4 fade-in">

                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-2xl font-black text-red-500 uppercase"><i className="fa-solid fa-video mr-2"></i> Live Video Call</h3>
                                    <i onClick={()=>setShowVCModal(false)} className="fa-solid fa-times text-4xl text-gray-400 cursor-pointer click-red"></i>
                                </div>
                                <form onSubmit={submitDirectVC} className="space-y-5">

                                    <input required type="tel" placeholder="मोबाइल नंबर *" onChange={e=>setVcData({...vcData, mobile:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white outline-none border border-[#333] text-lg" />
                                    <input required type="text" placeholder="आधार कार्ड नंबर *" onChange={e=>setVcData({...vcData, aadhaar:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white outline-none border border-red-500 text-lg" />
                                    <textarea required placeholder="क्या जानकारी चाहिए? *" onChange={e=>setVcData({...vcData, problem:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white outline-none border border-[#333] text-lg"></textarea>
                                    <select onChange={e=>setVcData({...vcData, medium:e.target.value})} className="w-full bg-[#000] p-5 rounded-xl text-white border border-[#333] font-bold text-lg">
                                        <option>Google Meet (Secure)</option><option>WhatsApp</option><option>Instagram</option>
                                    </select>
                                    <button type="submit" className="click-red w-full bg-red-600 text-white font-black py-5 rounded-xl text-2xl uppercase shadow-[0_0_20px_rgba(220,38,38,0.5)]">रिक्वेस्ट भेजें</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-7xl mx-auto mt-16 fade-in">
                        {/* 🏠 HOME */}
                        {view === 'HOME' && (
                            <div>
                                <div className="text-center mb-16 border-b border-[#333] pb-10 mt-6">
                                    <h2 className="text-4xl md:text-5xl font-black text-white uppercase tracking-widest drop-shadow-lg">Digital Problem Solution Group</h2>
                                    <h1 className="text-8xl md:text-[150px] font-black italic text-[#ffd700] mt-2 drop-shadow-[0_0_40px_rgba(255,215,0,0.5)]">DPSG</h1>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="click-red glass-panel p-10 text-center border-t-4 hover:bg-[#111]" style={{borderTopColor: dept.color}}>
                                            <i className={`fa-solid ${dept.icon} text-7xl mb-6 block`} style={{color: dept.color}}></i>
                                            <h3 className="text-2xl font-black uppercase tracking-wider">{dept.name}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📋 SERVICE LIST */}
                        {view === 'DEPT' && selectedDept && (
                            <div className="max-w-5xl mx-auto">
                                <button onClick={() => setView('HOME')} className="click-red text-[#ffd700] font-black mb-8 bg-[#111] px-8 py-4 rounded-xl border border-[#333] text-lg"><i className="fa-solid fa-arrow-left mr-2"></i> होम पर जाएं</button>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    {selectedDept.services.map(srv => (
                                        <div key={srv} onClick={() => { setSelectedService(srv); setView('FORM'); }} className="click-red bg-[#0a0a0a] border border-[#222] p-8 rounded-2xl flex justify-between items-center shadow-lg hover:border-[#ffd700]">
                                            <span className="font-black text-xl text-white">{srv}</span> <i className="fa-solid fa-chevron-right text-[#ffd700] text-2xl"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📝 FORM */}
                        {view === 'FORM' && (
                            <div className="max-w-4xl mx-auto">
                                <button onClick={() => setView('DEPT')} className="click-red text-[#ffd700] font-black mb-6"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                                <div className="glass-panel p-10 border-t-4 border-[#ffd700] shadow-2xl">
                                    <h2 className="text-3xl font-black text-[#ffd700] mb-8 border-b border-[#333] pb-4">{selectedService}</h2>
                                    <form onSubmit={submitForm} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                            <input required type="text" placeholder="पूरा नाम *" onChange={e=>setFormData({...formData, name:e.target.value})} className="bg-[#111] p-5 rounded-xl text-white outline-none border border-[#333] text-lg" />
                                            <input required type="tel" placeholder="मोबाइल नंबर *" onChange={e=>setFormData({...formData, mobile:e.target.value})} className="bg-[#111] p-5 rounded-xl text-white outline-none border border-[#333] text-lg" />
                                        </div>
                                        <input required type="text" placeholder="पूरा पता (Address) *" onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] text-lg" />

                                        {/* 📅 सत्यापन तिथि */}
                                        {reqs.askDate && (
                                            <div className="bg-yellow-900/20 p-6 rounded-2xl border border-yellow-500/50">
                                                <label className="text-yellow-400 font-black mb-2 block uppercase text-sm"><i className="fa-regular fa-calendar-check mr-2"></i> पिछली सत्यापन/पॉलिसी तिथि चुनें (यदि याद हो)</label>
                                                <input type="date" onChange={e=>setFormData({...formData, lastDate:e.target.value})} className="w-full bg-[#000] p-5 rounded-xl text-white border border-[#333] font-bold text-lg" />
                                            </div>
                                        )}

                                        {reqs.texts.length > 0 && (
                                            <div className="bg-blue-900/20 p-6 rounded-2xl border border-blue-500/50">
                                                <h3 className="text-blue-400 font-black mb-4 uppercase text-lg"><i className="fa-solid fa-circle-info mr-2"></i> पक्की जानकारी डालें:</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                                    {reqs.texts.map(lbl => (
                                                        <input required key={lbl} type="text" placeholder={`${lbl} डालें *`} onChange={e=>setDynamicTextData({...dynamicTextData, [lbl]: e.target.value})} className="w-full bg-[#000] p-5 rounded-xl text-white border border-[#333] font-bold text-lg" />
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <textarea required rows="4" placeholder="✍️ समस्या या कार्य का विवरण... *" onChange={e=>setFormData({...formData, problemDesc:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white outline-none border border-[#333] text-lg"></textarea>

                                        <div className="border-t border-[#333] pt-8 mt-8">
                                            <h3 className="text-white font-black uppercase mb-4 text-xl"><i className="fa-solid fa-folder-open text-[#ffd700] mr-2"></i> दस्तावेज़ अपलोड करें</h3>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-5">
                                                {uploadedFiles.map((f, i) => (
                                                    <div key={i} className="bg-green-900/30 p-5 rounded-xl border border-green-500 text-center truncate"><i className="fa-solid fa-check text-green-500 text-2xl mb-2"></i><p className="text-xs">{f.name}</p></div>
                                                ))}
                                                <div onClick={()=>fileInputRef.current.click()} className="click-red bg-[#111] border-2 border-dashed border-[#ff9900] p-5 rounded-xl text-center flex flex-col justify-center items-center h-32 cursor-pointer">
                                                    <i className="fa-solid fa-plus text-4xl text-[#ff9900] mb-2"></i><p className="text-xs text-[#ff9900] font-black uppercase">Add File</p>
                                                </div>
                                                <input type="file" multiple ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,application/pdf" />
                                            </div>
                                        </div>

                                        <button type="submit" disabled={isUploading} className="click-red w-full bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black font-black py-6 rounded-xl text-2xl uppercase tracking-widest mt-10 shadow-[0_0_20px_rgba(255,215,0,0.5)]">
                                            {isUploading ? "⏳ अपलोड हो रहा है..." : "फॉर्म सबमिट करें"}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 🔍 TRACKING */}
                        {view === 'TRACK' && (
                            <div className="max-w-2xl mx-auto glass-panel p-10 text-center border-t-4 border-blue-500 shadow-2xl">
                                <h2 className="text-4xl font-black mb-8 uppercase text-white">Live Tracking</h2>
                                <input type="text" placeholder="टोकन नंबर (उदा: DPSG-...)" onChange={e=>setTrackToken(e.target.value)} className="w-full bg-[#111] p-6 rounded-xl border border-[#333] text-center font-black text-white uppercase mb-6 focus:border-blue-500 outline-none text-xl" />
                                <button onClick={trackStatus} disabled={isTracking} className="click-red w-full bg-blue-600 text-white font-black py-6 rounded-xl text-2xl uppercase shadow-[0_0_20px_rgba(37,99,235,0.5)]"><i className="fa-solid fa-magnifying-glass mr-2"></i> स्टेटस चेक करें</button>

                                {trackResult && (
                                    <div className="mt-10 bg-[#050505] p-8 rounded-2xl border border-[#222] text-left shadow-inner">
                                        <p className="text-lg font-bold text-gray-400">नाम: <span className="text-white ml-2">{trackResult[4]}</span></p>
                                        <p className="text-lg font-bold text-gray-400 mt-2">स्थिति: <span className={`ml-2 px-4 py-1 rounded-full text-sm font-black uppercase ${trackResult[2]==='Done'?'bg-green-900/50 text-green-400':trackResult[2]==='Send Back'?'bg-red-900/50 text-red-400':'bg-yellow-900/50 text-yellow-400'}`}>{trackResult[2]}</span></p>
                                        
                                        <div className="bg-[#111] p-5 rounded-xl border border-[#333] mt-6">
                                            <p className="text-[#ffd700] text-sm font-black uppercase mb-2">👨‍💻 स्टाफ का नोट:</p>
                                            <p className="text-white text-lg">{trackResult[28]}</p>
                                        </div>

                                        {trackResult[27] && trackResult[27] !== "लागू नहीं" && (
                                            <div className="bg-blue-900/30 p-5 rounded-xl border border-blue-500 mt-6 text-center">
                                                <p className="text-blue-400 font-bold text-sm uppercase">अगली सत्यापन/रिन्यूअल तिथि:</p>
                                                <p className="text-white font-black text-2xl mt-1">{trackResult[27]}</p>
                                            </div>
                                        )}

                                        {trackResult[2] === "Send Back" && (
                                            <div className="bg-red-900/20 p-6 rounded-xl border border-dashed border-red-500 text-center mt-6">
                                                <p className="text-lg text-red-400 font-bold mb-4">⚠️ कमी: {trackResult[19]}</p>
                                                <button onClick={()=>extraDocRef.current.click()} className="click-red bg-red-600 text-white px-8 py-4 rounded-full font-black uppercase text-lg"><i className="fa-solid fa-plus mr-2"></i> दस्तावेज़ जोड़ें (+)</button>
                                                <input type="file" ref={extraDocRef} onChange={handleExtraUpload} className="hidden" accept="image/*,application/pdf" />
                                            </div>
                                        )}

                                        {trackResult[21] && (
                                            <a href={getLink(trackResult[21])} target="_blank" className="mt-6 block text-center bg-green-600 py-5 rounded-xl font-black text-white text-xl"><i className="fa-solid fa-download mr-2"></i> Download Certificate</a>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 👨‍💻 STAFF PANEL (WITH WHATSAPP AUTO-MSG FIX) */}
                        {view === 'STAFF' && (
                            <div className="max-w-6xl mx-auto">
                                {!isStaffLoggedIn ? (
                                    <div className="glass-panel p-10 max-w-lg mx-auto text-center border-t-4 border-red-600 shadow-2xl">
                                        <h2 className="text-3xl font-black mb-8 uppercase text-white">Staff Login</h2>
                                        <input type="text" placeholder="Staff ID" onChange={e=>setStaffId(e.target.value)} className="w-full bg-[#111] p-6 rounded-xl border border-[#333] mb-5 text-center text-white font-bold outline-none text-xl" />
                                        <input type="password" placeholder="Password" onChange={e=>setStaffPass(e.target.value)} className="w-full bg-[#111] p-6 rounded-xl border border-[#333] mb-8 text-center text-white font-bold outline-none text-xl" />
                                        <button onClick={handleStaffLogin} className="click-red w-full bg-red-600 text-white font-black py-6 rounded-xl uppercase tracking-widest text-xl">Login</button>
                                    </div>
                                ) : (
                                    <div className="glass-panel p-8 border-t-4 border-red-600 shadow-2xl">
                                        <div className="flex justify-between items-center border-b border-[#333] pb-6 mb-8">
                                            <h2 className="text-3xl font-black text-white uppercase">Control Room</h2>
                                            <button onClick={fetchPendingList} className="bg-[#111] text-[#ffd700] px-6 py-3 rounded-xl border border-[#333] text-xl"><i className="fa-solid fa-rotate"></i> Refresh</button>
                                        </div>

                                        {!editingRow ? (
                                            <div className="space-y-5">
                                                {pendingList.map((item, idx) => (
                                                    <div key={idx} onClick={()=>openStaffEdit(item)} className="click-red bg-[#0a0a0a] p-6 rounded-2xl border border-[#222] border-l-[6px] hover:bg-[#111] cursor-pointer flex justify-between items-center" style={{borderLeftColor: item.data[2]==='Send Back'?'#ef4444':'#ffd700'}}>
                                                        <div>
                                                            <p className="font-black text-white text-xl">{item.data[4]} <span className="text-sm text-gray-500 ml-2">({item.data[1]})</span></p>
                                                            <p className="text-base font-bold text-gray-400 mt-2">{item.data[8]}</p>
                                                        </div>
                                                        <span className="text-sm font-black uppercase bg-[#111] border border-[#333] px-4 py-2 rounded-full">{item.data[2]}</span>
                                                    </div>
                                                ))}
                                                {pendingList.length === 0 && <p className="text-center text-gray-500 py-10 text-xl font-bold uppercase">कोई काम पेंडिंग नहीं है!</p>}
                                            </div>
                                        ) : (
                                            <div className="fade-in">
                                                <button onClick={()=>setEditingRow(null)} className="text-[#ffd700] font-black mb-6 text-lg"><i className="fa-solid fa-arrow-left mr-2"></i> वापस लिस्ट पर</button>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                                                    {/* BIO DATA & LINKS */}
                                                    <div className="bg-[#050505] p-8 rounded-2xl border border-[#222]">
                                                        <h3 className="text-[#ffd700] font-black text-xl uppercase mb-6"><i className="fa-solid fa-address-card mr-2"></i> Bio-Data</h3>
                                                        <div className="text-base space-y-3 mb-6">
                                                            <p><span className="text-gray-500 font-bold uppercase block text-xs">Customer Name & Mobile:</span> <span className="text-white font-bold">{editingRow.data[4]} | {editingRow.data[5]}</span></p>
                                                            <p><span className="text-gray-500 font-bold uppercase block text-xs">Aadhaar/PPO:</span> <span className="text-white font-bold">{editingRow.data[9]} / {editingRow.data[11]}</span></p>
                                                            <p><span className="text-gray-500 font-bold uppercase block text-xs">Problem:</span> <span className="text-white">{editingRow.data[14]}</span></p>
                                                            <p><span className="text-gray-500 font-bold uppercase block text-xs">VC Request:</span> <span className="text-red-400 font-bold">{editingRow.data[22]} ({editingRow.data[23]})</span></p>
                                                        </div>
                                                        
                                                        {/* CLICKABLE FILE LINKS */}
                                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-3 border-t border-[#222] pt-6 mt-6">
                                                            {[15,16,17,18,19].map(col => {
                                                                const link = getLink(editingRow.data[col]);
                                                                if(link) return <a href={link} target="_blank" className="bg-blue-900/30 border border-blue-500 p-3 rounded-xl text-center text-blue-400 text-sm font-bold hover:bg-blue-600 hover:text-white transition"><i className="fa-solid fa-file-image block text-2xl mb-2"></i> View Doc</a>
                                                                return null;
                                                            })}
                                                        </div>
                                                    </div>

                                                    {/* 🚨 URGENT & COMMUNICATION ACTIONS (FIXED LINK) */}
                                                    <div className="bg-[#111] p-8 rounded-2xl border border-[#333]">
                                                        <h3 className="text-white font-black text-xl uppercase mb-6"><i className="fa-solid fa-bolt text-red-500 mr-2"></i> Communication Panel</h3>
                                                        
                                                        <div className="space-y-4 mb-8">
                                                            {/* 🚨 JOIN VIDEO CALL NOW BUTTON (Staff Browser Link with HTTPS) */}
                                                            <a href={GOOGLE_MEET_WEB_LINK} target="_blank" className="click-red flex justify-center items-center w-full bg-red-600 text-white py-4 rounded-xl font-black text-lg shadow-[0_0_15px_rgba(220,38,38,0.5)]">
                                                                <i className="fa-solid fa-video mr-3 animate-pulse"></i> 🔴 JOIN VIDEO CALL NOW
                                                            </a>
                                                            
                                                            {/* 🟢 WHATSAPP AUTO-MSG BUTTON (Customer Text Link without HTTPS) */}
                                                            <a href={`https://wa.me/91${editingRow.data[5]}?text=${encodeURIComponent(`जय महादेव! 🚩 प्रिय ग्राहक, DPSG ई-मित्र से आपकी समस्या के समाधान के लिए लाइव वीडियो कॉल का समय ${staffUpdateData.vcTime || 'तय'} किया गया है। कृपया इस लिंक से जुड़ें: ${GOOGLE_MEET_TEXT_LINK}`)}`} target="_blank" className="click-red flex justify-center items-center w-full bg-green-600 text-white py-4 rounded-xl font-black text-lg">
                                                                <i className="fa-brands fa-whatsapp mr-3"></i> WhatsApp Auto-Msg (VC Link)
                                                            </a>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* UPDATE SECTION (WITH DATE) */}
                                                <div className="bg-[#050505] p-8 rounded-2xl border border-[#222]">
                                                    <h3 className="text-[#ffd700] font-black text-xl uppercase mb-8"><i className="fa-solid fa-pen-to-square mr-2"></i> Update Status & Date</h3>
                                                    
                                                    {/* 📅 नई सत्यापन तिथि */}
                                                    <div className="mb-6 bg-yellow-900/20 p-5 rounded-xl border border-yellow-500/50">
                                                        <label className="text-yellow-400 font-bold text-sm uppercase block mb-3">नई सत्यापन/रिन्यूअल तिथि डालें (आज का काम):</label>
                                                        <input type="date" value={staffUpdateData.newVerifyDate} onChange={e=>setStaffUpdateData({...staffUpdateData, newVerifyDate:e.target.value})} className="w-full bg-[#000] p-5 rounded-xl text-white border border-[#333] outline-none font-bold text-lg" />
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                                        <select value={staffUpdateData.status} onChange={e=>setStaffUpdateData({...staffUpdateData, status:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] font-bold text-lg">
                                                            <option>Pending</option><option>In Process</option><option>Send Back</option><option>Done</option>
                                                        </select>
                                                        <input type="text" value={staffUpdateData.note} onChange={e=>setStaffUpdateData({...staffUpdateData, note:e.target.value})} placeholder="Staff Note (For Customer)..." className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] text-lg" />
                                                    </div>
                                                    
                                                    {staffUpdateData.status === "Send Back" && (
                                                        <input type="text" value={staffUpdateData.sendBackReason} onChange={e=>setStaffUpdateData({...staffUpdateData, sendBackReason:e.target.value})} placeholder="Send Back Reason (e.g. Upload Aadhaar)..." className="w-full bg-[#000] p-5 rounded-xl text-white border border-red-900 mb-6 text-lg" />
                                                    )}

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
                                                        <input type="text" value={staffUpdateData.vcTime} onChange={e=>setStaffUpdateData({...staffUpdateData, vcTime:e.target.value})} placeholder="Video Call Time (e.g. 04:30 PM)" className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] text-lg" />
                                                        <div className="relative">
                                                            <input type="file" ref={staffCertRef} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                                                            <div className="bg-[#111] p-5 rounded-xl border border-dashed border-[#ff9900] text-center text-[#ff9900] font-bold text-lg"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Upload Certificate</div>
                                                        </div>
                                                    </div>

                                                    <button onClick={submitStaffUpdate} className="click-red w-full bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black font-black py-6 rounded-xl text-2xl uppercase tracking-widest"><i className="fa-solid fa-check-double mr-2"></i> Update Data</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 BOTTOM NAV */}
                    <div className="fixed bottom-0 w-full bg-[#000]/95 border-t border-[#222] p-4 flex justify-around items-center z-50">
                        <div onClick={() => setView('HOME')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='HOME'||view==='DEPT'||view==='FORM'?'bg-[#ffd700] text-black':'text-gray-500'}`}><i className="fa-solid fa-house text-2xl"></i></div>
                        <div onClick={() => setView('TRACK')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='TRACK'?'bg-blue-600 text-white':'text-gray-500'}`}><i className="fa-solid fa-satellite-dish text-2xl"></i></div>
                        <div onClick={() => setView('STAFF')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='STAFF'?'bg-red-600 text-white':'text-gray-500'}`}><i className="fa-solid fa-user-shield text-2xl"></i></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
