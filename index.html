                                                            <i className="fa-brands fa-whatsapp mr-3 text-3xl"></i> 1. ग्राहक को सूचित करें {popupClicks.customer && "✅"}
                                                        </a>
                                                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${getFullDetailMessage('owner')}`} target="_blank" onClick={()=>setPopupClicks({...popupClicks, owner:true})} className={`flex justify-center items-center w-full py-5 rounded-xl font-black text-xl transition ${popupClicks.owner ? 'bg-blue-900 border border-blue-500 text-blue-300' : 'bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.5)]'}`}>
                                                            <i className="fa-brands fa-whatsapp mr-3 text-3xl"></i> 2. Owner को सूचित करें {popupClicks.owner && "✅"}
                                                        </a>
                                                        <a href={GROUP_WHATSAPP_LINK} target="_blank" onClick={()=>setPopupClicks({...popupClicks, group:true})} className={`flex justify-center items-center w-full py-5 rounded-xl font-black text-xl transition ${popupClicks.group ? 'bg-indigo-900 border border-indigo-500 text-indigo-300' : 'bg-indigo-600 text-white shadow-[0_0_15px_rgba(79,70,229,0.5)]'}`}>
                                                            <i className="fa-brands fa-whatsapp mr-3 text-3xl"></i> 3. ग्रुप में सूचित करें {popupClicks.group && "✅"}
                                                        </a>
                                                    </div>
                                                    
                                                    <button onClick={closeMandatoryPopup} disabled={!(popupClicks.customer && popupClicks.owner && popupClicks.group)} className={`w-full py-6 rounded-xl font-black uppercase tracking-widest text-2xl transition ${popupClicks.customer && popupClicks.owner && popupClicks.group ? 'bg-[#ffd700] text-black shadow-[0_0_20px_rgba(255,215,0,0.5)] click-red' : 'bg-gray-800 text-gray-600 cursor-not-allowed'}`}>
                                                        {popupClicks.customer && popupClicks.owner && popupClicks.group ? "ओके, डन करें" : "तीनों बटन दबाएं..."}
                                                    </button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="flex justify-between items-center border-b border-[#333] pb-6 mb-8">
                                            <h2 className="text-3xl font-black text-white uppercase"><i className="fa-solid fa-laptop-code mr-3 text-red-500"></i> Control Room</h2>
                                            <button onClick={fetchPendingList} className="bg-[#111] text-[#ffd700] px-6 py-3 rounded-xl border border-[#333] font-bold text-lg hover:bg-[#1a1a1a]"><i className="fa-solid fa-rotate mr-2"></i> Refresh</button>
                                        </div>

                                        {!editingRow ? (
                                            <div className="space-y-5">
                                                {pendingList.map((item, idx) => (
                                                    <div key={idx} onClick={()=>openStaffEdit(item)} className="click-red bg-[#0a0a0a] p-6 rounded-2xl border border-[#222] border-l-[8px] shadow-lg hover:bg-[#111] cursor-pointer flex justify-between items-center transition" style={{borderLeftColor: item.data[2]==='Send Back'?'#ef4444':'#f59e0b'}}>
                                                        <div>
                                                            <p className="font-black text-white text-2xl">{item.data[4]} <span className="text-sm font-bold bg-[#111] text-gray-400 px-3 py-1 rounded-lg ml-3 border border-[#333]">{item.data[1]}</span></p>
                                                            <p className="text-lg font-bold text-[#ffd700] mt-2">{item.data[8]}</p>
                                                        </div>
                                                        <span className={`text-sm font-black uppercase px-4 py-2 rounded-full border ${item.data[2]==='Send Back' ? 'bg-red-900/30 text-red-500 border-red-500/50' : 'bg-yellow-900/30 text-yellow-500 border-yellow-500/50'}`}>{item.data[2]}</span>
                                                    </div>
                                                ))}
                                                {pendingList.length === 0 && <div className="text-center py-20"><i className="fa-solid fa-mug-hot text-7xl text-gray-600 mb-6 block"></i><p className="text-gray-500 text-2xl font-black uppercase">कोई काम पेंडिंग नहीं है!</p></div>}
                                            </div>
                                        ) : (
                                            <div className="fade-in">
                                                <button onClick={()=>setEditingRow(null)} className="text-[#ffd700] font-black mb-8 hover:underline text-lg"><i className="fa-solid fa-arrow-left mr-2"></i> वापस लिस्ट पर</button>
                                                
                                                <div className="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-10">
                                                    {/* 📝 CLEAR BIO DATA (साफ़-साफ़ डिब्बे) */}
                                                    <div className="bg-[#050505] p-8 rounded-2xl border border-[#222] shadow-lg">
                                                        <h3 className="text-[#ffd700] font-black text-2xl uppercase mb-8 border-b border-[#333] pb-4"><i className="fa-solid fa-address-card mr-2 text-white"></i> ग्राहक की पूरी डिटेल</h3>
                                                        
                                                        <div className="space-y-4 mb-8">
                                                            <div className="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                                                                <span className="text-gray-500 font-bold uppercase text-xs">नाम व मोबाइल:</span>
                                                                <span className="text-white font-black text-lg">{editingRow.data[4]} | {editingRow.data[5]}</span>
                                                            </div>
                                                            <div className="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                                                                <span className="text-gray-500 font-bold uppercase text-xs">कैटेगरी:</span>
                                                                <span className="text-[#ffd700] font-black text-lg">{editingRow.data[7] || 'N/A'}</span>
                                                            </div>
                                                            <div className="bg-[#111] p-4 rounded-xl border border-[#333] flex justify-between items-center">
                                                                <span className="text-gray-500 font-bold uppercase text-xs">सर्विस का नाम:</span>
                                                                <span className="text-[#3399ff] font-black text-lg">{editingRow.data[8]}</span>
                                                            </div>
                                                            
                                                            {/* Dynamic Boxes for Docs */}
                                                            {editingRow.data[9] && (
                                                                <div className="bg-blue-900/20 p-4 rounded-xl border border-blue-500/50 flex justify-between items-center">
                                                                    <span className="text-blue-400 font-bold uppercase text-xs">डिटेल 1 (आधार आदि):</span>
                                                                    <span className="text-white font-black text-lg">{editingRow.data[9]}</span>
                                                                </div>
                                                            )}
                                                            {editingRow.data[10] && (
                                                                <div className="bg-green-900/20 p-4 rounded-xl border border-green-500/50 flex justify-between items-center">
                                                                    <span className="text-green-400 font-bold uppercase text-xs">डिटेल 2 (जन-आधार आदि):</span>
                                                                    <span className="text-white font-black text-lg">{editingRow.data[10]}</span>
                                                                </div>
                                                            )}
                                                            {editingRow.data[11] && (
                                                                <div className="bg-purple-900/20 p-4 rounded-xl border border-purple-500/50 flex justify-between items-center">
                                                                    <span className="text-purple-400 font-bold uppercase text-xs">अन्य डिटेल:</span>
                                                                    <span className="text-white font-black text-lg">{editingRow.data[11]}</span>
                                                                </div>
                                                            )}
                                                            
                                                            <div className="bg-gray-900 p-5 rounded-xl border border-gray-700 mt-4">
                                                                <span className="text-gray-400 font-bold uppercase text-xs block mb-2">समस्या / कार्य विवरण:</span>
                                                                <span className="text-white font-bold text-lg italic block">{editingRow.data[14]}</span>
                                                            </div>
                                                        </div>
                                                        
                                                        {/* CLICKABLE FILE LINKS */}
                                                        <p className="text-sm text-gray-500 font-black uppercase mb-3">अपलोड किये गए दस्तावेज़:</p>
                                                        <div className="grid grid-cols-2 gap-4">
                                                            {[15,16,17,18,19].map(col => {
                                                                const link = getLink(editingRow.data[col]);
                                                                if(link) return <a key={col} href={link} target="_blank" className="bg-[#111] border border-[#333] p-4 rounded-xl text-center text-white text-sm font-bold hover:bg-[#222] hover:border-[#ffd700] transition shadow-md"><i className="fa-solid fa-file-pdf block text-3xl mb-2 text-red-500"></i> View File</a>
                                                                return null;
                                                            })}
                                                        </div>
                                                    </div>

                                                    {/* 🚨 COMMUNICATION PANEL (प्रोफेशनल बटन) */}
                                                    <div className="bg-[#050505] p-8 rounded-2xl border border-[#222] shadow-lg flex flex-col justify-start">
                                                        <h3 className="text-white font-black text-2xl uppercase mb-8 border-b border-[#333] pb-4"><i className="fa-solid fa-bolt text-red-500 mr-2"></i> Quick Actions</h3>
                                                        <div className="space-y-6">
                                                            <a href={GOOGLE_MEET_WEB_LINK} target="_blank" className="click-red flex justify-center items-center w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl shadow-[0_0_20px_rgba(220,38,38,0.5)] hover:bg-red-700 transition">
                                                                <i className="fa-solid fa-video mr-3 animate-pulse"></i> खुद वीडियो कॉल से जुड़ें
                                                            </a>
                                                            
                                                            {/* 📹 ग्राहक को वीडियो कॉल लिंक भेजें - WhatsApp Professional Button */}
                                                            <a href={`https://wa.me/91${editingRow.data[5]}?text=${getVCLinkMessage()}`} target="_blank" className="click-red flex justify-center items-center w-full bg-green-600 text-white py-5 rounded-xl font-black text-xl shadow-[0_0_20px_rgba(22,163,74,0.5)] hover:bg-green-700 transition border border-green-500">
                                                                <i className="fa-brands fa-whatsapp text-3xl mr-3"></i> 📹 ग्राहक को लिंक भेजें
                                                            </a>

                                                            <div className="bg-[#111] p-6 rounded-xl border border-[#333] text-center mt-4">
                                                                <p className="text-sm text-gray-500 font-bold mb-3 uppercase">मीट लिंक शेयर करने के लिए कॉपी करें:</p>
                                                                <code className="bg-[#000] px-4 py-3 rounded-lg border border-[#444] text-[#ffd700] font-black block text-lg select-all">{GOOGLE_MEET_TEXT_LINK}</code>
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* 🔄 UPDATE SECTION (यहाँ जो एडिट हो रहा था, वही होगा) */}
                                                <div className="bg-[#050505] p-8 md:p-10 rounded-2xl border border-[#222] shadow-lg">
                                                    <h3 className="text-white font-black text-2xl uppercase mb-8"><i className="fa-solid fa-pen-to-square mr-3 text-indigo-500"></i> Update Status & Info</h3>
                                                    
                                                    <div className="mb-8 bg-[#111] p-6 rounded-xl border border-[#333] shadow-inner">
                                                        <label className="text-[#ffd700] font-bold text-sm uppercase block mb-3">नई सत्यापन/रिन्यूअल तिथि (Date):</label>
                                                        <input type="date" value={staffUpdateData.newVerifyDate} onChange={e=>setStaffUpdateData({...staffUpdateData, newVerifyDate:e.target.value})} className="w-full bg-[#000] p-5 rounded-xl text-white border border-[#444] outline-none focus:border-[#ffd700] font-bold text-xl" />
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-xs uppercase ml-2 mb-1 block">Work Status</label>
                                                            <select value={staffUpdateData.status} onChange={e=>setStaffUpdateData({...staffUpdateData, status:e.target.value})} className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] font-black shadow-sm outline-none focus:border-indigo-500 text-xl">
                                                                <option>Pending</option><option>In Process</option><option className="text-red-500">Send Back</option><option className="text-green-500">Done</option>
                                                            </select>
                                                        </div>
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-xs uppercase ml-2 mb-1 block">Staff Note (For Customer)</label>
                                                            <input type="text" value={staffUpdateData.note} onChange={e=>setStaffUpdateData({...staffUpdateData, note:e.target.value})} placeholder="e.g. Please wait, processing..." className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] font-bold outline-none focus:border-indigo-500 text-xl" />
                                                        </div>
                                                    </div>
                                                    
                                                    {staffUpdateData.status === "Send Back" && (
                                                        <div className="mb-6 animate-pulse">
                                                            <label className="text-red-500 font-bold text-xs uppercase ml-2 mb-1 block">Reason for Rejection</label>
                                                            <input type="text" value={staffUpdateData.sendBackReason} onChange={e=>setStaffUpdateData({...staffUpdateData, sendBackReason:e.target.value})} placeholder="Send Back Reason (e.g. Upload clear Aadhaar)..." className="w-full bg-[#1a0505] p-5 rounded-xl text-red-400 border-2 border-red-900 outline-none focus:border-red-500 font-bold text-xl placeholder-red-900" />
                                                        </div>
                                                    )}

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                                                        <div>
                                                            <label className="text-gray-500 font-bold text-xs uppercase ml-2 mb-1 block">Video Call Time</label>
                                                            <input type="text" value={staffUpdateData.vcTime} onChange={e=>setStaffUpdateData({...staffUpdateData, vcTime:e.target.value})} placeholder="e.g. 04:30 PM" className="w-full bg-[#111] p-5 rounded-xl text-white border border-[#333] font-bold outline-none focus:border-indigo-500 text-xl" />
                                                        </div>
                                                        <div className="relative pt-5">
                                                            <input type="file" ref={staffCertRef} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer mt-5" accept="image/*,application/pdf" />
                                                            <div className="bg-[#111] p-5 rounded-xl border-2 border-dashed border-indigo-500/50 text-center text-indigo-400 font-black shadow-sm hover:bg-[#1a1a1a] transition text-xl"><i className="fa-solid fa-cloud-arrow-up mr-3"></i> Upload Certificate</div>
                                                        </div>
                                                    </div>

                                                    <button onClick={submitStaffUpdate} disabled={isUpdating} className={`w-full font-black py-6 rounded-xl text-2xl uppercase tracking-widest shadow-lg transition-all ${isUpdating ? 'bg-gray-800 text-gray-500 cursor-not-allowed' : 'click-red bg-indigo-600 text-white hover:bg-indigo-700 shadow-[0_0_20px_rgba(79,70,229,0.5)]'}`}>
                                                        {isUpdating ? <><i className="fa-solid fa-spinner fa-spin mr-3"></i> Updating Data...</> : <><i className="fa-solid fa-check-double mr-3"></i> Update Data & Message</>}
                                                    </button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 BOTTOM NAV - Premium Dark */}
                    <div className="fixed bottom-0 w-full bg-[#000]/95 backdrop-blur-md border-t border-[#222] p-3 flex justify-around items-center z-50">
                        <div onClick={() => setView('HOME')} className={`cursor-pointer py-2 px-8 rounded-2xl flex flex-col items-center transition ${view==='HOME'||view==='DEPT'||view==='FORM'||view==='SUCCESS'?'bg-[#111] text-[#ffd700] border border-[#333]':'text-gray-600 hover:text-gray-400'}`}><i className="fa-solid fa-house text-2xl mb-1"></i><span className="text-[11px] font-black uppercase">Home</span></div>
                        <div onClick={() => setView('TRACK')} className={`cursor-pointer py-2 px-8 rounded-2xl flex flex-col items-center transition ${view==='TRACK'?'bg-blue-900/30 text-blue-500 border border-blue-900/50':'text-gray-600 hover:text-gray-400'}`}><i className="fa-solid fa-satellite-dish text-2xl mb-1"></i><span className="text-[11px] font-black uppercase">Track</span></div>
                        <div onClick={() => setView('STAFF')} className={`cursor-pointer py-2 px-8 rounded-2xl flex flex-col items-center transition ${view==='STAFF'?'bg-red-900/30 text-red-500 border border-red-900/50':'text-gray-600 hover:text-gray-400'}`}><i className="fa-solid fa-user-shield text-2xl mb-1"></i><span className="text-[11px] font-black uppercase">Staff</span></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
