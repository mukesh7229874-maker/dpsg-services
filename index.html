<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Problem Solution Group</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* VIP UI / Glassmorphism */
        .glass-panel { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .glass-gold { background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 100%); border: 1px solid #ffd700; }
        
        /* Buttons */
        .btn-gold { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: 900; transition: all 0.2s ease; text-transform: uppercase; letter-spacing: 1px; }
        .btn-gold:active { transform: scale(0.96); box-shadow: 0 0 25px rgba(255, 215, 0, 0.7); }
        
        /* Service List Hover */
        .list-item { transition: all 0.3s ease; }
        .list-item:active { background: rgba(255, 215, 0, 0.25); transform: translateX(5px); border-color: #ffd700; }
        
        /* File Upload Box (Unlimited System) */
        .file-box { border: 2px dashed #ff9900; background: rgba(255, 153, 0, 0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; height: 110px; transition: all 0.3s; }
        .file-box:active { background: rgba(255, 153, 0, 0.25); transform: scale(0.95); }
        
        /* Marquee Alert */
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; letter-spacing: 1px; text-shadow: 1px 1px 2px #000; font-size: 14px; }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #ffd700; border-radius: 10px; }

        /* Animation */
        .fade-in { animation: fadeIn 0.4s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect } = React;

        // 🛑 हुकुम की असली मास्टर स्टाफ लिस्ट (No Dummy Passwords)
        const STAFF_CREDS = {
            "Jorawar@DPS": "Jorawar@6020",
            "Parkash@DPS": "Parkash@6020",
            "Rajkumar@DPS": "Rajkumar@6020",
            "Chanchal@DPS": "Chanchal@6020"

        // 🛑 महा-सर्विस लिस्ट (एक भी चीज़ मिस नहीं है)
        const DEPARTMENTS = [
            { id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark-flag', color: '#ff9933', 
              services: ['नया पैन कार्ड', 'पैन कार्ड में सुधार (Correction)', 'खोया हुआ पैन कार्ड वापस मंगाना', 'पैन कार्ड को आधार से लिंक करना', 'आधार कार्ड डाउनलोड', 'PVC प्लास्टिक आधार कार्ड ऑर्डर', 'PM किसान सम्मान निधि (KYC/नया)', 'KCC (किसान क्रेडिट कार्ड)', 'ई-श्रम कार्ड (नया/अपडेट)', 'PM विश्वकर्मा योजना आवेदन', 'नया वोटर ID कार्ड', 'वोटर ID में सुधार / डाउनलोड', 'आयुष्मान कार्ड (ABHA ID)', 'पासपोर्ट सेवा (नया/रिन्यूअल)', 'उज्ज्वला योजना (गैस कनेक्शन)', 'ITR (इनकम टैक्स रिटर्न) फाइलिंग', 'PF (Provident Fund) का काम'] },
            { id: 'State', name: 'राज्य सरकार / ई-मित्र', icon: 'fa-map-location-dot', color: '#ffffff',

            { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', 
              services: ['उत्तर मैट्रिक छात्रवृत्ति (समाज कल्याण)', 'CM उच्च शिक्षा छात्रवृत्ति', 'देवनारायण / स्कूटी योजना', 'RPSC / RSMSSB भर्ती फॉर्म', 'SSC / UPSC / Army / Police फॉर्म', 'कॉलेज एडमिशन (BA/BSc/BCom)', 'यूनिवर्सिटी मुख्य परीक्षा फॉर्म', 'रिवेल्यूएशन / सप्लीमेंट्री फॉर्म', 'RTE (फ्री स्कूल एडमिशन) फॉर्म', 'नवोदय / सैनिक स्कूल प्रवेश फॉर्म', 'एडमिट कार्ड प्रिंट', 'रिजल्ट प्रिंट'] },
            { id: 'Bank', name: 'महा-बैंकिंग व फाइनेंस', icon: 'fa-building-columns', color: '#00ccff', 
              services: ['Airtel Payments Bank (जीरो बैलेंस खाता)', 'Kotak Mahindra 811 खाता', 'Fino Payments Bank खाता', 'SBI / BoB / PNB बैंक खाता खोलना', 'HDFC / ICICI / Axis बैंक खाता', 'India Post Payments Bank', 'खाते में मोबाइल नंबर/आधार जोड़ना', 'पुराने फँसे हुए खाते/पैसे की समस्या', 'नए ATM (Debit Card) के लिए अप्लाई', 'AEPS (आधार से पैसे निकालना/जमा करना)', 'DMT (मनी ट्रांसफर)', 'नया क्रेडिट कार्ड अप्लाई करना', 'सिबिल स्कोर (CIBIL) चेक करना', 'मुद्रा / पर्सनल / होम लोन फाइल', 'वाहन बीमा (Bike/Car/Tractor)', 'स्वास्थ्य बीमा (Health) / LIC जीवन बीमा'] },
            { id: 'Tech', name: 'टेक, एडिशनल व मोबाइल', icon: 'fa-mobile-screen-button', color: '#ff3366', 
              services: ['iPhone (एप्पल) अनलॉक करना', 'Android (Pattern/Pin/FRP) अनलॉक करना', 'फोन की लोकेशन चेंज (Spoofing) करना', 'डेटा रिकवरी (डिलीट फोटो/वीडियो वापस लाना)', 'चैट ट्रांसफर (पुराने से नए फोन में WhatsApp)', 'नया सिम कार्ड चालू करना', 'सिम पोर्ट (MNP) करना', 'मोबाइल / DTH छतरी रिचार्ज', 'फास्टैग (FASTag) नया बनाना / रिचार्ज', 'बिजली / पानी का बिल जमा करना', 'मोबाइल रिपेयरिंग बुकिंग (हार्डवेयर/सॉफ्टवेयर)'] },
            { id: 'Other', name: 'अन्य महत्वपूर्ण सेवाएं', icon: 'fa-briefcase', color: '#ffd700', 
              services: ['नरेगा (NREGA) जॉब कार्ड / मस्टररोल', 'किरायानामा (Rent Agreement) तैयार करना', 'जीवन प्रमाण पत्र (Jeevan Pramaan)', 'टाइपिंग वर्क (हिंदी/इंग्लिश)', 'रेज़्यूमे (Biodata / CV) बनाना', 'ट्रेन टिकट (IRCTC) बुकिंग', 'बस / फ्लाइट टिकट बुकिंग', 'कलर प्रिंटआउट / लेमिनेशन / अर्जेंट फोटो'] }
        ];

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            // 📝 फॉर्म डेटा
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', vipId: '', problemDesc: '' });
            
            // 🛑 अनलिमिटेड फाइल्स / वीडियो स्टेट 
            const [uploadedFiles, setUploadedFiles] = useState([]); 
            const fileInputRef = useRef(null);
            const [isUploading, setIsUploading] = useState(false);

            // 🔍 फ्री ट्रैकिंग स्टेट (No OTP)
            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);

            // 👨‍💻 स्टाफ डैशबोर्ड स्टेट
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [dashboardData, setDashboardData] = useState({ pending: '...', doneToday: '...' });
            const [whatsappMsg, setWhatsappMsg] = useState('');

            // ----------------------------------------------------
            // 📂 फाइल हैंडलिंग (Unlimited Photo, Video, PDF)
            // ----------------------------------------------------
            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 25 * 1024 * 1024) { alert(`फाइल ${file.name} बहुत बड़ी है। कृपया 25MB से कम की फाइल चुनें।`); return; }
                    
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { 
                            id: Date.now() + Math.random(), 
                            name: file.name, 
                            base64: ev.target.result, 
                            type: file.type 
                        }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const removeFile = (idToRemove) => {
                setUploadedFiles(prev => prev.filter(f => f.id !== idToRemove));
            };

            // ----------------------------------------------------
            // 🚀 फॉर्म सबमिट (App Script Connection)
            // ----------------------------------------------------
            const submitForm = (e) => {
                e.preventDefault();
                if(!formData.name || !formData.mobile || !formData.problemDesc) { alert("कृपया नाम, मोबाइल और समस्या विवरण अनिवार्य रूप से भरें!"); return; }
                
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", 
                    sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : selectedDept.id === 'Student' ? 'Student_Services' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService,
                    vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc,
                    files: uploadedFiles.map(f => ({ name: f.name, base64: f.base64, mimeType: f.type }))
                };

                google.script.run.withSuccessHandler((res) => {
                    setIsUploading(false);
                    if(res.status === "SUCCESS") {
                        alert("✅ शानदार! आपका काम सुरक्षित रूप से बुक हो गया है।\nआपका टोकन नंबर: " + res.token);
                        setView('HOME'); setFormData({name:'', mobile:'', address:'', vipId:'', problemDesc:''}); setUploadedFiles([]);
                    } else alert("Error: " + res.message);
                }).withFailureHandler((err) => {
                    setIsUploading(false); alert("सर्वर से संपर्क टूट गया। कृपया फिर कोशिश करें।");
                }).processRequest(payload);
            };

            // ----------------------------------------------------
            // 🔍 100% फ्री ट्रैकिंग (Token + Mobile)
            // ----------------------------------------------------
            const verifyAndTrack = () => {
                if(!trackMobile || !trackToken) { alert("कृपया मोबाइल नंबर और टोकन नंबर दोनों डालें!"); return; }
                
                setIsTracking(true);
                google.script.run.withSuccessHandler((res) => {
                    setIsTracking(false);
                    if(res.status === "SUCCESS") {
                        setTrackResult(res);
                    } else alert("❌ " + res.message);
                }).withFailureHandler(() => {
                    setIsTracking(false); alert("सर्वर से कनेक्ट नहीं हो सका।");
                }).processRequest({action: "TRACK_STATUS", mobile: trackMobile, token: trackToken});
            };

            const requestVideoCall = () => {
                google.script.run.processRequest({action: "VIDEO_CALL_REQ", mobile: trackMobile, token: trackToken});
                alert("🔴 लाइव वीडियो कॉल का सायरन DPSG स्टाफ को भेज दिया गया है! कृपया कॉल का इंतज़ार करें।");
            };

            // ----------------------------------------------------
            // 👨‍💻 स्टाफ लॉगिन और लाइव डैशबोर्ड
            // ----------------------------------------------------
            const handleLogin = () => {
                if(STAFF_CREDS[staffId] && STAFF_CREDS[staffId] === staffPass) {
                     setIsStaffLoggedIn(true);
                     google.script.run.processRequest({ action: "STAFF_LOGIN", userId: staffId });
                     fetchLiveDashboard(); // असली डेटा लाना
                } else alert("❌ ID या पासवर्ड गलत है!");
            };

            const fetchLiveDashboard = () => {
                setDashboardData({ pending: '...', doneToday: '...' });
                google.script.run.withSuccessHandler((res) => {
                    if(res.status === "SUCCESS") {
                        setDashboardData({ pending: res.pending, doneToday: res.doneToday });
                    }
                }).processRequest({ action: "GET_LIVE_DASHBOARD" });
            };

            const sendWhatsapp = () => {
                if(!whatsappMsg) { alert("पहले मैसेज लिखें!"); return; }
                let finalMsg = encodeURIComponent(`🏛️ *DIGITAL PROBLEM SOLUTION GROUP* 🏛️\n━━━━━━━━━━━━━━━━━━━━━━\n${whatsappMsg}\n━━━━━━━━━━━━━━━━━━━━━━\n🌟 *"आपकी समस्या, समाधान हमारा"* 🌟`);
                window.open(`https://wa.me/?text=${finalMsg}`, '_blank');
            };

            // ----------------------------------------------------

            // ----------------------------------------------------
            const renderDynamicWarning = () => {
                if (selectedService.includes('सुधार') || selectedService.includes('Correction') || selectedService.includes('वापस मंगाना')) {
                    return (
                        <div className="bg-red-900/40 border border-red-500 p-3 rounded-lg mb-4 flex items-start shadow-inner">
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-xl mr-3 mt-1 animate-pulse"></i>
                            <div>
                                <h4 className="text-red-400 font-black text-sm uppercase">अति आवश्यक सूचना</h4>
                                <p className="text-xs text-red-200 mt-1 font-bold">चूँकि आप सुधार/रिप्रिंट करवा रहे हैं, इसलिए अपना <b>पुराना दस्तावेज़ (जैसे पुराना पैन कार्ड या रसीद)</b> अनिवार्य रूप से अपलोड करें!</p>
                            </div>
                        </div>
                    );
                }
                if (selectedService.includes('लिंक') || selectedService.includes('AEPS') || selectedService.includes('चेक करना')) {
                    return (
                        <div className="bg-green-900/30 border border-green-500 p-3 rounded-lg mb-4">
                            <p className="text-xs text-green-400 font-bold"><i className="fa-solid fa-circle-check mr-2"></i>इस सर्विस में फोटो या दस्तावेज़ अपलोड करने की ज़रूरत नहीं है। आप सीधा फॉर्म जमा कर सकते हैं।</p>
                        </div>
                    );
                }
                return null;
            };

            return (
                <div className="min-h-screen pb-28 relative">
                    {/* 📢 Marquee (फुल ब्रांडिंग और महा-अलर्ट के साथ) */}
                    <div className="marquee-alert fixed top-0 w-full z-50 shadow-lg">
                        <marquee>🏛️ DIGITAL PROBLEM SOLUTION GROUP (DPSG) : "आपकी समस्या, समाधान हमारा" | सभी बैंकों के खाते, आईफोन अनलॉक, डेटा रिकवरी और सभी सरकारी फॉर्म चालू हैं | ⏰ महा-अलर्ट: दिसंबर का महीना आ रहा है, अपना पेंशन भौतिक सत्यापन (Life Certificate) तुरंत करवाएं! 🚩</marquee>
                    </div>

                    <div className="pt-20">
                        
                        {/* 🏠 1. HOME VIEW */}
                        {view === 'HOME' && (
                            <div className="p-4 max-w-6xl mx-auto mt-2 fade-in">
                                {/* 🌟 ब्रांडिंग सेक्शन (ग्रुप का पूरा नाम और स्लोगन) 🌟 */}
                                <div className="text-center mb-12 border-b border-[#333] pb-10">
                                    <h2 className="text-2xl md:text-5xl font-black text-white uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">Digital Problem Solution Group</h2>
                                    <h1 className="text-7xl md:text-9xl font-black italic text-[#ffd700] drop-shadow-[0_0_30px_rgba(255,215,0,0.6)] mt-2">DPSG</h1>
                                    <div className="mt-6">
                                        <p className="text-[#ff9900] font-black tracking-widest text-sm md:text-2xl bg-[#0a0a0a] inline-block px-10 py-4 rounded-full border border-[#ff9900]/50 shadow-[0_0_20px_rgba(255,153,0,0.4)] uppercase">
                                            "आपकी समस्या, समाधान हमारा"
                                        </p>
                                    </div>
                                </div>

                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="glass-panel p-6 flex flex-col items-center text-center cursor-pointer hover:border-[#ffd700] hover:bg-black/90 transition-all shadow-xl group">
                                            <div className="text-5xl w-24 h-24 flex items-center justify-center rounded-3xl bg-black border-2 shadow-2xl mb-4 group-hover:scale-110 transition-transform" style={{borderColor: dept.color, color: dept.color}}>
                                                <i className={`fa-solid ${dept.icon}`}></i>
                                            </div>
                                            <div>
                                                <h3 className="text-xl font-black text-white tracking-wide uppercase">{dept.name}</h3>
                                                <p className="text-xs text-gray-400 font-bold mt-2 bg-[#111] py-1 px-3 rounded-full border border-[#333] inline-block">{dept.services.length} Premium Services</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
