<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Digital Problem Solution Group</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        /* VIP UI */
        .glass-panel { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .glass-gold { background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 100%); border: 1px solid #ffd700; }
        
        /* 🔴 Click & Red Effect 🔴 */
        .click-red { transition: all 0.1s ease-in-out; cursor: pointer; }
        .click-red:active { 
            background-color: #991b1b !important; 
            border-color: #ef4444 !important; 
            transform: scale(0.95); 
            box-shadow: 0 0 20px rgba(239, 68, 68, 0.8);
        }

        .btn-gold { background: linear-gradient(90deg, #ffd700, #ff8c00); color: #000; font-weight: 900; transition: all 0.1s ease; text-transform: uppercase; }
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; font-size: 14px; }
        .fade-in { animation: fadeIn 0.3s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // 🛑 हुकुम का असली नया API लिंक
        const API_URL = "https://script.google.com/macros/s/AKfycbyXjDuP4AH4vT9SbDKLD47q2yRg3V4TB_AvMPYA4eRiOm-ryE2GtQ2mRK6VUF6JgNGOQw/exec";

        // 🛑 डायनामिक डिब्बों का असली डेटाबेस (इंटरनेट और ई-मित्र के आधार पर)
        const SERVICE_REQUIREMENTS = {
            'नया पैन कार्ड': { texts: ['पिता का नाम', 'आधार नंबर'], files: ['पासपोर्ट साइज़ फोटो', 'हस्ताक्षर (Signature)'] },
            'पैन कार्ड में सुधार (Correction)': { texts: ['पिता का नाम', 'पुराना पैन नंबर', 'आधार नंबर'], files: ['पासपोर्ट फोटो', 'हस्ताक्षर', 'पुराना पैन कार्ड'] },
            'पेंशन का वार्षिक भौतिक सत्यापन ⏰': { texts: ['PPO (पीपीओ) नंबर', 'जन-आधार नंबर'], files: ['पीपीओ डायरी की फोटो', 'Live Selfie'] },
            'Airtel Payments Bank (खाता)': { texts: ['आधार नंबर', 'नॉमिनी (Nominee) का नाम', 'पैन कार्ड नंबर (यदि हो)'], files: ['आधार कार्ड दोनों तरफ', 'Live Selfie'] },
            'जन्म प्रमाण पत्र (Birth Certificate)': { texts: ['पिता का नाम', 'माता का नाम', 'जन्म दिनांक', 'अस्पताल/स्थान'], files: ['अस्पताल की रसीद/शपथ पत्र'] },
            'जाति प्रमाण पत्र (OBC/SC/ST)': { texts: ['जन-आधार नंबर', 'पिता का नाम', 'राशन कार्ड नंबर'], files: ['राशन कार्ड', 'पुराना रिकॉर्ड'] },
            'उत्तर मैट्रिक छात्रवृत्ति': { texts: ['जन-आधार नंबर', 'रोल नंबर (पिछली कक्षा)', 'बैंक खाता नंबर'], files: ['आय प्रमाण पत्र', 'मार्कशीट', 'फीस की रसीद'] },
            'iPhone (एप्पल) अनलॉक करना': { texts: ['Apple ID (अगर याद हो)', 'फोन का मॉडल', 'IMEI नंबर (यदि हो)'], files: ['फोन का बिल/डब्बा'] }
        };

        const STAFF_CREDS = {
            "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020",
            "Rajkumar@DPS": "Rajkumar@6020", "Chanchal@DPS": "Chanchal@6020"
        };

        const DEPARTMENTS = [
            { id: 'Central', name: 'केंद्र सरकार सेवाएं', icon: 'fa-landmark-flag', color: '#ff9933', services: ['नया पैन कार्ड', 'पैन कार्ड में सुधार (Correction)', 'पैन कार्ड को आधार से लिंक करना', 'PM किसान सम्मान निधि (KYC/नया)', 'ई-श्रम कार्ड', 'पासपोर्ट आवेदन'] },
            { id: 'State', name: 'राज्य सरकार / ई-मित्र', icon: 'fa-map-location-dot', color: '#ffffff', services: ['पेंशन का वार्षिक भौतिक सत्यापन ⏰', 'जन्म प्रमाण पत्र (Birth Certificate)', 'मृत्यु प्रमाण पत्र', 'जाति प्रमाण पत्र (OBC/SC/ST)', 'मूल निवास प्रमाण पत्र', 'नया जन-आधार कार्ड बनाना'] },
            { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', services: ['उत्तर मैट्रिक छात्रवृत्ति', 'CM उच्च शिक्षा छात्रवृत्ति', 'SSC / UPSC / Army फॉर्म', 'कॉलेज एडमिशन फॉर्म', 'एडमिट कार्ड / रिजल्ट'] },
            { id: 'Bank', name: 'बैंकिंग व फाइनेंस', icon: 'fa-building-columns', color: '#00ccff', services: ['Airtel Payments Bank (खाता)', 'Kotak Mahindra 811', 'नया ATM कार्ड अप्लाई', 'DMT (मनी ट्रांसफर)', 'पुराने फँसे हुए खाते/पैसे की समस्या'] },
            { id: 'Tech', name: 'टेक व अनलॉकिंग', icon: 'fa-mobile-screen-button', color: '#ff3366', services: ['iPhone (एप्पल) अनलॉक करना', 'Android (Pattern/Pin) अनलॉक करना', 'डेटा रिकवरी (फोटो/वीडियो वापस)'] },
            { id: 'Other', name: 'अन्य सेवाएं', icon: 'fa-briefcase', color: '#ffd700', services: ['किरायानामा (Rent Agreement)', 'टाइपिंग वर्क (हिंदी/English)', 'रेज़्यूमे (Biodata)', 'ट्रेन टिकट बुकिंग'] }
        ];

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', vipId: '', problemDesc: '' });
            const [dynamicTextData, setDynamicTextData] = useState({});
            const [dynamicFileData, setDynamicFileData] = useState([]);
            const fileInputRef = useRef(null);
            const [currentFileLabel, setCurrentFileLabel] = useState('');
            const [isUploading, setIsUploading] = useState(false);

            // Tracking
            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const [vcMedium, setVcMedium] = useState('Google Meet');

            // Staff Panel
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [dashboardData, setDashboardData] = useState({ pending: '...', doneToday: '...' });
            
            // Staff Edit Area
            const [editToken, setEditToken] = useState('');
            const [editCustomerData, setEditCustomerData] = useState(null);
            const [apptTime, setApptTime] = useState('');

            // API Fetch Engine
            const callAPI = async (payload) => {
                try {
                    const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                    return await response.json();
                } catch (error) {
                    return { status: "ERROR", message: "सर्वर से संपर्क टूट गया है। इंटरनेट चेक करें!" };
                }
            };

            // 📂 फाइल हैंडलिंग
            const handleDynamicFileClick = (label) => { setCurrentFileLabel(label); fileInputRef.current.click(); };
            const handleFileSelect = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    setDynamicFileData(prev => [...prev.filter(f => f.name !== currentFileLabel), { name: currentFileLabel, base64: ev.target.result, mimeType: file.type }]);
                };
                reader.readAsDataURL(file);
            };

            // 🚀 फॉर्म सबमिट
            const submitForm = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : selectedDept.id === 'Student' ? 'Student_Services' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService,
                    vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc,
                    dynamicFields: dynamicTextData, files: dynamicFileData
                };
                const res = await callAPI(payload);
                setIsUploading(false);
                if(res.status === "SUCCESS") {
                    alert("✅ शानदार! काम बुक हो गया। आपका टोकन: " + res.token);
                    setView('HOME'); setFormData({name:'', mobile:'', address:'', vipId:'', problemDesc:''}); setDynamicFileData([]); setDynamicTextData({});
                } else alert("Error: " + res.message);
            };

            // 🔍 ट्रैकिंग
            const verifyAndTrack = async () => {
                if(!trackMobile || !trackToken) { alert("मोबाइल और टोकन दोनों डालें!"); return; }
                setIsTracking(true);
                const res = await callAPI({action: "TRACK_STATUS", mobile: trackMobile, token: trackToken});
                setIsTracking(false);
                if(res.status === "SUCCESS") setTrackResult(res);
                else alert("❌ " + res.message);
            };

            // 📹 वीडियो कॉल रिक्वेस्ट (व्हाट्सएप लॉक के साथ)
            const requestVideoCall = async () => {
                alert("🔴 स्टाफ को रिक्वेस्ट भेजी जा रही है...");
                const res = await callAPI({action: "REQ_VIDEO_CALL", token: trackToken, medium: vcMedium});
                if(res.status === "SUCCESS") {
                    alert("✅ रिक्वेस्ट भेज दी गई है! जब स्टाफ अनुमति (Approve) देगा, तब यहाँ लिंक/नंबर दिखाई देगा।");
                    verifyAndTrack(); // रिफ्रेश
                }
            };

            // 👨‍💻 स्टाफ लॉगिन
            const handleLogin = async () => {
                if(STAFF_CREDS[staffId] && STAFF_CREDS[staffId] === staffPass) {
                     setIsStaffLoggedIn(true);
                     await callAPI({ action: "STAFF_LOGIN", userId: staffId });
                     const res = await callAPI({ action: "GET_LIVE_DASHBOARD" });
                     if(res.status === "SUCCESS") setDashboardData({ pending: res.pending, doneToday: res.doneToday });
                } else alert("❌ ID या पासवर्ड गलत है!");
            };

            // 📝 स्टाफ द्वारा कस्टमर का डेटा लाना
            const fetchCustomerForEdit = async () => {
                if(!editToken) return;
                const res = await callAPI({action: "TRACK_STATUS", mobile: "ANY", token: editToken}); // Backend handles token search
                if(res.status === "SUCCESS") setEditCustomerData(res);
                else alert("❌ " + res.message + " (क्या मोबाइल नंबर भी डालना ज़रूरी है? हाँ, ट्रैकिंग के लिए।)");
            };

            // ⏰ स्टाफ द्वारा टाइम सेट करना (Approve Call)
            const approveCall = async () => {
                if(!apptTime) { alert("कृपया समय डालें!"); return; }
                const res = await callAPI({action: "APPROVE_VIDEO_CALL", token: editToken, time: apptTime});
                if(res.status === "SUCCESS") {
                    alert("✅ टाइम सेट हो गया और ग्राहक को अनुमति मिल गई! 10 मिनट पहले अलार्म बज जाएगा।");
                }
            };

            // 👑 3 महा-बटन (Notify System)
            const notifyOwner = async () => {
                let msg = prompt("मालिक (हुकुम) को क्या सन्देश भेजना है?");
                if(msg) {
                    await callAPI({action: "NOTIFY_OWNER", staffId: staffId, message: msg});
                    alert("✅ मालिक को टेलीग्राम पर इमरजेंसी मैसेज भेज दिया गया है!");
                }
            };

            const reqs = SERVICE_REQUIREMENTS[selectedService] || { texts: [], files: ['अन्य दस्तावेज़ (Optional)'] };

            return (
                <div className="min-h-screen pb-32">
                    {/* 📢 Marquee */}
                    <div className="marquee-alert fixed top-0 w-full z-50 shadow-lg text-center tracking-widest uppercase">
                        <marquee>🏛️ DIGITAL PROBLEM SOLUTION GROUP : "आपकी समस्या, समाधान हमारा" | ⏰ महा-अलर्ट: अपना पेंशन भौतिक सत्यापन तुरंत करवाएं! 🚩</marquee>
                    </div>

                    <div className="pt-20">
                        {/* 🏠 1. HOME VIEW */}
                        {view === 'HOME' && (
                            <div className="p-4 max-w-6xl mx-auto mt-2 fade-in">
                                <div className="text-center mb-10 border-b border-[#333] pb-8">
                                    <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest drop-shadow-[0_0_15px_rgba(255,255,255,0.2)]">Digital Problem Solution Group</h2>
                                    <h1 className="text-7xl md:text-9xl font-black italic text-[#ffd700] drop-shadow-[0_0_30px_rgba(255,215,0,0.6)] mt-2">DPSG</h1>
                                    <p className="text-[#ff9900] font-black tracking-widest mt-4 bg-[#111] inline-block px-8 py-3 rounded-full border border-[#ff9900]/50 shadow-[0_0_20px_rgba(255,153,0,0.4)] uppercase">"आपकी समस्या, समाधान हमारा"</p>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="click-red glass-panel p-6 text-center shadow-xl">
                                            <i className={`fa-solid ${dept.icon} text-6xl mb-4 block`} style={{color: dept.color}}></i>
                                            <h3 className="text-xl font-black text-white uppercase tracking-wider">{dept.name}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📋 2. SERVICE LIST */}
                        {view === 'DEPT' && selectedDept && (
                            <div className="p-4 max-w-5xl mx-auto mt-2 fade-in">
                                <button onClick={() => setView('HOME')} className="click-red text-[#ffd700] font-black mb-6 bg-[#111] px-5 py-2 rounded-lg border border-[#333]"><i className="fa-solid fa-arrow-left mr-2"></i> वापस होम पर जाएं</button>
                                <div className="glass-gold p-8 mb-8 text-center rounded-3xl shadow-2xl">
                                    <h2 className="text-3xl font-black uppercase tracking-widest text-white">{selectedDept.name}</h2>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {selectedDept.services.map((srv, idx) => (
                                        <div key={idx} onClick={() => { setSelectedService(srv); setView('FORM'); }} className="click-red bg-[#111] border border-[#222] p-6 rounded-2xl flex justify-between items-center shadow-lg">
                                            <span className="font-bold text-gray-200">{srv}</span> <i className="fa-solid fa-chevron-right text-[#ffd700]"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📝 3. DYNAMIC BOOKING FORM */}
                        {view === 'FORM' && (
                            <div className="p-4 max-w-4xl mx-auto mt-2 fade-in">
                                <button onClick={() => setView('DEPT')} className="click-red text-[#ffd700] font-black mb-4"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                                <div className="glass-panel p-6 md:p-10 border-t-4 border-[#ffd700]">
                                    <h2 className="text-2xl md:text-4xl font-black text-[#ffd700] mb-6">{selectedService}</h2>
                                    
                                    <form onSubmit={submitForm} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                            <input required type="text" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-[#ffd700]" placeholder="पूरा नाम *" />
                                            <input required type="tel" value={formData.mobile} onChange={e=>setFormData({...formData, mobile:e.target.value})} className="bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-[#ffd700]" placeholder="मोबाइल नंबर *" />
                                        </div>
                                        <input required type="text" value={formData.address} onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-[#ffd700]" placeholder="पूरा पता *" />

                                        {/* 🎯 डायनामिक टेक्स्ट डिब्बे (जैसे PPO, आधार) */}
                                        {reqs.texts.length > 0 && (
                                            <div className="bg-blue-900/20 p-5 rounded-2xl border border-blue-500/50 shadow-inner">
                                                <h3 className="text-blue-400 font-black mb-4 uppercase tracking-wider"><i className="fa-solid fa-circle-info mr-2"></i> इस सर्विस की ज़रूरी जानकारी:</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {reqs.texts.map(label => (
                                                        <input key={label} type="text" placeholder={`${label} (यदि हो)`} onChange={e=>setDynamicTextData({...dynamicTextData, [label]: e.target.value})} className="bg-[#050505] p-4 rounded-lg text-white border border-[#333] w-full" />
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        {/* 🎯 डायनामिक फाइल अपलोड */}
                                        {reqs.files.length > 0 && (
                                            <div className="mt-6 border-t border-[#333] pt-6">
                                                <h3 className="text-white font-black mb-4 uppercase tracking-wide"><i className="fa-solid fa-folder-open text-[#ffd700] mr-2"></i> ज़रूरी दस्तावेज़ अपलोड (Optional)</h3>
                                                <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                    {reqs.files.map(label => {
                                                        let isUploaded = dynamicFileData.find(f => f.name === label);
                                                        return (
                                                            <div key={label} onClick={()=>handleDynamicFileClick(label)} className={`click-red cursor-pointer p-4 rounded-xl border-2 border-dashed text-center ${isUploaded ? 'border-green-500 bg-green-900/20' : 'border-gray-600 bg-[#111]'}`}>
                                                                <i className={`fa-solid ${isUploaded ? 'fa-check-circle text-green-500' : 'fa-upload text-[#ff9900]'} text-3xl mb-2`}></i>
                                                                <p className="text-[10px] font-bold text-gray-300 uppercase">{label}</p>
                                                            </div>
                                                        )
                                                    })}
                                                </div>
                                                <input type="file" ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,application/pdf" />
                                            </div>
                                        )}

                                        <textarea required rows="3" value={formData.problemDesc} onChange={e=>setFormData({...formData, problemDesc:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333] focus:border-[#ffd700]" placeholder="✍️ समस्या या कार्य का अन्य विवरण यहाँ लिखें..."></textarea>
                                        <input type="text" value={formData.vipId} onChange={e=>setFormData({...formData, vipId:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-gray-400 border border-[#333]" placeholder="VIP Membership ID (Optional)" />

                                        <button type="submit" disabled={isUploading} className="click-red w-full btn-gold py-5 rounded-xl text-xl shadow-[0_0_20px_rgba(255,215,0,0.4)] mt-6 tracking-widest">
                                            {isUploading ? <><i className="fa-solid fa-spinner fa-spin mr-3"></i> अपलोडिंग...</> : <><i className="fa-solid fa-rocket mr-3"></i> सुरक्षित काम बुक करें</>}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 🔍 4. SECURE TRACKING & VIDEO CALL SYSTEM */}
                        {view === 'TRACK' && (
                            <div className="p-4 max-w-lg mx-auto mt-8 fade-in">
                                <div className="glass-panel p-8 text-center border-t-4 border-blue-500 shadow-2xl">
                                    <h2 className="text-2xl font-black mb-6 uppercase tracking-widest text-white">Live Tracking</h2>
                                    <div className="space-y-4">
                                        <input type="tel" placeholder="मोबाइल नंबर" onChange={e=>setTrackMobile(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] text-center font-black text-white" />
                                        <input type="text" placeholder="टोकन नंबर (DPSG-...)" onChange={e=>setTrackToken(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] text-center font-black text-white uppercase" />
                                        <button onClick={verifyAndTrack} disabled={isTracking} className="click-red w-full bg-blue-600 text-white font-black py-5 rounded-xl text-lg uppercase shadow-[0_0_20px_rgba(37,99,235,0.5)]">स्टेटस चेक करें</button>
                                    </div>

                                    {trackResult && (
                                        <div className="mt-8 bg-[#050505] p-6 rounded-2xl border border-[#222] text-left shadow-2xl">
                                            <p className="text-sm font-bold text-gray-400 mb-2">सर्विस: <span className="text-white">{trackResult.service}</span></p>
                                            <p className="text-sm font-bold text-gray-400 mb-4">स्थिति: <span className="text-[#ffd700] ml-2 px-3 py-1 bg-[#111] rounded-full">{trackResult.currentStatus}</span></p>
                                            <p className="text-xs text-gray-400 bg-[#111] p-3 rounded-lg border border-[#333]">{trackResult.staffNote}</p>

                                            {/* 📹 Video Call Approval System */}
                                            <div className="mt-6 border-t border-[#333] pt-6">
                                                <h3 className="text-white font-black uppercase mb-3"><i className="fa-solid fa-video text-red-500 mr-2"></i> वीडियो कॉल स्टेटस</h3>
                                                
                                                {trackResult.vcStatus === "No_Request" || trackResult.vcStatus === "N/A" ? (
                                                    <div className="bg-[#111] p-4 rounded-xl border border-[#222]">
                                                        <select value={vcMedium} onChange={e=>setVcMedium(e.target.value)} className="w-full bg-[#000] text-white p-3 rounded mb-3 border border-[#333]">
                                                            <option>Google Meet (Recommended)</option>
                                                            <option>WhatsApp</option>
                                                            <option>Instagram</option>
                                                        </select>
                                                        <button onClick={requestVideoCall} className="click-red w-full bg-red-600 text-white font-black py-3 rounded-xl shadow-lg">रिक्वेस्ट भेजें</button>
                                                    </div>
                                                ) : trackResult.vcStatus === "Requested" ? (
                                                    <div className="bg-yellow-900/30 p-4 rounded-xl border border-yellow-500 text-yellow-400 font-bold text-center text-sm">
                                                        ⏳ रिक्वेस्ट भेज दी गई है। स्टाफ के समय सेट करने का इंतज़ार करें।
                                                    </div>
                                                ) : trackResult.vcStatus === "Approved" || trackResult.vcStatus === "Alert_Sent" ? (
                                                    <div className="bg-green-900/30 p-5 rounded-xl border border-green-500 text-center">
                                                        <p className="text-green-400 font-black mb-2 uppercase">✅ अनुमति मिल गई (Approved)</p>
                                                        <p className="text-white font-bold mb-4">कॉल का समय: <span className="text-[#ffd700] text-lg bg-black px-3 py-1 rounded ml-2">{trackResult.vcTime}</span></p>
                                                        
                                                        {trackResult.vcMedium.includes("Meet") && (
                                                            <a href={trackResult.googleMeetLink} target="_blank" className="click-red block w-full bg-blue-600 text-white font-black py-4 rounded-xl"><i className="fa-solid fa-video mr-2"></i> Join Google Meet</a>
                                                        )}
                                                        {trackResult.vcMedium.includes("Insta") && (
                                                            <a href={trackResult.instaLink} target="_blank" className="click-red block w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white font-black py-4 rounded-xl"><i className="fa-brands fa-instagram mr-2"></i> Join via Instagram</a>
                                                        )}
                                                        {trackResult.vcMedium.includes("WhatsApp") && (
                                                            <a href={`https://wa.me/91XXXXXXXXXX`} target="_blank" className="click-red block w-full bg-green-500 text-black font-black py-4 rounded-xl"><i className="fa-brands fa-whatsapp mr-2"></i> Join via WhatsApp</a>
                                                        )}
                                                    </div>
                                                ) : null}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* 👨‍💻 5. STAFF CONTROL ROOM (THE REAL EDIT PANEL) */}
                        {view === 'STAFF' && (
                            <div className="p-4 max-w-4xl mx-auto mt-8 fade-in">
                                {!isStaffLoggedIn ? (
                                    <div className="glass-panel p-8 max-w-md mx-auto text-center border-t-4 border-red-600">
                                        <h2 className="text-2xl font-black mb-6 uppercase text-white">Staff Login</h2>
                                        <input type="text" placeholder="Staff ID" onChange={e=>setStaffId(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] mb-4 text-center text-white font-bold" />
                                        <input type="password" placeholder="Password" onChange={e=>setStaffPass(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] mb-6 text-center text-white font-bold" />
                                        <button onClick={handleLogin} className="click-red w-full bg-red-600 text-white font-black py-5 rounded-xl shadow-[0_0_20px_rgba(220,38,38,0.5)]">SECURE LOGIN</button>
                                    </div>
                                ) : (
                                    <div className="glass-panel p-8 border-t-4 border-red-600 shadow-2xl">
                                        <div className="flex justify-between items-center border-b border-[#333] pb-6 mb-8">
                                            <h2 className="text-3xl font-black text-white uppercase">Control <span className="text-red-500">Room</span></h2>
                                            <button onClick={()=>setIsStaffLoggedIn(false)} className="bg-[#111] border border-[#333] px-4 py-2 rounded-lg text-gray-400 font-bold"><i className="fa-solid fa-power-off mr-2"></i>Logout</button>
                                        </div>
                                        
                                        {/* 👑 3 महा-बटन सिस्टम */}
                                        <div className="bg-[#050505] p-6 rounded-2xl border border-[#222] mb-8 shadow-inner">
                                            <h3 className="text-gray-400 font-bold mb-4 uppercase tracking-widest text-sm"><i className="fa-solid fa-bell text-[#ffd700] mr-2"></i> Quick Notifications</h3>
                                            <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                                                <button onClick={()=>window.open('https://wa.me/', '_blank')} className="click-red bg-green-600 text-white py-4 rounded-xl font-black shadow-lg"><i className="fa-brands fa-whatsapp mr-2"></i> ग्राहक को मैसेज करें</button>
                                                <button onClick={notifyOwner} className="click-red bg-red-600 text-white py-4 rounded-xl font-black shadow-lg"><i className="fa-brands fa-telegram mr-2"></i> मुझे (मालिक) सूचित करें</button>
                                                <button onClick={()=>window.open('https://chat.whatsapp.com/', '_blank')} className="click-red bg-blue-600 text-white py-4 rounded-xl font-black shadow-lg"><i className="fa-solid fa-users mr-2"></i> ग्रुप में सूचित करें</button>
                                            </div>
                                        </div>

                                        {/* 📝 असली एडिट और टाइम-टेबल पैनल */}
                                        <div className="bg-[#0a0a0a] p-6 md:p-8 rounded-2xl border border-[#333] shadow-2xl">
                                            <h3 className="text-[#ffd700] font-black uppercase mb-6 tracking-wider"><i className="fa-solid fa-pen-to-square mr-2"></i> Customer Edit & Video Call Panel</h3>
                                            
                                            <div className="flex gap-4 mb-6">
                                                <input type="text" placeholder="टेलीग्राम से टोकन नंबर यहाँ डालें (DPSG-...)" onChange={e=>setEditToken(e.target.value)} className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#444] font-bold uppercase" />
                                                <button onClick={fetchCustomerForEdit} className="click-red bg-blue-600 text-white px-8 rounded-xl font-black">Fetch</button>
                                            </div>

                                            {editCustomerData && (
                                                <div className="bg-[#000] p-6 rounded-xl border border-[#222]">
                                                    <p className="text-gray-400 text-sm font-bold mb-2">सर्विस: <span className="text-white ml-2">{editCustomerData.service}</span></p>
                                                    <p className="text-gray-400 text-sm font-bold mb-6">वीडियो कॉल रिक्वेस्ट: <span className="text-red-400 ml-2">{editCustomerData.vcStatus} ({editCustomerData.vcMedium})</span></p>
                                                    
                                                    <div className="border-t border-[#333] pt-6">
                                                        <h4 className="text-[#ffd700] font-bold uppercase mb-3 text-sm">📅 अपॉइंटमेंट सेट करें (Approve)</h4>
                                                        <div className="flex gap-4">
                                                            <input type="text" placeholder="उदा: आज दोपहर 3:15 PM" onChange={e=>setApptTime(e.target.value)} className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#444]" />
                                                            <button onClick={approveCall} className="click-red bg-green-500 text-black px-6 rounded-xl font-black whitespace-nowrap"><i className="fa-solid fa-clock mr-2"></i> Set Time & Approve</button>
                                                        </div>
                                                        <p className="text-xs text-green-400 mt-3">यह बटन दबाते ही ग्राहक के पास व्हाट्सएप लिंक खुल जाएगा और 10 मिनट पहले टेलीग्राम पर सायरन बजेगा!</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 VIP BOTTOM NAV */}
                    <div className="fixed bottom-0 w-full bg-[#000]/95 backdrop-blur-2xl border-t border-[#222] p-3 flex justify-around items-center z-50">
                        <div onClick={() => setView('HOME')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl ${view==='HOME'||view==='DEPT'||view==='FORM'?'bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black shadow-[0_0_15px_rgba(255,215,0,0.5)]':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-house text-2xl"></i></div>
                        <div onClick={() => setView('TRACK')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl ${view==='TRACK'?'bg-blue-600 text-white shadow-[0_0_15px_rgba(37,99,235,0.5)]':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-satellite-dish text-2xl"></i></div>
                        <div onClick={() => setView('STAFF')} className={`click-red cursor-pointer py-3 px-8 rounded-2xl ${view==='STAFF'?'bg-red-600 text-white shadow-[0_0_15px_rgba(220,38,38,0.5)]':'text-gray-500 hover:bg-[#111]'}`}><i className="fa-solid fa-user-shield text-2xl"></i></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
