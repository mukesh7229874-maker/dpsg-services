<!DOCTYPE html>
<html lang="hi" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DPSG E-Mitra Portal</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800;900&display=swap');
        body { font-family: 'Poppins', sans-serif; background: #050505; color: #ffffff; overflow-x: hidden; -webkit-tap-highlight-color: transparent; }
        
        .glass-panel { background: rgba(20, 20, 20, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(255, 215, 0, 0.3); border-radius: 1.5rem; box-shadow: 0 10px 40px rgba(0,0,0,0.9); }
        .glass-gold { background: linear-gradient(135deg, rgba(255,215,0,0.15) 0%, rgba(0,0,0,0.95) 100%); border: 1px solid #ffd700; }
        
        .click-red { transition: all 0.1s ease-in-out; cursor: pointer; }
        .click-red:active { transform: scale(0.95); }
        
        .marquee-alert { background: linear-gradient(90deg, #aa0000, #ff0000); color: #fff; font-weight: 900; padding: 10px 0; border-bottom: 2px solid #ffd700; font-size: 14px; letter-spacing: 1px; z-index: 100000;}
        
        /* 📞 HUGE FLOATING BUTTONS */
        .floating-bar { position: fixed; right: 10px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 20px; z-index: 9999; }
        .float-btn { width: 65px; height: 65px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 30px; color: white; box-shadow: 0 0 25px rgba(0,0,0,0.9); cursor: pointer; transition: 0.2s; border: 3px solid rgba(255,255,255,0.3); }
        .float-btn:hover { transform: scale(1.1); }
        .float-vc { background: #dc2626; animation: pulseRed 2s infinite; }
        .float-wa { background: #25D366; }
        .float-call { background: #2563eb; }
        .float-insta { background: linear-gradient(45deg, #f09433 0%, #e6683c 25%, #dc2743 50%, #cc2366 75%, #bc1888 100%); }

        @keyframes pulseRed { 0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.8); } 70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); } 100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef } = React;

        // 🛑 हुकुम का दिया गया 100% पक्का API लिंक
        const API_URL = "https://script.google.com/macros/s/AKfycbzXkKyBI6Dr7v9o_w9k7TRiKsO9wsUHiSasETE3i4EOO9GxprHOGaY3VCqSnTQA0sP97A/exec";
        
        const WHATSAPP_NUMBER = "918788418737"; 
        const WHATSAPP_MSG = encodeURIComponent("जय महादेव! 🚩 DPSG ई-मित्र, मुझे जानकारी चाहिए। मेरा नाम ______ है।");

        const STAFF_CREDS = { "Jorawar@DPS": "Jorawar@6020", "Parkash@DPS": "Parkash@6020", "Rajkumar@DPS": "Rajkumar@6020", "Chanchal@DPS": "Chanchal@6020" };

        const SERVICE_REQUIREMENTS = {
            'नया पैन कार्ड': { texts: ['पिता का नाम', 'आधार नंबर'], docs: ['पासपोर्ट फोटो', 'हस्ताक्षर (Sign)', 'आधार फोटो'], askDate: false },
            'पेंशन का वार्षिक भौतिक सत्यापन ⏰': { texts: ['PPO नंबर', 'जन-आधार नंबर', 'आधार नंबर'], docs: ['पीपीओ डायरी की फोटो'], askDate: true },
            'Airtel Payments Bank (खाता)': { texts: ['आधार नंबर', 'नॉमिनी का नाम'], docs: ['आधार दोनों तरफ', 'लाइव फोटो'], askDate: false },
            'इंश्योरेंस (वाहन/स्वास्थ्य) ⏰': { texts: ['गाड़ी/पॉलिसी नंबर', 'आधार नंबर'], docs: ['पुरानी पॉलिसी की फोटो', 'RC बुक'], askDate: true },
            'जाति प्रमाण पत्र (OBC/SC/ST)': { texts: ['जन-आधार नंबर', 'राशन कार्ड नंबर'], docs: ['राशन कार्ड'], askDate: false },
            'उत्तर मैट्रिक छात्रवृत्ति': { texts: ['जन-आधार नंबर', 'मार्कशीट रोल नंबर'], docs: ['आय प्रमाण पत्र', 'मार्कशीट'], askDate: false }
        };

        const DEPARTMENTS = [
            { id: 'Central', name: 'केंद्र सरकार', icon: 'fa-landmark-flag', color: '#ff9933', services: ['नया पैन कार्ड', 'पैन कार्ड में सुधार', 'PM किसान सम्मान निधि'] },
            { id: 'State', name: 'राज्य सरकार', icon: 'fa-map-location-dot', color: '#ffffff', services: ['पेंशन का वार्षिक भौतिक सत्यापन ⏰', 'जाति प्रमाण पत्र (OBC/SC/ST)', 'मूल निवास प्रमाण पत्र', 'नया जन-आधार कार्ड'] },
            { id: 'Student', name: 'विद्यार्थी सेवाएं', icon: 'fa-user-graduate', color: '#138808', services: ['उत्तर मैट्रिक छात्रवृत्ति', 'CM उच्च शिक्षा छात्रवृत्ति', 'SSC / UPSC फॉर्म'] },
            { id: 'Bank', name: 'बैंकिंग व फाइनेंस', icon: 'fa-building-columns', color: '#00ccff', services: ['Airtel Payments Bank (खाता)', 'इंश्योरेंस (वाहन/स्वास्थ्य) ⏰', 'DMT (मनी ट्रांसफर)'] },
            { id: 'Tech', name: 'टेक व अनलॉकिंग', icon: 'fa-mobile-screen-button', color: '#ff3366', services: ['iPhone (एप्पल) अनलॉक करना', 'Android (Pattern/Pin) अनलॉक'] },
            { id: 'Other', name: 'अन्य सेवाएं', icon: 'fa-briefcase', color: '#ffd700', services: ['किरायानामा (Rent Agreement)', 'टाइपिंग वर्क (हिंदी/English)'] }
        ];

        const App = () => {
            const [view, setView] = useState('HOME'); 
            const [selectedDept, setSelectedDept] = useState(null);
            const [selectedService, setSelectedService] = useState('');
            
            const [formData, setFormData] = useState({ name: '', mobile: '', address: '', problemDesc: '', lastDate: '', vipId: '' });
            const [dynamicTextData, setDynamicTextData] = useState({});
            const [uploadedFiles, setUploadedFiles] = useState([]);
            const [isUploading, setIsUploading] = useState(false);
            const fileInputRef = useRef(null);

            const [trackMobile, setTrackMobile] = useState('');
            const [trackToken, setTrackToken] = useState('');
            const [trackResult, setTrackResult] = useState(null);
            const [isTracking, setIsTracking] = useState(false);
            const extraDocRef = useRef(null);

            const [showVCModal, setShowVCModal] = useState(false);
            const [vcData, setVcData] = useState({name:'', mobile:'', aadhaar:'', problem:'', medium:'Google Meet'});

            const [isStaffLoggedIn, setIsStaffLoggedIn] = useState(false);
            const [staffId, setStaffId] = useState('');
            const [staffPass, setStaffPass] = useState('');
            const [pendingList, setPendingList] = useState([]);
            const [editingRow, setEditingRow] = useState(null);
            const [staffUpdateData, setStaffUpdateData] = useState({status: '', vcTime: '', note: '', sendBackReason: '', newVerifyDate: '', emitraToken: ''});
            const staffCertRef = useRef(null);

            const callAPI = async (payload) => {
                const response = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
                return await response.json();
            };

            const handleFileSelect = (e) => {
                const files = Array.from(e.target.files);
                files.forEach(file => {
                    if (file.size > 15 * 1024 * 1024) { alert("फाइल 15MB से छोटी होनी चाहिए!"); return; }
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        setUploadedFiles(prev => [...prev, { name: file.name, base64: ev.target.result, mimeType: file.type }]);
                    };
                    reader.readAsDataURL(file);
                });
            };

            const submitForm = async (e) => {
                e.preventDefault();
                setIsUploading(true);
                const payload = {
                    action: "BOOK_SERVICE", sheetName: selectedDept.id === 'Central' ? 'Central_Govt' : selectedDept.id === 'State' ? 'State_Govt' : selectedDept.id === 'Bank' ? 'Banking' : selectedDept.id === 'Student' ? 'Student_Services' : selectedDept.id === 'Tech' ? 'Tech_Mobile' : 'Other_Services',
                    folderKey: selectedDept.id, categoryName: selectedDept.name, serviceName: selectedService, vipId: formData.vipId, name: formData.name, mobile: formData.mobile, address: formData.address, specificDetails: formData.problemDesc, lastDate: formData.lastDate,
                    dynamicFields: dynamicTextData, files: uploadedFiles
                };
                const res = await callAPI(payload);
                setIsUploading(false);
                if(res.status === "SUCCESS") {
                    alert("✅ शानदार! काम बुक हो गया। आपका टोकन: " + res.token);
                    setView('HOME'); setFormData({name:'', mobile:'', address:'', problemDesc:'', lastDate:'', vipId:''}); setDynamicTextData({}); setUploadedFiles([]);
                } else alert("❌ Error: " + res.message);
            };

            const trackStatus = async () => {
                if(!trackToken) { alert("टोकन नंबर डालें!"); return; }
                setIsTracking(true);
                const res = await callAPI({action: "TRACK_STATUS", token: trackToken, mobile: trackMobile});
                setIsTracking(false);
                if(res.status === "SUCCESS") setTrackResult(res.fullData);
                else alert("❌ " + res.message);
            };

            const handleExtraUpload = async (e) => {
                const file = e.target.files[0];
                if(!file) return;
                alert("⏳ अतिरिक्त दस्तावेज़ अपलोड हो रहा है...");
                const reader = new FileReader();
                reader.onload = async (ev) => {
                    const res = await callAPI({action: "CUSTOMER_EXTRA_UPLOAD", token: trackToken, file: {name: file.name, base64: ev.target.result, mimeType: file.type}});
                    if(res.status === "SUCCESS") { alert("✅ दस्तावेज़ सफलतापूर्वक जुड़ गया!"); trackStatus(); }
                    else alert("❌ Error: " + res.message);
                };
                reader.readAsDataURL(file);
            };

            const submitDirectVC = async (e) => {
                e.preventDefault();
                alert("🔴 स्टाफ को सायरन भेजा जा रहा है...");
                const res = await callAPI({action: "DIRECT_VC_REQ", ...vcData});
                if(res.status === "SUCCESS") { alert("✅ रिक्वेस्ट भेज दी गई है!"); setShowVCModal(false); }
            };

            const handleStaffLogin = async () => {
                if(STAFF_CREDS[staffId] === staffPass) { setIsStaffLoggedIn(true); fetchPendingList(); callAPI({action: "STAFF_LOGIN", userId: staffId, password: staffPass}); }
                else alert("❌ ID या पासवर्ड गलत है!");
            };

            const fetchPendingList = async () => {
                const res = await callAPI({action: "GET_ALL_PENDING"});
                if(res.status === "SUCCESS") setPendingList(res.list);
            };

            const openStaffEdit = (item) => {
                setEditingRow(item);
                setStaffUpdateData({status: item.data[2], vcTime: item.data[24] === "N/A" ? "" : item.data[24], note: item.data[28], sendBackReason: item.data[19], newVerifyDate: item.data[26] === "लागू नहीं" ? "" : item.data[26], emitraToken: item.data[20]});
            };

            const submitStaffUpdate = async () => {
                alert("⏳ डेटा अपडेट हो रहा है...");
                let payload = { action: "STAFF_UPDATE_FORM", sheetName: editingRow.sheetName, rowIdx: editingRow.rowIdx, token: editingRow.data[1], newStatus: staffUpdateData.status, vcTime: staffUpdateData.vcTime, staffNote: staffUpdateData.note, sendBackReason: staffUpdateData.sendBackReason, emitraToken: staffUpdateData.emitraToken, lastDate: staffUpdateData.newVerifyDate, vcStatus: staffUpdateData.vcTime ? "Approved" : editingRow.data[22] };
                
                if(staffCertRef.current && staffCertRef.current.files[0]) {
                    const file = staffCertRef.current.files[0];
                    const reader = new FileReader();
                    reader.onload = async (ev) => {
                        payload.staffFileBase64 = ev.target.result;
                        payload.staffFileMime = file.type;
                        const res = await callAPI(payload);
                        if(res.status === "SUCCESS") { alert("✅ स्टेटस अपडेट हो गया!"); setEditingRow(null); fetchPendingList(); }
                    };
                    reader.readAsDataURL(file);
                } else {
                    const res = await callAPI(payload);
                    if(res.status === "SUCCESS") { alert("✅ स्टेटस अपडेट हो गया!"); setEditingRow(null); fetchPendingList(); }
                }
            };

            const getLink = (markdown) => {
                const match = markdown ? markdown.match(/\((.*?)\)/) : null;
                return match ? match[1] : null;
            };

            const reqs = SERVICE_REQUIREMENTS[selectedService] || { texts: [], docs: ['अतिरिक्त दस्तावेज़'], askDate: false };

            return (
                <div className="min-h-screen pb-32">
                    <div className="marquee-alert fixed top-0 w-full">
                        <marquee>🏛️ DIGITAL PROBLEM SOLUTION GROUP : "आपकी समस्या, समाधान हमारा" | ⏰ महा-अलर्ट: पेंशन भौतिक सत्यापन शुरू हो गया है! 🚩</marquee>
                    </div>

                    {/* 📞 HUGE FLOATING BUTTONS */}
                    <div className="floating-bar fade-in">
                        <div onClick={()=>setShowVCModal(true)} className="float-btn float-vc" title="Live Video Call"><i className="fa-solid fa-video"></i></div>
                        <a href={`tel:+${WHATSAPP_NUMBER}`} className="float-btn float-call" title="Call Us"><i className="fa-solid fa-phone-volume"></i></a>
                        <a href={`https://wa.me/${WHATSAPP_NUMBER}?text=${WHATSAPP_MSG}`} target="_blank" className="float-btn float-wa" title="WhatsApp Message"><i className="fa-brands fa-whatsapp"></i></a>
                        <a href="https://www.instagram.com/mahadev_ji_ka_daas?igsh=ZXJlOHh5ZDllZTBs" target="_blank" className="float-btn float-insta" title="Instagram"><i className="fa-brands fa-instagram"></i></a>
                    </div>

                    {/* 📹 DIRECT VC MODAL */}
                    {showVCModal && (
                        <div className="fixed inset-0 bg-black/95 z-[9999] flex justify-center items-center p-4 fade-in">
                            <div className="glass-panel p-6 w-full max-w-md border-t-4 border-red-600 shadow-[0_0_40px_rgba(220,38,38,0.5)]">
                                <div className="flex justify-between items-center mb-6">
                                    <h3 className="text-xl font-black text-red-500 uppercase"><i className="fa-solid fa-video mr-2"></i> Live Video Call</h3>
                                    <i onClick={()=>setShowVCModal(false)} className="fa-solid fa-times text-3xl text-gray-400 cursor-pointer click-red"></i>
                                </div>
                                <form onSubmit={submitDirectVC} className="space-y-4">
                                    <input required type="text" placeholder="पूरा नाम *" onChange={e=>setVcData({...vcData, name:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]" />
                                    <input required type="tel" placeholder="मोबाइल नंबर *" onChange={e=>setVcData({...vcData, mobile:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]" />
                                    <input required type="text" placeholder="आधार कार्ड नंबर *" onChange={e=>setVcData({...vcData, aadhaar:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-red-500" />
                                    <textarea required placeholder="क्या जानकारी चाहिए? *" onChange={e=>setVcData({...vcData, problem:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]"></textarea>
                                    <select onChange={e=>setVcData({...vcData, medium:e.target.value})} className="w-full bg-[#000] p-4 rounded-xl text-white border border-[#333] font-bold">
                                        <option>Google Meet (Secure)</option><option>WhatsApp</option><option>Instagram</option>
                                    </select>
                                    <button type="submit" className="click-red w-full bg-red-600 text-white font-black py-4 rounded-xl text-xl uppercase shadow-[0_0_20px_rgba(220,38,38,0.5)]">रिक्वेस्ट भेजें</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="p-4 max-w-6xl mx-auto mt-16 fade-in">
                        {/* 🏠 HOME */}
                        {view === 'HOME' && (
                            <div>
                                <div className="text-center mb-12 border-b border-[#333] pb-10">
                                    <h2 className="text-3xl md:text-5xl font-black text-white uppercase tracking-widest">Digital Problem Solution Group</h2>
                                    <h1 className="text-7xl md:text-9xl font-black italic text-[#ffd700] mt-2">DPSG</h1>
                                </div>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                    {DEPARTMENTS.map(dept => (
                                        <div key={dept.id} onClick={() => { setSelectedDept(dept); setView('DEPT'); }} className="click-red glass-panel p-8 text-center border-t-4" style={{borderTopColor: dept.color}}>
                                            <i className={`fa-solid ${dept.icon} text-6xl mb-6 block`} style={{color: dept.color}}></i>
                                            <h3 className="text-xl font-black uppercase tracking-wider">{dept.name}</h3>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📋 SERVICE LIST */}
                        {view === 'DEPT' && selectedDept && (
                            <div>
                                <button onClick={() => setView('HOME')} className="click-red text-[#ffd700] font-black mb-6 bg-[#111] px-6 py-3 rounded-xl border border-[#333]"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                    {selectedDept.services.map(srv => (
                                        <div key={srv} onClick={() => { setSelectedService(srv); setView('FORM'); }} className="click-red bg-[#0a0a0a] border border-[#222] p-6 rounded-2xl flex justify-between items-center shadow-lg">
                                            <span className="font-bold text-lg text-white">{srv}</span> <i className="fa-solid fa-chevron-right text-[#ffd700]"></i>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* 📝 FORM (WITH DATE PICKER) */}
                        {view === 'FORM' && (
                            <div className="max-w-4xl mx-auto">
                                <button onClick={() => setView('DEPT')} className="click-red text-[#ffd700] font-black mb-4"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                                <div className="glass-panel p-8 border-t-4 border-[#ffd700] shadow-2xl">
                                    <h2 className="text-3xl font-black text-[#ffd700] mb-6 border-b border-[#333] pb-4">{selectedService}</h2>
                                    <form onSubmit={submitForm} className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                            <input required type="text" placeholder="पूरा नाम *" onChange={e=>setFormData({...formData, name:e.target.value})} className="bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]" />
                                            <input required type="tel" placeholder="मोबाइल नंबर *" onChange={e=>setFormData({...formData, mobile:e.target.value})} className="bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]" />
                                        </div>
                                        <input required type="text" placeholder="पूरा पता (Address) *" onChange={e=>setFormData({...formData, address:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#333]" />

                                        {reqs.askDate && (
                                            <div className="bg-yellow-900/20 p-5 rounded-2xl border border-yellow-500/50">
                                                <label className="text-yellow-400 font-black mb-2 block uppercase text-sm"><i className="fa-regular fa-calendar-check mr-2"></i> पिछली सत्यापन/पॉलिसी तिथि चुनें (यदि याद हो)</label>
                                                <input type="date" onChange={e=>setFormData({...formData, lastDate:e.target.value})} className="w-full bg-[#000] p-4 rounded-xl text-white border border-[#333] font-bold" />
                                            </div>
                                        )}

                                        {reqs.texts.length > 0 && (
                                            <div className="bg-blue-900/20 p-6 rounded-2xl border border-blue-500/50">
                                                <h3 className="text-blue-400 font-black mb-4 uppercase"><i className="fa-solid fa-circle-info mr-2"></i> ज़रूरी जानकारी:</h3>
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                    {reqs.texts.map(lbl => (
                                                        <input required key={lbl} type="text" placeholder={`${lbl} डालें *`} onChange={e=>setDynamicTextData({...dynamicTextData, [lbl]: e.target.value})} className="w-full bg-[#000] p-4 rounded-xl text-white border border-[#333] font-bold" />
                                                    ))}
                                                </div>
                                            </div>
                                        )}

                                        <textarea required rows="3" placeholder="✍️ समस्या या कार्य का विवरण... *" onChange={e=>setFormData({...formData, problemDesc:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white outline-none border border-[#333]"></textarea>

                                        <div className="border-t border-[#333] pt-6 mt-6">
                                            <h3 className="text-white font-black uppercase mb-4"><i className="fa-solid fa-folder-open text-[#ffd700] mr-2"></i> दस्तावेज़ अपलोड करें</h3>
                                            <p className="text-xs text-gray-400 mb-4">ज़रूरी: {reqs.docs.join(", ")}</p>
                                            <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                                                {uploadedFiles.map((f, i) => (
                                                    <div key={i} className="bg-green-900/30 p-4 rounded-xl border border-green-500 text-center truncate"><i className="fa-solid fa-check text-green-500 mb-2"></i><p className="text-[10px]">{f.name}</p></div>
                                                ))}
                                                <div onClick={()=>fileInputRef.current.click()} className="click-red bg-[#111] border-2 border-dashed border-[#ff9900] p-4 rounded-xl text-center flex flex-col justify-center items-center h-24">
                                                    <i className="fa-solid fa-plus text-2xl text-[#ff9900] mb-2"></i><p className="text-[10px] text-[#ff9900] font-black uppercase">Add File</p>
                                                </div>
                                                <input type="file" multiple ref={fileInputRef} onChange={handleFileSelect} className="hidden" accept="image/*,application/pdf" />
                                            </div>
                                        </div>

                                        <button type="submit" disabled={isUploading} className="click-red w-full btn-gold py-5 rounded-xl text-xl font-black uppercase mt-8">
                                            {isUploading ? "⏳ अपलोड हो रहा है..." : "फॉर्म सबमिट करें"}
                                        </button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {/* 🔍 TRACKING & EXTRA UPLOAD (+) */}
                        {view === 'TRACK' && (
                            <div className="max-w-xl mx-auto glass-panel p-8 text-center border-t-4 border-blue-500 shadow-2xl">
                                <h2 className="text-3xl font-black mb-6 uppercase text-white">Live Tracking</h2>
                                <input type="text" placeholder="टोकन नंबर (उदा: DPSG-...)" onChange={e=>setTrackToken(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] text-center font-black text-white uppercase mb-4 focus:border-blue-500 outline-none" />
                                <button onClick={trackStatus} disabled={isTracking} className="click-red w-full bg-blue-600 text-white font-black py-5 rounded-xl text-lg uppercase shadow-[0_0_20px_rgba(37,99,235,0.5)]"><i className="fa-solid fa-magnifying-glass mr-2"></i> स्टेटस चेक करें</button>

                                {trackResult && (
                                    <div className="mt-8 bg-[#050505] p-6 rounded-2xl border border-[#222] text-left shadow-inner">
                                        <p className="text-sm font-bold text-gray-400">नाम: <span className="text-white ml-2">{trackResult[4]}</span></p>
                                        <p className="text-sm font-bold text-gray-400 mt-2">स्थिति: <span className={`ml-2 px-3 py-1 rounded-full text-xs font-black uppercase ${trackResult[2]==='Done'?'bg-green-900/50 text-green-400':trackResult[2]==='Send Back'?'bg-red-900/50 text-red-400':'bg-yellow-900/50 text-yellow-400'}`}>{trackResult[2]}</span></p>
                                        
                                        <div className="bg-[#111] p-4 rounded-xl border border-[#333] mt-4">
                                            <p className="text-[#ffd700] text-xs font-black uppercase mb-1">👨‍💻 स्टाफ का नोट:</p>
                                            <p className="text-white text-sm">{trackResult[28]}</p>
                                        </div>

                                        {trackResult[27] && trackResult[27] !== "लागू नहीं" && (
                                            <div className="bg-blue-900/30 p-4 rounded-xl border border-blue-500 mt-4 text-center">
                                                <p className="text-blue-400 font-bold text-xs uppercase">अगली सत्यापन/रिन्यूअल तिथि:</p>
                                                <p className="text-white font-black text-lg">{trackResult[27]}</p>
                                            </div>
                                        )}

                                        {trackResult[2] === "Send Back" && (
                                            <div className="bg-red-900/20 p-5 rounded-xl border border-dashed border-red-500 text-center mt-4">
                                                <p className="text-xs text-red-400 font-bold mb-3">⚠️ कमी: {trackResult[19]}</p>
                                                <button onClick={()=>extraDocRef.current.click()} className="click-red bg-red-600 text-white px-6 py-3 rounded-full font-black uppercase text-sm"><i className="fa-solid fa-plus mr-2"></i> दस्तावेज़ जोड़ें (+)</button>
                                                <input type="file" ref={extraDocRef} onChange={handleExtraUpload} className="hidden" accept="image/*,application/pdf" />
                                            </div>
                                        )}

                                        {trackResult[22] === "Approved" && (
                                            <div className="bg-green-900/30 p-4 rounded-xl border border-green-500 text-center mt-4">
                                                <p className="text-green-400 font-black mb-2 uppercase">✅ वीडियो कॉल तय (Approved)</p>
                                                <p className="text-white font-bold mb-4">समय: <span className="text-[#ffd700] bg-black px-3 py-1 rounded ml-2">{trackResult[24]}</span></p>
                                            </div>
                                        )}

                                        {trackResult[21] && (
                                            <a href={getLink(trackResult[21])} target="_blank" className="mt-4 block text-center bg-green-600 py-3 rounded-lg font-black text-white"><i className="fa-solid fa-download"></i> Certificate</a>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}

                        {/* 👨‍💻 STAFF PANEL (FULL 30-COL DATA & DATE EDIT) */}
                        {view === 'STAFF' && (
                            <div className="max-w-5xl mx-auto">
                                {!isStaffLoggedIn ? (
                                    <div className="glass-panel p-8 max-w-md mx-auto text-center border-t-4 border-red-600 shadow-2xl">
                                        <h2 className="text-2xl font-black mb-6 uppercase text-white">Staff Login</h2>
                                        <input type="text" placeholder="Staff ID" onChange={e=>setStaffId(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] mb-4 text-center text-white font-bold outline-none" />
                                        <input type="password" placeholder="Password" onChange={e=>setStaffPass(e.target.value)} className="w-full bg-[#111] p-5 rounded-xl border border-[#333] mb-6 text-center text-white font-bold outline-none" />
                                        <button onClick={handleStaffLogin} className="click-red w-full bg-red-600 text-white font-black py-5 rounded-xl uppercase tracking-widest">Login</button>
                                    </div>
                                ) : (
                                    <div className="glass-panel p-6 border-t-4 border-red-600 shadow-2xl">
                                        <div className="flex justify-between items-center border-b border-[#333] pb-6 mb-6">
                                            <h2 className="text-2xl font-black text-white uppercase">Control Room</h2>
                                            <button onClick={fetchPendingList} className="bg-[#111] text-[#ffd700] px-4 py-2 rounded-lg border border-[#333]"><i className="fa-solid fa-rotate"></i></button>
                                        </div>

                                        {!editingRow ? (
                                            <div className="space-y-4">
                                                {pendingList.map((item, idx) => (
                                                    <div key={idx} onClick={()=>openStaffEdit(item)} className="click-red bg-[#0a0a0a] p-5 rounded-xl border border-[#222] border-l-4 hover:bg-[#111] cursor-pointer flex justify-between items-center" style={{borderLeftColor: item.data[2]==='Send Back'?'#ef4444':'#ffd700'}}>
                                                        <div>
                                                            <p className="font-black text-white text-lg">{item.data[4]} <span className="text-xs text-gray-500">({item.data[1]})</span></p>
                                                            <p className="text-sm font-bold text-gray-400 mt-1">{item.data[8]}</p>
                                                        </div>
                                                        <span className="text-xs font-black uppercase bg-[#111] border border-[#333] px-3 py-1 rounded-full">{item.data[2]}</span>
                                                    </div>
                                                ))}
                                                {pendingList.length === 0 && <p className="text-center text-gray-500 py-10">कोई काम पेंडिंग नहीं है!</p>}
                                            </div>
                                        ) : (
                                            <div className="fade-in">
                                                <button onClick={()=>setEditingRow(null)} className="text-[#ffd700] font-black mb-6"><i className="fa-solid fa-arrow-left mr-2"></i> वापस</button>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                                                    {/* BIO DATA & LINKS */}
                                                    <div className="bg-[#050505] p-6 rounded-2xl border border-[#222]">
                                                        <h3 className="text-[#ffd700] font-black uppercase mb-4"><i className="fa-solid fa-address-card mr-2"></i> Bio-Data</h3>
                                                        <div className="text-sm space-y-2 mb-4">
                                                            <p><span className="text-gray-500 font-bold uppercase">Aadhaar/PPO:</span> {editingRow.data[9]} / {editingRow.data[11]}</p>
                                                            <p><span className="text-gray-500 font-bold uppercase">Problem:</span> {editingRow.data[14]}</p>
                                                            <p><span className="text-gray-500 font-bold uppercase">Last Verify (Customer):</span> <span className="text-blue-400 font-bold">{editingRow.data[26] || 'Not Provided'}</span></p>
                                                            <p><span className="text-gray-500 font-bold uppercase">VC Request:</span> <span className="text-red-400 font-bold">{editingRow.data[22]} ({editingRow.data[23]})</span></p>
                                                        </div>
                                                        
                                                        {/* CLICKABLE FILE LINKS */}
                                                        <div className="grid grid-cols-2 md:grid-cols-3 gap-2 border-t border-[#222] pt-4 mt-4">
                                                            {[15,16,17,18,19].map(col => {
                                                                const link = getLink(editingRow.data[col]);
                                                                if(link) return <a href={link} target="_blank" className="bg-blue-900/30 border border-blue-500 p-2 rounded text-center text-blue-400 text-xs font-bold hover:bg-blue-600 hover:text-white"><i className="fa-solid fa-file-image block text-lg mb-1"></i> View Doc</a>
                                                                return null;
                                                            })}
                                                        </div>
                                                    </div>

                                                    {/* QUICK ACTIONS & NOTIFY */}
                                                    <div className="bg-[#111] p-6 rounded-2xl border border-[#333]">
                                                        <h3 className="text-white font-black uppercase mb-4"><i className="fa-solid fa-bolt text-red-500 mr-2"></i> Quick Actions</h3>
                                                        <div className="grid grid-cols-2 gap-3 mb-6">
                                                            <button onClick={()=>window.open(`https://wa.me/91${editingRow.data[5]}`, '_blank')} className="bg-green-600 text-white py-3 rounded-xl font-black text-sm"><i className="fa-brands fa-whatsapp mr-2"></i> WhatsApp</button>
                                                            <button onClick={()=>callAPI({action: "NOTIFY_OWNER", staffId: staffId, message: "Emergency on token "+editingRow.data[1]})} className="bg-red-600 text-white py-3 rounded-xl font-black text-sm"><i className="fa-brands fa-telegram mr-2"></i> Owner Alert</button>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* UPDATE SECTION (WITH DATE) */}
                                                <div className="bg-[#050505] p-6 rounded-2xl border border-[#222]">
                                                    <h3 className="text-[#ffd700] font-black uppercase mb-6"><i className="fa-solid fa-pen-to-square mr-2"></i> Update Status</h3>
                                                    
                                                    {/* 📅 नई सत्यापन तिथि */}
                                                    <div className="mb-5 bg-yellow-900/20 p-4 rounded-xl border border-yellow-500/50">
                                                        <label className="text-yellow-400 font-bold text-xs uppercase block mb-2">नई सत्यापन/रिन्यूअल तिथि डालें (आज का काम):</label>
                                                        <input type="date" value={staffUpdateData.newVerifyDate} onChange={e=>setStaffUpdateData({...staffUpdateData, newVerifyDate:e.target.value})} className="w-full bg-[#000] p-4 rounded-xl text-white border border-[#333] outline-none font-bold" />
                                                        <p className="text-[10px] text-gray-400 mt-2">मशीन खुद दिसंबर (पेंशन) या 365 दिन (बीमा) सेट कर देगी।</p>
                                                    </div>

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                                                        <select value={staffUpdateData.status} onChange={e=>setStaffUpdateData({...staffUpdateData, status:e.target.value})} className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#333] font-bold">
                                                            <option>Pending</option><option>In Process</option><option>Send Back</option><option>Done</option>
                                                        </select>
                                                        <input type="text" value={staffUpdateData.note} onChange={e=>setStaffUpdateData({...staffUpdateData, note:e.target.value})} placeholder="Staff Note..." className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#333]" />
                                                    </div>
                                                    
                                                    {staffUpdateData.status === "Send Back" && (
                                                        <input type="text" value={staffUpdateData.sendBackReason} onChange={e=>setStaffUpdateData({...staffUpdateData, sendBackReason:e.target.value})} placeholder="Send Back Reason..." className="w-full bg-[#000] p-4 rounded-xl text-white border border-red-900 mb-4" />
                                                    )}

                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-6">
                                                        <input type="text" value={staffUpdateData.vcTime} onChange={e=>setStaffUpdateData({...staffUpdateData, vcTime:e.target.value})} placeholder="Video Call Time (e.g. 04:30 PM)" className="w-full bg-[#111] p-4 rounded-xl text-white border border-[#333]" />
                                                        <div className="relative">
                                                            <input type="file" ref={staffCertRef} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" accept="image/*,application/pdf" />
                                                            <div className="bg-[#111] p-4 rounded-xl border border-dashed border-[#ff9900] text-center text-[#ff9900] font-bold"><i className="fa-solid fa-cloud-arrow-up mr-2"></i> Upload Certificate</div>
                                                        </div>
                                                    </div>

                                                    <button onClick={submitStaffUpdate} className="click-red w-full bg-gradient-to-r from-[#ffd700] to-[#ff8c00] text-black font-black py-5 rounded-xl text-xl uppercase tracking-widest"><i className="fa-solid fa-check-double mr-2"></i> Update & Notify</button>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 📱 BOTTOM NAV */}
                    <div className="fixed bottom-0 w-full bg-[#000]/95 border-t border-[#222] p-3 flex justify-around items-center z-50">
                        <div onClick={() => setView('HOME')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='HOME'||view==='DEPT'||view==='FORM'?'bg-[#ffd700] text-black':'text-gray-500'}`}><i className="fa-solid fa-house text-xl"></i></div>
                        <div onClick={() => setView('TRACK')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='TRACK'?'bg-blue-600 text-white':'text-gray-500'}`}><i className="fa-solid fa-satellite-dish text-xl"></i></div>
                        <div onClick={() => setView('STAFF')} className={`cursor-pointer py-3 px-8 rounded-2xl flex flex-col items-center ${view==='STAFF'?'bg-red-600 text-white':'text-gray-500'}`}><i className="fa-solid fa-user-shield text-xl"></i></div>
                    </div>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
